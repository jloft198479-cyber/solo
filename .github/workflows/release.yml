name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install JS dependencies
        run: bun install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          # Generate changelog from git log
          $tag = "${{ github.ref_name }}"
          $prevTag = git tag --sort=-v:refname | Select-Object -Index 1
          if ($prevTag) {
            $changelog = git log "$prevTag..$tag" --oneline --no-decorate
          }
          if (-not $changelog) { $changelog = "首次发布" }
          $changelog | Set-Content changelog.txt

          # Find installer
          $exe = Get-Item "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No installer found" }
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $repo = "${{ github.repository }}"

          # Sign installer → get signature
          $sigOutput = bunx tauri signer sign $exe.FullName 2>&1 | Out-String
          $sigLine = ($sigOutput -split "`n") | Where-Object { $_ -match "^dW50cnVzdGVk" } | Select-Object -First 1
          $signature = $sigLine.Trim()
          if (-not $signature) { throw "Failed to generate signature" }

          # Save .sig file
          $sigFile = "$($exe.DirectoryName)/$($exe.BaseName).sig"
          Set-Content -Path $sigFile -Value $signature

          # Create latest.json
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $url = "https://github.com/$repo/releases/download/$tag/$($exe.Name)"
          $notes = if ($changelog -is [array]) { $changelog -join "`n" } else { $changelog }
          # Trim notes for latest.json (keep first 200 chars)
          $notesShort = if ($notes.Length -gt 200) { $notes.Substring(0,200) + "..." } else { $notes }
          $json = @{
            version  = $version
            notes    = $notesShort
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url       = $url
                signature = $signature
              }
            }
          }
          $json | ConvertTo-Json | Set-Content "$($exe.DirectoryName)/latest.json"

          # Create or update release
          $existing = gh release view $tag --json tagName 2>$null
          if ($existing) {
            gh release delete $tag --yes 2>$null
          }
          gh release create $tag --title $tag --draft --notes-file changelog.txt

          # Upload all assets
          Write-Host "Uploading: $($exe.Name)"
          gh release upload $tag $exe.FullName --clobber
          Write-Host "Uploading: $($exe.BaseName).sig"
          gh release upload $tag $sigFile --clobber
          Write-Host "Uploading: latest.json"
          gh release upload $tag "$($exe.DirectoryName)/latest.json" --clobber
          Write-Host "✅ Release $tag created with updater assets"
