<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- 内联 CSS var + 内联脚本：Vue 挂载前 WebView 背景色即匹配主题，消除黑闪 -->
    <style>html { background-color: var(--bg-color, #faf8f5); }</style>
    <script>
      try {
        var _t = JSON.parse(localStorage.getItem('solo-theme-paint'));
        if (_t) {
          _t.d && document.documentElement.classList.add('dark');
          var _s = document.documentElement.style;
          for (var _k in _t.v) _s.setProperty(_k, _t.v[_k]);
        }
      } catch (e) { /* localStorage unavailable */ }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>solo</title>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
