<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rounded">
      <!-- 超椭圆 n≈3（连续曲率，无离散圆角过渡） -->
      <path d="M 1024,512
               C 1024,112 912,0 512,0
               C 112,0 0,112 0,512
               C 0,912 112,1024 512,1024
               C 912,1024 1024,912 1024,512 Z"/>
    </clipPath>
  </defs>

  <!-- 底色：超椭圆路径 -->
  <path d="M 1024,512
           C 1024,112 912,0 512,0
           C 112,0 0,112 0,512
           C 0,912 112,1024 512,1024
           C 912,1024 1024,912 1024,512 Z"
        fill="#faf8f5"/>

  <!-- 边框 -->
  <path d="M 1024,512
           C 1024,112 912,0 512,0
           C 112,0 0,112 0,512
           C 0,912 112,1024 512,1024
           C 912,1024 1024,912 1024,512 Z"
        fill="none" stroke="#d8cfc0" stroke-width="2"/>

  <!-- 文字 -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
        fill="#6b5a3e" font-family="system-ui, sans-serif"
        font-size="380" font-weight="600" letter-spacing="16">solo</text>

  <!-- 玻璃高光 -->
  <g clip-path="url(#rounded)">
    <rect x="0" y="0" width="1024" height="512" fill="url(#gloss)"/>
  </g>
</svg>
