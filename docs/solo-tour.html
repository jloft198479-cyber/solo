ve\",\n\n    /* Linting */\n    \"strict\": true,\n    \"noUnusedLocals\": true,\n    \"noUnusedParameters\": true,\n    \"noFallthroughCasesInSwitch\": true\n  },\n  \"exclude\": [\"src/**/__tests__/\"],\n  \"include\": [\"src/**/*.ts\", \"src/**/*.d.ts\", \"src/**/*.tsx\", \"src/**/*.vue\"],\n  \"references\": [{ \"path\": \"./tsconfig.node.json\" }]\n}\n"},"vite.config.ts":{"text":"import { defineConfig } from \"vite\";\nimport vue from \"@vitejs/plugin-vue\";\n\n// @ts-expect-error process is a nodejs global\nconst host = process.env.TAURI_DEV_HOST;\n\n// https://vite.dev/config/\nexport default defineConfig(async () => ({\n  plugins: [vue()],\n\n  clearScreen: false,\n  server: {\n    port: 1420,\n    strictPort: true,\n    host: host || false,\n    hmr: host\n      ? {\n          protocol: \"ws\",\n          host,\n          port: 1421,\n        }\n      : undefined,\n    watch: {\n      ignored: [\"**/src-tauri/**\"],\n    },\n  },\n\n  build: {\n    // 启用生产优化\n    target: \"esnext\",\n    minify: \"esbuild\",\n    // 分包策略：将大型依赖拆分为独立 chunk\n    rollupOptions: {\n      output: {\n        manualChunks: (id: string) => {\n          if (id.includes('@tiptap/vue-3') || id.includes('@tiptap/pm') || id.includes('@tiptap/core')) {\n            return 'tiptap-core';\n          }\n          if (id.includes('@tiptap/extension-') || id.includes('@tiptap/starter-kit')) {\n            return 'tiptap-extensions';\n          }\n          if (id.includes('markdown-it')) return 'markdown-it';\n          if (id.includes('katex')) return 'katex';\n          if (id.includes('mermaid')) return 'mermaid';\n        },\n      },\n    },\n  },\n}));\n"},"src-tauri/Cargo.toml":{"text":"[package]\nname = \"solo\"\nversion = \"1.2.30\"\ndescription = \"solo - A lightweight Markdown editor\"\nauthors = [\"luoxiaodou\"]\nlicense = \"Apache-2.0\"\nedition = \"2021\"\n\n# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html\n\n[lib]\nname = \"solo_lib\"\ncrate-type = [\"staticlib\", \"cdylib\", \"rlib\"]\n\n[build-dependencies]\ntauri-build = { version = \"2\", features = [] }\n\n[dependencies]\ntauri = { version = \"2\", features = [\"protocol-asset\"] }\ntauri-plugin-opener = \"2\"\ntauri-plugin-dialog = \"2.7.1\"\ntauri-plugin-clipboard-manager = \"2\"\ntauri-plugin-cli = \"2\"\nserde = { version = \"1\", features = [\"derive\"] }\nserde_json = \"1\"\nthiserror = \"2\"\nreqwest = { version = \"0.12\", default-features = false, features = [\"rustls-tls\", \"system-proxy\"] }\nbase64 = \"0.22\"\ntokio = { version = \"1\", features = [\"macros\", \"rt-multi-thread\", \"net\", \"time\"] }\nurl = \"2\"\ntauri-plugin-store = \"2.4.3\"\ntauri-plugin-updater = \"2\"\ntauri-plugin-window-state = \"2.4.1\"\narboard = \"3\"\n\n[target.'cfg(target_os = \"macos\")'.dependencies]\nobjc2-app-kit = \"0.3.2\"\n\n[target.'cfg(target_os = \"windows\")'.dependencies]\nwinreg = \"0.55\"\nwebview2-com = \"0.38.2\"\nwindows-core = \"0.61\"\n\n[profile.release]\nopt-level = 3\nlto = true\ncodegen-units = 1\nstrip = true\n"},"src-tauri/tauri.conf.json":{"text":"{\n  \"$schema\": \"https://schema.tauri.app/config/2\",\n  \"productName\": \"solo\",\n  \"version\": \"1.2.30\",\n  \"identifier\": \"com.solomarkdown\",\n  \"build\": {\n    \"beforeDevCommand\": \"bun run dev\",\n    \"devUrl\": \"http://localhost:1420\",\n    \"beforeBuildCommand\": \"bun run build\",\n    \"frontendDist\": \"../dist\"\n  },\n  \"app\": {\n    \"windows\": [\n      {\n        \"title\": \"未命名\",\n        \"width\": 1200,\n        \"height\": 800,\n        \"minWidth\": 320,\n        \"minHeight\": 240,\n        \"center\": true,\n        \"visible\": false,\n        \"resizable\": true,\n        \"decorations\": false,\n        \"transparent\": false,\n        \"shadow\": true,\n        \"dragDropEnabled\": true\n      }\n    ],\n    \"security\": {\n      \"csp\": \"default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' asset: http://asset.localhost data: blob: https: http:; font-src 'self' asset: http://asset.localhost data: blob: https: http:; connect-src ipc: http://ipc.localhost https: http:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'\",\n      \"assetProtocol\": {\n        \"enable\": true,\n        \"scope\": [\"$APPLOCALDATA/font-cache/*\"]\n      }\n    }\n  },\n  \"bundle\": {\n    \"active\": true,\n    \"targets\": [\"nsis\"],\n    \"resources\": [],\n    \"icon\": [\n      \"icons/32x32.png\",\n      \"icons/128x128.png\",\n      \"icons/128x128@2x.png\",\n      \"icons/icon.icns\",\n      \"icons/icon.ico\"\n    ],\n    \"fileAssociations\": [\n      {\n        \"ext\": [\"md\", \"markdown\"],\n        \"contentTypes\": [\"net.daringfireball.markdown\", \"public.plain-text\", \"public.text\"],\n        \"name\": \"solo文档\",\n        \"description\": \"solo文档\",\n        \"role\": \"Editor\",\n        \"mimeType\": \"text/markdown\"\n      }\n    ],\n    \"windows\": {\n      \"nsis\": {\n        \"installMode\": \"currentUser\",\n        \"languages\": [\"SimpChinese\", \"English\"],\n        \"displayLanguageSelector\": true,\n        \"installerHooks\": \"./nsis-hooks.nsh\"\n      }\n    }\n  },\n  \"plugins\": {\n    \"updater\": {\n      \"active\": true,\n      \"dialog\": true,\n      \"pubkey\": \"dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDJDRTg1Njg3MDZGNkZFMjAKUldRZy92WUdoMWJvTEM0cnhjcklJbUxXc0lXSEJ2UXVoZlF0cHVoYkFkRTRQOVkrSk9pSEFjMWYK\",\n      \"endpoints\": [\n        \"https://github.com/jloft198479-cyber/solo/releases/latest/download/latest.json\"\n      ]\n    },\n    \"fs\": {\n      \"requireLiteralLeadingDot\": false\n    },\n    \"cli\": {\n      \"args\": [\n        {\n          \"name\": \"file\",\n          \"index\": 1,\n          \"takesValue\": true,\n          \"description\": \"Markdown file to open\"\n        }\n      ]\n    }\n  }\n}\n"},"RELEASE_PROCESS.md":{"text":"# solo 正式发布流程\n\n> **目标**：从功能开发完成到用户收到更新的全链路标准操作程序。\n> **适用范围**：所有 solo v1.x.x 版本发布。\n> **原则**：先检查，后执行。每个步骤完成后才能进入下一步。\n\n---\n\n## 目录\n\n1. [快速卡片——一站式核对表](#1-快速卡片一站式核对表)\n2. [Phase 0：功能开发](#2-phase-0功能开发)\n3. [Phase 1：版本号同步](#3-phase-1版本号同步)\n4. [Phase 2：本地验证](#4-phase-2本地验证)\n5. [Phase 3：CI 发布](#5-phase-3-ci-发布)\n6. [Phase 4：发布后验证](#6-phase-4发布后验证)\n7. [Phase 5：发布正式版](#7-phase-5发布正式版)\n8. [回滚流程](#8-回滚流程)\n9. [常见故障](#9-常见故障)\n10. [附录](#10-附录)\n\n---\n\n## 1. 快速卡片——一站式核对表\n\n```text\n[ ] 1. 确认所有功能开发完成、测试通过\n[ ] 2. 确认版本号四源一致并升高（package.json / Cargo.toml / tauri.conf.json / Cargo.lock）\n[ ] 3. 确认没有 replaceAll / replaceAllAsync（TS target ES2020）\n[ ] 4. 提交版本号变更 → git push\n[ ] 5. 本地全量测试：bun run test ✅\n[ ] 6. 本地前端构建：bun run build ✅\n[ ] 7. 创建并推送 tag：git tag v1.x.x && git push origin v1.x.x\n[ ] 8. 等待 CI 完成（~15min，Rust 编译）\n[ ] 9. 验证 release assets：版本号正确、3 个资产齐全\n[ ] 10. 发布 release（draft → published）\n[ ] 11. 在已安装版本上验证自动更新\n[ ] 12. 更新项目文档（PROFILE.md 版本历史）\n```\n\n---\n\n## 2. Phase 0：功能开发\n\n### 2.1 完成所有功能\n\n- 所有 feature 代码已合并到 `master`\n- 测试覆盖：`bun run test` 全量通过（测试数量以命令实际输出为准，必须 0 失败）\n- 类型检查：`vue-tsc --noEmit` 无错误\n- 前端构建：`bun run build` 通过\n- **构建检查**：每次代码变更后、commit **前**，必须先跑 `bun run build` 通过（`vue-tsc --noEmit` 会捕获未使用变量、类型错误等低级问题，防止流入 CI）\n\n### 2.2 类型兼容性检查（🚨 重要）\n\n**项目 TypeScript target 为 ES2020**，以下 ES2021+ API **不能使用**：\n\n| 禁止的 API | 替代方案 |\n|---|---|\n| `String.prototype.replaceAll` | `.split(search).join(replacement)` |\n| `Promise.any` | 改用 `Promise.race` + 逻辑 |\n| `WeakRef` / `FinalizationRegistry` | 未使用 |\n\n**检查命令**：\n```bash\nrg \"replaceAll|replaceAllAsync\" src/\n```\n\n---\n\n## 3. Phase 1：版本号同步\n\n### 3.1 必须修改的三个文件（缺一不可）\n\n| # | 文件 | 字段 |\n|---|---|---|\n| 1 | `package.json` | `\"version\": \"1.x.x\"` |\n| 2 | `src-tauri/Cargo.toml` | `version = \"1.x.x\"` |\n| 3 | `src-tauri/tauri.conf.json` | `\"version\": \"1.x.x\"` |\n\n### 3.2 版本号规则\n\n- 使用**语义化版本**：`主版本.次版本.修订号`\n- 新增功能/改进（非破坏性）→ 升**次版本号**（如 1.2.8 → 1.2.9）\n- 修复 bug（无功能变化）→ 升**修订号**（如 1.2.9 → 1.2.10）\n- 破坏性变更 → 升**主版本号**\n- tag 名 = `v` + 版本号，如 `v1.2.9`\n\n### 3.3 验证版本一致\n\n```bash\nSelect-String -Path package.json,src-tauri\\Cargo.toml,src-tauri\\tauri.conf.json -Pattern '\"version\"|version = \"'\n```\n\n输出中三个文件的版本号必须一致（**这是防止版本乱标的强制关卡**：任一不一致都不得打 tag）。`Cargo.lock` 中 solo 条目版本由 `cargo` 在构建时同步，也须与三处相同。\n\n### 3.4 提交版本变更\n\n```bash\ngit add -A\ngit commit -m \"bump version to 1.x.x\"\ngit push origin master\n```\n\n---\n\n## 4. Phase 2：本地验证\n\n### 4.1 全量测试\n\n```bash\nbun run test\n```\n\n预期：`ALL TESTS PASS`（测试数量以 `bun run test` 实际输出为准，必须 0 失败）。\n\n### 4.2 前端构建\n\n```bash\nbun run build\n```\n\n等价于 `vue-tsc --noEmit && vite build`。不报错即通过。\n\n### 4.3 （可选）本地完整打包验证\n\n如果 Rust 代码有变更，建议本地打一次包确保 NSIS 安装器正常：\n\n```batch\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\nbunx tauri build\n```\n\n---\n\n## 5. Phase 3：CI 发布\n\n### 5.1 创建 tag\n\n```bash\ngit tag v1.x.x\ngit push origin v1.x.x\n```\n\n### 5.2 Tag 名必须与前一步版本号完全相同\n\n- `tag` vs `package.json` version 必须一致\n- 例如版本号是 `1.2.9`，tag 必须是 `v1.2.9`（不是 `v1.2.9-beta` 也不是 `v1.2.9`）\n- CI 通过 `git tag --sort=-v:refname | Select-Object -Index 1` 获取上一个 tag 来生成 changelog\n\n### 5.3 CI 工作流做什么\n\n`.github/workflows/release.yml` 在 tag push 后自动执行：\n\n```\n1. Checkout 代码\n2. 安装 Node.js 22 + Bun + Rust stable\n3. bun install（安装 JS 依赖）\n4. Rust cache（加速编译）\n5. bun run tauri build --target x86_64-pc-windows-msvc\n   ├─ vue-tsc --noEmit（类型检查）\n   ├─ vite build（前端构建）\n   ├─ cargo build --release（Rust 编译）\n   └─ makensis（NSIS 打包）\n6. 生成 changelog（git log prevTag..currentTag --oneline）\n7. 签名安装包 + 生成 .sig 文件\n8. 生成 latest.json（updater 元数据）\n9. 创建 Draft Release\n10. 上传 3 个资产：.exe / .sig / latest.json\n```\n\n### 5.4 监控 CI 状态\n\n```bash\n# 查看最近一次 CI 运行状态\ngh run list --workflow=release.yml --limit 1 --json status,conclusion,createdAt\n\n# 查看具体 job 日志\ngh run view --job=<job-id>\n```\n\n**CI 耗时参考**：\n| 阶段 | 首次（无缓存） | 增量（有缓存） |\n|---|---|---|\n| Rust 编译 | ~10-15min | ~3-5min |\n| 全过程 | ~12-18min | ~5-8min |\n\n### 5.5 处理 tag 冲突\n\n如果远程已有同名 tag（例如此前失败过）：\n\n```bash\n# 1. 删除远程 tag\ngit push origin --delete v1.x.x\n\n# 2. 删除本地 tag\ngit tag -d v1.x.x\n\n# 3. 重新创建\ngit tag v1.x.x && git push origin v1.x.x\n```\n\n---\n\n## 6. Phase 4：发布后验证\n\n### 6.1 确认 CI 成功\n\n```bash\ngh run list --workflow=release.yml --limit 1 --json status,conclusion,createdAt\n```\n\n`status` 必须为 `\"completed\"`，`conclusion` 必须为 `\"success\"`。\n\n### 6.2 检查 Release 资产\n\n```bash\ngh release view v1.x.x\n```\n\n必须确认：\n- **`draft: true`**（正常，CI 创建时默认 draft）\n- **asset 版本号正确**：`solo_{版本号}_x64-setup.exe`（如 `solo_1.2.9_x64-setup.exe`）\n- **3 个资产齐全**：`.exe` + `.sig` + `latest.json`\n\n### 6.3 检查 latest.json\n\n```bash\ngh release download v1.x.x -p \"latest.json\" -O - 2>$null | ConvertFrom-Json | Select-Object version, pub_date\n```\n\n`version` 必须等于 tag 中的版本号（不含 `v` 前缀）。\n\n---\n\n## 7. Phase 5：发布正式版\n\n### 7.1 从 draft 转为 published\n\n```bash\ngh release edit v1.x.x --draft=false\n```\n\n**为什么必须做这一步**：\n- CI 创建的 release 默认是 **draft** 状态\n- draft release 对用户**不可见**\n- `tauri-plugin-updater` 在检查更新时只能看到**非 draft** 的 release\n- 不发布 → 用户永远收不到更新\n\n### 7.2 验证 release 已发布\n\n```bash\ngh release view v1.x.x\n```\n\n确认 `draft: false` 且 `published` 字段有值。\n\n### 7.3 在已安装版本上验证自动更新\n\n1. 打开已安装的 solo（任意旧版本，如 v1.2.8）\n2. 设置 → 通用 → 检查更新（或等待启动时自动检查）\n3. 确认弹出更新提示（版本号为刚发布的新版）\n4. 点击更新，确认下载、安装、重启成功\n\n### 7.4 更新项目文档\n\n在 `CHANGELOG.md` 顶部追加新版本记录（以真实 `git log` 整理，不要硬编码测试数）：\n\n```markdown\n## [1.x.x] - YYYY-MM-DD\n\n- 主要变更摘要\n```\n\n> 注：`.opencode/PROFILE.md` 的版本历史已于 2026-07-21 去重，统一以 `CHANGELOG.md` 为版本史真理源。\n\n同时更新 `BUILD_GUIDE.md` 中的版本号示例（如果有硬编码）。\n\n---\n\n## 8. 回滚流程\n\n### 8.1 CI 失败回滚\n\nCI 失败时 **不要重新打 tag**。先排查原因，修完代码后再重新打 tag：\n1. 删除远程 tag：`git push origin --delete v1.x.x`\n2. 删除本地 tag：`git tag -d v1.x.x`\n3. 本地修代码 → `bun run build` 确认通过 → 提交 → push（版本号不变）\n4. 重新 tag：`git tag v1.x.x && git push origin v1.x.x`\n\n### 8.2 Release 已发布但发现 Bug\n\n1. **不删除已发布的 release**（用户正在使用）\n2. 修复 Bug → 升**修订号**（如 1.2.10）→ 走完整发布流程\n3. 旧版 release 保留，用户下次检查更新时会拿到新版\n\n### 8.3 错误版本号已发布\n\n如果发现 release 中的 exe 版本号不对（如版本号还是 1.2.8 但 tag 是 v1.2.9）：\n\n```bash\n# 1. 删除远程 tag（必须先删）\ngit push origin --delete v1.2.9\n\n# 2. 删除本地 tag\ngit tag -d v1.2.9\n\n# 3. 删除 draft release（清理 GitHub 上的残留）\ngh release delete v1.2.9 --yes\n\n# 4. 修版本号 → 提交 → push\n# 5. 重新打 tag\ngit tag v1.2.9 && git push origin v1.2.9\n```\n\n---\n\n## 9. 常见故障\n\n### 9.1 🔴 Build 步骤失败：`replaceAll` is not a function\n\n**原因**：TypeScript target 为 ES2020（`tsconfig.json`），`replaceAll` 是 ES2021 API。\n\n**排查**：\n```bash\nrg \"replaceAll|replaceAllAsync\" src/\n```\n\n**修复**：替换为 `.split(X).join(Y)`。\n\n### 9.2 🔴 Create Release 步骤失败：No installer found\n\n**现象**：\n```\nGet-Item: ... No installer found\n```\n\n**原因**：`release.yml` 寻找安装器的路径用了 `src-tauri/target/release/bundle/nsis/`，但 Tauri 构建指定了自定义 target triple `x86_64-pc-windows-msvc`，实际路径为 `src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/`。\n\n**修复**：确认 `release.yml` 第 65 行使用 `${{ matrix.target }}` 变量。\n\n### 9.3 🔴 生成 latest.json 中 version 字段错误\n\n**现象**：`latest.json` 中 `version` 是上一个版本号（如 `1.2.8`），但 tag 是 `v1.2.9`。\n\n**根因**：`package.json` / `Cargo.toml` / `tauri.conf.json` 三处的版本号没有升到新版本。Tauri 构建时使用 `Cargo.toml` 中的版本号，所以生成的 exe 文件名和 `latest.json` 都用的是旧版本号。\n\n**预防**：必须在打 tag **前**完成版本号同步（见 Phase 1）。\n\n### 9.4 🔴 用户收不到更新通知\n\n| 场景 | 原因 | 解决 |\n|---|---|---|\n| Release 是 draft | updater 只查 published release | `gh release edit v1.x.x --draft=false` |\n| `latest.json` version 错误 | 构建时版本号未同步 | 回滚修复后重新发版 |\n| 签名不匹配 | signing key 未配置或无效 | 检查 `TAURI_SIGNING_PRIVATE_KEY` |\n| `latest.json` 中 `pub_date` 格式错误 | 日期格式不符合 RFC 3339 | 确保 `Get-Date` 输出正确格式 |\n\n### 9.5 🔴 CI 卡在 Rust 编译超过 20 分钟\n\n**原因**：Rust cache miss（首次构建或 cache 过期）。\n\n**处理**：耐心等待。首次构建约 10-15 分钟是正常范围。如果超过 25 分钟仍无进展，取消任务检查 Cargo.toml 或 Rust 版本配置。\n\n### 9.6 🔴 `git push origin v1.x.x` 被拒绝\n\n**现象**：\n```\n! [rejected]        v1.2.9 -> v1.2.9 (already exists)\n```\n\n**原因**：远程已有该 tag（例如此前 tag 成功后 CI 失败，重新创建 tag 时未清理远程）。\n\n**解决**：\n```bash\ngit push origin --delete v1.x.x\ngit tag -d v1.x.x\ngit tag v1.x.x && git push origin v1.x.x\n```\n\n### 9.7 🔴 `vue-tsc --noEmit` 报未使用变量或类型错误\n\n**现象**：\n```\nerror: 'xxx' is declared but its value is never read.\nerror: Type 'X' is not assignable to type 'Y'.\n```\n\n**原因**：Tauri 构建（`bun run build`）第一步就是 `vue-tsc --noEmit`。任何 TS 类型错误或未使用变量都会直接终止构建，不会进入 vite 和 cargo 阶段。\n\n**根因**：代码变更后没有在本地跑 `vue-tsc --noEmit` 或 `bun run build`，直接 push 了。\n\n**预防**：**代码变更后、commit 前必须跑 `bun run build`**（见 Phase 0 构建检查）。\n\n---\n\n## 10. 附录\n\n### 10.1 常用命令速查\n\n```bash\n# 版本号同步验证\nSelect-String -Path package.json,src-tauri\\Cargo.toml,src-tauri\\tauri.conf.json -Pattern '\"version\"|version = \"'\n\n# 本地测试\nbun run test && bun run build\n\n# 打 tag + 推送\ngit tag v1.x.x && git push origin v1.x.x\n\n# 删除 tag（本地 + 远程）\ngit tag -d v1.x.x && git push origin --delete v1.x.x\n\n# 查看 CI 状态\ngh run list --workflow=release.yml --limit 1 --json status,conclusion,createdAt\n\n# 查看 release\ngh release view v1.x.x\n\n# 发布 draft\ngh release edit v1.x.x --draft=false\n\n# 验证 latest.json\ngh release download v1.x.x -p \"latest.json\" -O - 2>$null | ConvertFrom-Json\n\n# 检查 replaceAll 用法\nrg \"replaceAll|replaceAllAsync\" src/\n```\n\n### 10.2 CI 工作流文件\n\n`.github/workflows/release.yml` — 触发方式：`git push --tags \"v*\"`。\n\n关键路径要点：\n- 安装器搜索路径：`src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe`\n- 签名：`bunx tauri signer sign` + 提取 signature\n- Release 创建：`gh release create --draft`（CI 不发布，留给人工确认）\n\n### 10.3 架构决策参考\n\n- **updater 配置**：`tauri.conf.json` → `plugins.updater`\n- **签名密钥**：`TAURI_SIGNING_PRIVATE_KEY`（GitHub Secrets）\n- **更新检测**：启动时 + 设置页面手动触发\n- **UI 模式**：`dialog: true`（Tauri 原生对话框）\n\n详见 `ARCHITECTURE.md` + `BUILD_GUIDE.md`。\n\n### 10.4 发版前手动回归清单（功能验证）\n\n> 原 `RELEASE-CHECKLIST.md` 已并入此处（2026-07-21 文档规范化），避免发版清单与流程脱节。在 `bun run test && bun run build` 通过后，发版前逐项手动过一遍，约 5 分钟，堵住 80% 的漏网 Bug。\n\n**基础**\n\n- [ ] 测试：`bun run test` 全绿\n- [ ] 编译：`vue-tsc --noEmit` → `vite build` → `cargo check` 全过\n\n**功能回归（修什么测什么 + 关联面）**\n\n- [ ] **新建空白文档** — 打开即写，无报错\n- [ ] **新建文档 → 贴图 → 保存 → 关闭 → 重新打开** → 图片正常显示\n- [ ] **打开已有文档（含 base64 旧图）** → 旧图不裂\n- [ ] **打开已有文档（含 assets/ 相对路径新图）** → 新图不裂\n- [ ] **跨文件切换** → 图片正常切换\n\n**路径/存储**\n\n- [ ] **未保存文档** 拖图/贴图 → 提示先保存\n- [ ] **已保存文档** 拖图 → 存到 `assets/` → 相对路径写入\n- [ ] **已保存文档** 贴截图 → 存到 `assets/` → 相对路径写入\n- [ ] **自定义存储路径** 贴图 → 走 `asset://` 协议 → 正常显示\n- [ ] **重命名文档** → `assets/` 目录下的图片引用是否同步（不要求自动迁移，检查是否有预期行为）\n\n**边界**\n\n- [ ] **超长文档** 打开/保存/滚动 — 不卡死\n- [ ] **图片文件缺失**（手动删了 assets/xxx.png） → 显示裂图而不是崩溃\n- [ ] **特殊字符路径**（文档名含中文/空格/括号） → 图片正常解析\n\n**升级/安装**\n\n- [ ] **通过自动更新安装**（打 tag 走 CI Release）→ 功能正常\n- [ ] **NSIS 全新安装** → 首次启动无异常\n"},"BUILD_GUIDE.md":{"text":"# solo 系统编译说明书\n\n> **目标**：任何开发者（人或 AI）按此文档操作，均可在干净 Windows 环境下成功编译 solo。\n> **适用范围**：Windows 10+ x64，Tauri v2.11.2，Rust 1.96.0，Bun 1.3.14。\n> **最后验证**：2026-06-29，`vue-tsc --noEmit` ✅ → `vite build` ✅ → `cargo build --release` ✅ → `makensis` ✅\n\n---\n\n## 目录\n\n1. [技术栈速览](#1-技术栈速览)\n2. [环境准备](#2-环境准备)\n3. [环境变量配置（关键！）](#3-环境变量配置关键)\n4. [分步编译](#4-分步编译)\n5. [自动化脚本](#5-自动化脚本)\n6. [踩坑实录](#6-踩坑实录)\n7. [故障排查](#7-故障排查)\n8. [附录](#8-附录)\n\n---\n\n## 1. 技术栈速览\n\n| 层 | 技术 | 版本 | 说明 |\n|---|---|---|---|\n| 桌面框架 | Tauri | 2.11.2 | 无边框窗口、插件体系 |\n| 原生核心 | Rust | 1.96.0 | edition 2021, release profile opt-level=3 |\n| 前端框架 | Vue 3 | 3.5 | Composition API + `<script setup>` |\n| 构建 | Vite | 7.x | |\n| 类型检查 | vue-tsc | 3.3.4 | |\n| 包管理器 | Bun | 1.3.14 | 也兼容 npm |\n| 样式 | Tailwind CSS 4 | 4.3 | |\n| 编辑器 | TipTap / ProseMirror | 3.26 | |\n| 包格式 | NSIS | — | 安装包产出 `.exe` |\n\n**项目路径**：`F:\\fzz-Project\\md-editor`\n\n---\n\n## 2. 环境准备\n\n### 2.1 必需工具\n\n| 工具 | 最低版本 | 获取方式 |\n|---|---|---|\n| Rust toolchain | 1.96.0 | `rustup-init.exe` |\n| MSVC Build Tools | v14.44+ | Visual Studio Build Tools 2022 |\n| WebView2 | — | Windows 10+ 内置，无需单独安装 |\n| Bun | 1.3.14 | `powershell -c \"irm bun.sh/install.ps1 | iex\"` |\n\n### 2.2 Rust 工具链安装\n\n1. 下载 `rustup-init.exe` 并运行，选择默认安装（stable-x86_64-pc-windows-msvc）。\n2. 安装完成后确认：\n   ```\n   rustc --version    # rustc 1.96.0 (ac68faa20 2026-05-25)\n   cargo --version    # cargo 1.96.0\n   rustup show        # active toolchain: stable-x86_64-pc-windows-msvc\n   ```\n\n### 2.3 MSVC Build Tools 安装\n\n1. 下载 [Visual Studio Build Tools 2022](https://visualstudio.microsoft.com/downloads/#build-tools-for-visual-studio-2022)。\n2. 安装时勾选：\n   - **使用 C++ 的桌面开发**（Desktop development with C++）\n   - 右侧必选组件：MSVC v143 生成工具 + Windows 10/11 SDK\n3. 安装后确认 `vcvars64.bat` 存在：\n   - 典型路径：`M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat`\n   - 如果使用默认安装路径，通常在 `C:\\Program Files\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Auxiliary\\Build\\`\n\n### 2.4 前端依赖安装\n\n```bash\ncd F:\\fzz-Project\\md-editor\nbun install\n```\n\n如果 `bun install` 因网络问题失败，改用 npm：\n\n```bash\nnpm install\n```\n\n---\n\n## 3. 环境变量配置（关键！）\n\n**这是最容易踩坑的地方，请严格按照以下步骤操作。**\n\n### 3.1 必需的变量\n\n```bash\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\n```\n\n> 如果 Rust 安装在默认路径，上述路径应调整为：\n> ```\n> set CARGO_HOME=C:\\Users\\<用户名>\\.cargo\n> set RUSTUP_HOME=C:\\Users\\<用户名>\\.rustup\n> set PATH=%CARGO_HOME%\\bin;%PATH%\n> ```\n\n### 3.2 ⚠️ RUSTUP_HOME 末尾空格陷阱\n\n**从 PowerShell 运行 `.bat` 时，`RUSTUP_HOME` 末尾可能被附加空格。**\n\n例如 `cmd /c \"set RUSTUP_HOME=M:\\rust\\.rustup\"` 在 PowerShell 中执行后，变量值可能变为 `\"M:\\rust\\.rustup \"`（末尾多一个空格），导致 `rustup` 找不到工具链。\n\n**解决方案**：\n- 直接在 `.bat` 文件中设置变量（不要通过 `cmd /c`）。\n- 或者使用本仓库提供的 `launch-dev.bat` / `build_solo_tauri.bat`。\n\n### 3.3 CARGO_HOME 大小写敏感\n\n`CARGO_HOME` 和 `RUSTUP_HOME` 必须使用**全大写**形式，不能写成 `CargoHome` 或 `cargo_home`。\n\n---\n\n## 4. 分步编译\n\n### 4.1 编译流程总览\n\n```\nsrc/ (Vue + TS)  ──vue-tsc──▶ 类型检查\n                             ──vite build──▶ dist/ (前端产物)\n\nsrc-tauri/src/ (Rust)  ──cargo build --release──▶ solo.exe\n                                                  ──makensis──▶ solo_{version}_x64-setup.exe\n```\n\n`solo.exe` → 绿色可执行文件\n`solo_1.2.8_x64-setup.exe` → NSIS 安装包\n\n### 4.2 方式一：前端独立编译（验证前端改动）\n\n```bash\ncd F:\\fzz-Project\\md-editor\nbun run build\n```\n\n内部等价于：`vue-tsc --noEmit && vite build`\n\n产出：`dist/` 目录。\n\n### 4.3 方式二：Rust 独立编译（验证 Rust 改动）\n\n```batch\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\ncargo build --release --manifest-path src-tauri\\Cargo.toml\n```\n\n产出：`src-tauri\\target\\release\\solo.exe`\n\n### 4.4 方式三：完整打包（一键生成安装包）\n\n```batch\ncd F:\\fzz-Project\\md-editor\nbun run build                                          # 前端构建\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat  # MSVC 环境\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\nbunx tauri build                                       # Rust 编译 + NSIS 打包\n```\n\n> **注意**：`bunx tauri build` 会在内部自动触发 `bun run build`，因此不需要手动执行第 1 步。上例展示的是分离控制权的情况。\n\n### 4.5 关键参数说明\n\n| 参数 | 说明 |\n|---|---|\n| `--release` | 启用优化（opt-level=3），编译更慢但产物更快 |\n| `--manifest-path` | 指定 `Cargo.toml` 路径，避免在 `src-tauri/` 目录下执行 |\n| `bunx tauri build` | Tauri CLI 的完整打包命令，含 Rust 编译 + NSIS 打包 |\n| `bun run build` | 前端构建，等价于 `vue-tsc --noEmit && vite build` |\n\n---\n\n## 5. 自动化脚本\n\n### 5.1 `launch-dev.bat` — 开发模式启动\n\n位置：项目根目录\n\n```batch\n@echo off\ntitle Solo Dev\n\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=%CARGO_HOME%\\bin;%PATH%\n\nset HTTP_PROXY=\nset HTTPS_PROXY=\nset CARGO_HTTP_CHECK_REVOKE=false\n\nset VCVARS=M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\nif exist \"%VCVARS%\" (\n    call \"%VCVARS%\" >nul\n)\n\ncd /d \"F:\\fzz-Project\\md-editor\"\n\necho.\necho === Solo Dev ===\nrustc --version\n\nnpx tauri dev\n\npause\n```\n\n### 5.2 `build_solo_full.bat` — 前端 + Rust 编译（不含打包）\n\n位置：`M:\\temp\\build_solo_full.bat`\n\n```batch\n@echo off\nchcp 65001 >nul\necho ===== 1/3 Frontend: vue-tsc + vite build =====\ncd /d F:\\fzz-Project\\md-editor\ncall bun run build\nif %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%\n\necho ===== 2/3 Rust: cargo build --release =====\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat >nul\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\ncargo build --release --manifest-path src-tauri\\Cargo.toml\nif %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%\n\necho ===== 全部通过 =====\necho 可执行文件: src-tauri\\target\\release\\solo.exe\n```\n\n### 5.3 `build_solo_tauri.bat` — 完整打包（含安装包）\n\n位置：`M:\\temp\\build_solo_tauri.bat`\n\n```batch\n@echo off\nchcp 65001 >nul\ncd /d F:\\fzz-Project\\md-editor\n\nREM Step 1: frontend\necho ===== 1/2 Frontend build =====\ncall bun run build\nif %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%\n\nREM Step 2: Tauri bundle\necho ===== 2/2 Tauri build (bundle) =====\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat >nul\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\ncall bunx tauri build\nif %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%\n\necho ===== Done =====\n```\n\n### 5.4 构建产出\n\n| 文件 | 路径 | 说明 |\n|---|---|---|\n| `solo.exe` | `src-tauri\\target\\release\\solo.exe` | 绿色可执行文件（约 15MB） |\n| `solo_{version}_x64-setup.exe` | `src-tauri\\target\\release\\bundle\\nsis\\` | NSIS 安装包（版本号取自 Cargo.toml） |\n\n> **注意**：若指定了自定义 target triple（如 `x86_64-pc-windows-msvc`），产物路径变为 `src-tauri\\target\\x86_64-pc-windows-msvc\\release\\bundle\\nsis\\`。\n\n---\n\n## 6. 踩坑实录\n\n### 6.1 `RUSTUP_HOME` 末尾空格\n\n**现象**：`rustc --version` 正常，但 `cargo build` 报错找不到工具链。\n\n**原因**：PowerShell 中执行 `cmd /c \"set RUSTUP_HOME=M:\\rust\\.rustup\" `可能引入尾部空格。\n\n**解决**：始终在 `.bat` 文件中设置变量，或在 PowerShell 中使用：\n```powershell\n$env:RUSTUP_HOME = \"M:\\rust\\.rustup\"\n```\n（确保引号闭合后无空格）\n\n### 6.2 `bunx tauri build` 必须在项目根目录执行\n\n**现象**：在 `src-tauri/` 目录下运行 `bunx tauri build` 报错。\n\n**原因**：Tauri CLI 需要从 `tauri.conf.json` 所在目录（项目根目录）运行，因为它需要读取 `beforeBuildCommand`、`frontendDist` 等配置。\n\n**解决**：任何 Tauri CLI 命令（`dev` / `build`）都从项目根目录执行：\n```bash\ncd F:\\fzz-Project\\md-editor\nbunx tauri build\n```\n\n### 6.3 `cargo check` 不通过但 `cargo build` 通过\n\n**现象**：`cargo check` 报错，但 `cargo build --release` 成功。\n\n**原因**：罕见，可能与 MSVC 工具链解析顺序有关。以 `cargo build` 为准。\n\n### 6.4 MSVC 环境激活顺序\n\n**现象**：`cargo build` 报错 `link.exe` 未找到。\n\n**原因**：Cargo 需要 MSVC 的链接器，必须先执行 `vcvars64.bat` 激活环境。\n\n**解决**：每次打开新终端或启动新进程时，都要先执行：\n```batch\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\n```\n\n### 6.5 `on_window_event` 只能注册一个回调\n\n**现象**：后续注册的 `on_window_event` 覆盖了之前的。\n\n**原因**：Tauri v2 的 `Window::on_window_event` 内部使用 `take`，只保留最后一个回调。\n\n**解决**：在 `attach_window_events()` 中**合并所有逻辑**到单个回调中（close 拦截 + focus/blur + destroyed 清理）。\n\n参考代码：`src-tauri/src/commands/window.rs`\n\n### 6.6 `window.set_focus()` 受 Windows 前台锁限制\n\n**现象**：`create_editor_window` 后调用 `set_focus()` 有时不生效。\n\n**原因**：Windows 只允许前台进程（或最近的前台进程）调用 `SetForegroundWindow`。\n\n**解决**：不依赖 `set_focus()` 总是成功。前端通过 `setTimeout(50ms)` 兜底检测 `document.hasFocus()`，必要时手动初始化编辑器。\n\n### 6.7 `app.exit(0)` 必须在 IPC 线程调用\n\n**现象**：在主线程调用 `AppHandle::exit()` 导致 `Chrome_WidgetWin_0` 错误。\n\n**原因**：Tauri v2 中 `exit()` 不能从主线程调用。\n\n**解决**：通过 `#[tauri::command]` 暴露 `exit_app` 命令，在 IPC 异步线程中执行 `app.exit(0)`。前端 `handleQuit` 在窗口 destroyed 事件后调用。\n\n### 6.8 `StateFlags::FULLSCREEN` 导致窗口尺寸错乱\n\n**现象**：以全屏模式退出后重新启动，窗口尺寸不恢复。\n\n**原因**：已知 Tauri bug（issue #3215），`FULLSCREEN` 标志位被持久化后干扰窗口状态恢复。\n\n**解决**：从 `StateFlags` 中移除 `FULLSCREEN`，只保留 `SIZE | POSITION | MAXIMIZED | VISIBLE | DECORATION`。\n\n### 6.9 `bun run build` 的输出警告可以忽略\n\n以下警告不影响构建结果，可安全忽略：\n\n```\n(!) Some chunks are larger than 500 kB after minification.\n(!) <module> is dynamically imported by ... but also statically imported by ...\n```\n\n这些是 Vite 的分块提示和模块引用方式的非致命通知，不影响产出。\n\n### 6.10 `StartupOpenRequests::replace` unused warning\n\n**现象**：Rust 编译出现 `warning: method 'replace' is never used`。\n\n**原因**：`state.rs` 中为 `StartupOpenRequests` 定义了 `replace()` 方法，但当前未在任何代码路径中调用。此警告已有，不影响功能。\n\n### 6.11 文件关联必须在安装时写入，不能依赖首次运行时注册\n\n**现象**：`desktop.rs` 的 `register_shell_new` 会在 app 启动时写入 ShellNew + 修复图标，但用户期望的是**装完直接有效**。首次启动延迟导致用户打开文件时关联还没生效。\n\n**原因**：Tauri 的 `fileAssociations` 只写 HKCU\\Software\\Classes\\solo.markdown 和 .md 的 UserChoice，但**不写** ShellNew（新建菜单）和 DefaultIcon 的 `,0` 后缀（图标索引）。Rust 代码 `register_shell_new` 补写了这些，但仅在 app 运行时才执行。\n\n**解决（推荐方案）**：使用 Tauri v2 的 `installerHooks` 在 NSIS 安装阶段写入：\n\n1. 创建 `src-tauri\\nsis-hooks.nsh`，定义 `NSIS_HOOK_POSTINSTALL` 宏：\n   - `WriteRegStr HKCU \"Software\\Classes\\.md\\ShellNew\" \"NullFile\" \"\"` — 添加新建菜单\n   - `DeleteRegKey HKCU \"Software\\Classes\\.markdown\\ShellNew\"` — 清理旧版重复\n   - `ReadRegStr/WriteRegStr` 读 DefaultIcon 追加 `,0` — 修复图标\n   - `SHChangeNotify(0x08000000)` — 通知 Explorer 刷新\n2. `tauri.conf.json` 中配置：\n   ```json\n   \"nsis\": {\n     \"installerHooks\": \"./nsis-hooks.nsh\"\n   }\n   ```\n3. 首次启动时 `register_shell_new` 作为保底（Settings 页面重新注册），但安装本身已包含正确关联。\n\n**验证方式**：安装后立即检查注册表 `HKCU\\Software\\Classes\\.md\\ShellNew` 是否存在、`HKCU\\Software\\Classes\\solo.markdown\\DefaultIcon` 是否以 `,0` 结尾。\n\n**相关文件**：`src-tauri\\nsis-hooks.nsh`, `src-tauri\\tauri.conf.json`\n\n---\n\n## 7. 故障排查\n\n### 7.1 构建失败速查表\n\n| 症状 | 原因 | 解决 |\n|---|---|---|\n| `vue-tsc` 类型错误 | TypeScript 类型不匹配 | 根据错误信息修正类型 |\n| `vite build` 报模块未找到 | `bun install` 未执行或失败 | 重跑 `bun install` |\n| `link.exe` 找不到 | MSVC 环境未激活 | 执行 `vcvars64.bat` |\n| `rustup` 找不到工具链 | `RUSTUP_HOME` 路径错误或尾随空格 | 检查环境变量（见 6.1） |\n| `cargo` 下载依赖失败 | 网络问题或 cargo 注册表不可达 | 设置代理或使用 `--offline` |\n| `makensis` 找不到 | NSIS 未安装（bunx tauri build 自带） | 确保 `bunx tauri build` 完整执行 |\n| WASM 相关错误 | 项目中不使用 WASM，忽略异常源 | 检查 `cargo build` 而非 `wasm-pack` |\n\n### 7.2 干净构建步骤\n\n如果遇到奇怪的问题，从头开始：\n\n```bash\n# 1. 清理前端缓存\nrm -rf node_modules bun.lock dist\nbun install\n\n# 2. 清理 Rust 缓存\ncd src-tauri\ncargo clean\ncd ..\n\n# 3. 重新构建\ncall M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\nset CARGO_HOME=M:\\rust\\.cargo\nset RUSTUP_HOME=M:\\rust\\.rustup\nset PATH=M:\\rust\\.cargo\\bin;%PATH%\nbunx tauri build\n```\n\n### 7.3 增量构建速度参考\n\n| 阶段 | 首次 | 增量 |\n|---|---|---|\n| `bun install` | ~30s | ~5s |\n| `vue-tsc --noEmit` | ~10s | ~8s |\n| `vite build` | ~13s | ~13s |\n| `cargo build --release` | ~1m54s | ~47s |\n| `makensis` | ~10s | ~10s |\n| **总计（tauri build）** | **~2m30s** | **~1m20s** |\n\n---\n\n## 8. 附录\n\n### 8.1 环境配置清单\n\n```\nRust:\n  rustc:   1.96.0 (stable-x86_64-pc-windows-msvc)\n  rustup:  M:\\rust\\.rustup\n  cargo:   M:\\rust\\.cargo\n\nMSVC:\n  Build Tools v14.44.35207\n  Path:    M:\\VS\\BuildTools\n  vcvars:  M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\n\nNode.js:\n  node:    v24.16.0\n  npm:     11.13.0\n  Path:    D:\\nodejs\\\n\nBun:\n  bun:     1.3.14\n\n项目:\n  根目录:  F:\\fzz-Project\\md-editor\n  Tauri:   2.11.2\n  wry:     0.55.1\n  webview2-com: 0.38.2\n  windows: 0.61.3\n```\n\n工具链磁盘占用：\n- Rust 工具链（rustup + cargo）：~1.4GB\n- MSVC Build Tools：~3.4GB\n\n### 8.2 关键依赖的 Cargo 版本\n\n```\ntauri = \"2\" (actually 2.11.2)\ntauri-plugin-opener = \"2\" (2.5.4)\ntauri-plugin-dialog = \"2.7.1\" (2.7.1)\ntauri-plugin-clipboard-manager = \"2\" (2.3.2)\ntauri-plugin-cli = \"2\" (2.4.1)\ntauri-plugin-store = \"2.4.3\" (2.4.3)\ntauri-plugin-window-state = \"2.4.1\" (2.4.1)\nserde = \"1\" (with derive)\nreqwest = \"0.12\" (with json)\ntokio = \"1\" (with macros, rt-multi-thread)\nbase64 = \"0.22\"\nwebview2-com = \"0.38.2\"         # Windows only\nwindows-core = \"0.61\"           # Windows only\n```\n\n### 8.3 关键 npm 依赖版本\n\n```\n@tauri-apps/api: ^2.11.0\n@tauri-apps/cli: ^2.11.2\n@tauri-apps/plugin-store: ^2.4.3\n@tauri-apps/plugin-window-state: ^2.4.1\n@tauri-apps/plugin-dialog: ^2.7.1\n@tauri-apps/plugin-clipboard-manager: ^2.3.2\n@tauri-apps/plugin-opener: ^2.5.4\n@tauri-apps/plugin-os: ^2.3.2\nvue-tsc: ^3.3.4\nvite: ^7.0.0\ntypescript: ~6.0.3\nvue: ^3.5.38\npinia: ^3.0.4\n```\n\n### 8.4 项目关键文件索引\n\n| 用途 | 路径 |\n|---|---|\n| Rust 入口 | `src-tauri/src/lib.rs` |\n| Rust 命令（窗口） | `src-tauri/src/commands/window.rs` |\n| Rust 命令（文档） | `src-tauri/src/commands/document.rs` |\n| Rust 状态管理 | `src-tauri/src/state.rs` |\n| Rust 菜单 | `src-tauri/src/menu.rs` |\n| Rust 错误模型 | `src-tauri/src/error.rs` |\n| Tauri 配置 | `src-tauri/tauri.conf.json` |\n| NSIS 安装钩子 | `src-tauri/nsis-hooks.nsh` |\n| Cargo 配置 | `src-tauri/Cargo.toml` |\n| 前端入口 | `src/main.ts` |\n| 前端协调层 | `src/App.vue` |\n| 编辑器组件 | `src/components/Editor/MarkdownEditor.vue` |\n| 文档生命周期 | `src/composables/useDocumentSession.ts` |\n| 窗口会话管理 | `src/composables/useAppWindowSession.ts` |\n| IPC 服务层 | `src/services/tauri/` |\n| 命令名登记 | `src/services/tauri/command-names.ts` |\n| Tailwind 配置 | `tailwind.config.js` |\n| Vite 配置 | `vite.config.ts` |\n| 架构文档 | `ARCHITECTURE.md` |\n| 运行故障排查 | `TROUBLESHOOTING.md` |\n| **正式发布流程** | **`RELEASE_PROCESS.md`** |\n\n### 8.5 常用命令速查\n\n```bash\n# 开发\nbun run dev                     # 纯前端开发 (Vite dev server)\nbun run dev:tauri               # Tauri 全栈开发（热更新）\nlaunch-dev.bat                  # 一键启动开发（含环境变量）\n\n# 构建\nbun run build                   # 前端构建（vue-tsc + vite）\nbun run build:tauri             # Tauri 全量构建（含 Rust + 打包）\nM:\\temp\\build_solo_full.bat     # 前端 + Rust 编译\nM:\\temp\\build_solo_tauri.bat    # 完整打包（含安装包）\n\n# 发布（新增 — 详见 RELEASE_PROCESS.md）\ngit tag v1.x.x && git push origin v1.x.x   # 触发 CI 发布\nbun run test                    # 运行 Vitest 测试\nbun run lint                    # ESLint 检查\nbun run format                  # Prettier 格式化\ncargo check --manifest-path src-tauri/Cargo.toml  # Rust 编译检查（快速）\n\n# 清理\ncargo clean --manifest-path src-tauri/Cargo.toml  # 清理 Rust 构建缓存\nbun run build --emptyOutDir     # 清理输出目录后构建\n```\n\n### 8.6 开发环境验证脚本\n\n以下脚本可快速验证环境是否就绪：\n\n```bash\necho Rust: && rustc --version && cargo --version && rustup show\necho MSVC: && dir \"M:\\VS\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat\"\necho Bun: && bun --version\necho Project: && cd F:\\fzz-Project\\md-editor && bun --version\n```\n\n期望输出：\n\n```\nRust: rustc 1.96.0 (ac68faa20 2026-05-25) / cargo 1.96.0\nMSVC: 目录存在\nBun: 1.3.14\nProject: 1.3.14\n```\n\n---\n\n> **最后提醒**：编译环境最大的敌人是**环境变量和目录**。每次报错先确认：当前在哪个目录、环境变量设对了没有、`vcvars64.bat` 执行了没有。保持冷静，按文档一步步来，你一定能编译成功。\n\n"},"PUBLISH_GUIDE.md":{"text":"# 小白发版教程\n\n> 开发改代码的事 AI 会做。你只需要在改完后，把做好的安装包发布出去。\n>\n> 本文是 [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md) 的**发版小白实操版**（核心只跑 3 条命令）；完整 Phase 定义、回滚与故障处理以 RELEASE_PROCESS 为真理源。\n\n---\n\n## 第一步：打开项目目录\n\n打开 PowerShell（Win + R → 输入 `powershell` → 回车），然后**复制粘贴**下面这行命令：\n\n```powershell\ncd F:\\fzz-Project\\md-editor\n```\n\n> 这行命令的意思是：告诉电脑\"我要在这个项目文件夹里干活\"。\n\n---\n\n## 第二步：检查 CI 有没有完成\n\n复制粘贴：\n\n```powershell\ngh run list --workflow=release.yml --limit 1 --json status,conclusion\n```\n\n你会看到类似这样的输出：\n\n```\n{\"conclusion\":\"success\",\"status\":\"completed\"}\n```\n\n> 关注两点：\n> - `status` 必须是 `\"completed\"`（做完了）\n> - `conclusion` 必须是 `\"success\"`（成功了）\n>\n> 如果还在跑（`\"in_progress\"`），就等几分钟再检查一次。\n\n---\n\n## 第三步：检查安装包是否齐全\n\n复制粘贴：\n\n```powershell\ngh release view v1.x.x\n```\n\n> 把 `v1.x.x` 换成真正的版本号，比如 `v1.2.13`。你会看到类似：\n\n```\ndraft: true\nasset: latest.json\nasset: solo_1.2.13_x64-setup.exe\nasset: solo_1.2.13_x64-setup.sig\n```\n\n> 确认三件事：\n> 1. `draft: true`（正常，此时还只有你自己能看到）\n> 2. 有 3 个 `asset`（.exe + .sig + latest.json）\n> 3. 版本号正确（比如 `1.2.13`）\n\n---\n\n## 第四步：发布出去\n\n复制粘贴（**记得换版本号**）：\n\n```powershell\ngh release edit v1.x.x --draft=false\n```\n\n> 这行命令的意思：把\"草稿\"变成\"正式版\"，这样所有用户才能收到更新。\n>\n> 如果成功会输出一个网页链接，像这样：\n> `https://github.com/jloft198479-cyber/solo/releases/tag/v1.2.13`\n\n---\n\n## 第五步：在自己电脑上验证\n\n打开你电脑上已安装的 solo 软件：\n\n1. 点击左下角**设置**\n2. 点**通用**\n3. 点**检查更新**\n4. 如果能弹出新版本的更新提示 → **大功告成 ✅**\n\n---\n\n## 常见问题\n\n### Q：验证更新没反应，说已经是最新版\n\n可能是你电脑上安装的版本已经是最新版了。可以看左下角关于里的版本号，如果已经是刚发布的版本就对了。\n\n### Q：忘了版本号是多少\n\n看这三个文件，里面的数字就是版本号：\n\n```powershell\nSelect-String -Path package.json,src-tauri\\Cargo.toml,src-tauri\\tauri.conf.json -Pattern '\"version\"|version = \"'\n```\n\n### Q：我什么都不会，怕搞坏\n\n发布操作是**只读 + 发布**，不会搞坏代码。最坏情况就是发布失败了，重新来一次就行。\n\n---\n\n**总结：只需要跑 3 条命令，等 CI 几分钟，就完事了。**\n"},"docs/PLAYBOOK.md":{"text":"# solo 发布剧本（Release Playbook）\n\n> **全生命周期总纲。** 发布机制的细节见 [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md)（本剧本的 Phase E/F 子文档）。\n> **受众**：人 + AI agent。两者都要能照着走、不漏步、不踩已知坑。\n> **目标**：流程清晰、执行规范、效率更高。\n> **核心原则**：**判断归人，机械归脚本。** 前半段（梳理/讨论/决策）靠人；后半段（校验/构建/发布）交给 `scripts/release-gate.ps1`。\n\n---\n\n## 总览\n\n```text\nA 文档梳理 ──▶ B 问题盘点 ──▶ C 优化提案 ──▶ D 提交纪律 ──▶ E 发布 ──▶ F 上线验证\n  (判断)        (判断)         (判断→执行)     (半机械)      (机械·脚本)   (机械+人验)\n```\n\n每一阶段都有 **入口条件 / 动作 / 出口关卡（go/no-go）**。出口关卡没过，不进下一阶段。这不是 bureaucracy，是飞行员的起飞前检查单——保证「不会漏、不会乱序」。\n\n---\n\n## Phase A — 文档梳理（判断）\n\n- **何时触发**：每个版本周期开始；或发现文档与代码脱节时。\n- **入口**：无。\n- **动作**：\n  - 对账：README / AGENTS / ARCHITECTURE / PROFILE 与新代码是否一致。\n  - 找残留：`marklight` 等历史字样、死链接、已移除功能仍被提及（如「导出 HTML/PDF」已于 v1.2.18 移除）。\n  - 外部文档（`design-samples/`、`.archive/`）按约定不入库，仅本地留档。\n- **出口关卡**：✅ 无过期/矛盾文档；待改项已进清单（带入 B/C，或 D 顺手改）。\n- **加速器**：可让 agent 跑文档洁净度审计（参考 `.workbuddy/doc-cleanliness-audit.md` 模式）。\n\n---\n\n## Phase B — 问题盘点与裁决（判断）\n\n- **入口**：用户反馈 / GitHub Issue / 自查发现。\n- **动作**：\n  - 记录 bug：环境 + 复现步骤 + 期望（用 `.github/ISSUE_TEMPLATE/bug_report.md`）。\n  - **裁决三选一**：① 现在修 → 进 C/D；② 不修 → 记入 `docs/KNOWN-ISSUES.md`；③ 排期 → 标记下个版本。\n  - **中文场景适用性评估**：接第三方库时，对其默认值做「中文是否成立」判断（例：`SlashCommands` 的 `allowedPrefixes` 默认 `[' ']`，中文无词间空格习惯会失效 → 显式传 `null`）。\n- **出口关卡**：✅ 本版要修的 bug 已确定并进入 C/D；不修/排期项有去向。\n- **合并重构铁律**：合并改动时，必须把「原有守卫规则」列成对照清单，逐条确认新逻辑覆盖（图片 IPC 合并曾丢 `assets/` 守卫、`../../` 越权 containment 校验——见 `RELEASE_PROCESS.md` §9.3 与 AGENTS.md 历史经验）。\n\n---\n\n## Phase C — 优化提案（判断 → 执行）\n\n> 这是 7-20 验证过的好模式（`ui-optimization-proposal.md` 提案 → 批准 → 分步执行 → 每步自检）。固化下来。\n\n1. **写提案文档**（`docs/<主题>-proposal.md`）：目标、方案、影响面、分步计划。\n2. **用户批准后才动手**（共识前置，见 SOUL.md 工作纪律）。\n3. **分步执行**，每步后自检：`vue-tsc --noEmit` → `bun run test` → `bun run build`。\n4. 每步可独立验证，**不一次全量**。\n- **出口关卡**：✅ 提案已批准 + 每步自检通过 + 未提交改动停在暂存区外待命（等 D）。\n- **偏好边界**：保存状态指示器必须反映真实落盘，不引入「乐观保存提前报喜」（7-20 用户明确否决，记入 `MEMORY.md`）。\n\n---\n\n## Phase D — 提交纪律（半机械）\n\n- **入口**：C 完成 / 直接修 bug 完成。\n- **拆分规则**（参考 7-20 三笔提交 `334c1d0` / `282e4da` / `ef343ac`）：\n  - **feat 提交**：功能/修复主体（相关多文件归一笔）。\n  - **bump 提交**：版本号变更独立一笔（`package.json` / `Cargo.toml` / `tauri.conf.json`）。\n  - **doc 提交**：PROFILE 版本历史等文档补充。\n- **message 规范**：见 `CONTRIBUTING.md`（Conventional 风格：`feat` / `fix` / `docs` / …）。\n- **出口关卡**：✅ `git status` 干净、无 secrets、无 `node_modules`/`target`；然后进 E（先 bump 再 tag）。\n\n---\n\n## Phase E — 发布（机械 · 脚本化）\n\n> 机制细节见 [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md)。本阶段用 `scripts/release-gate.ps1` 跑两道闸门，消灭手滑与易忘。\n\n### PreTag 闸门（打 tag 前）\n\n```powershell\npwsh scripts/release-gate.ps1 -Stage PreTag\n# 加 -Fast 仅跑版本三处一致 + replaceAll 扫描（迭代版本号时快速循环，跳过 test/build）\n```\n\n脚本自动完成：\n1. 版本三处一致校验（`package.json` / `Cargo.toml` / `tauri.conf.json`）。\n2. `replaceAll` / `replaceAllAsync` 扫描（TS target ES2020 禁用）。\n3. `bun run test` + `bun run build` 门禁（一键，失败即停）。\n\n### PostCI 闸门（tag 推送触发 CI 后）\n\n```powershell\npwsh scripts/release-gate.ps1 -Stage PostCI\n# 加 -Publish 才翻转 draft -> published（易忘步骤，显式开关，默认只校验不发布）\n```\n\n脚本自动完成：\n1. 轮询等 CI 完成（含超时保护，默认 25min）。\n2. 资产三件套核对（`.exe` / `.sig` / `latest.json`）。\n3. `latest.json` 版本校验（须等于 tag 版本）。\n4. `-Publish` 时翻转 `draft=false`（**不翻用户收不到更新**，见 `RELEASE_PROCESS.md` §7.1）。\n\n- **出口关卡**：✅ 两道闸门全绿 +（如需）已 `published`。\n\n---\n\n## Phase F — 上线验证（机械 + 人验）\n\n- **入口**：E 完成（已 `published`）。\n- **动作**：\n  - 已安装旧版 → 设置/通用/检查更新 → 确认弹新版 → 下载/安装/重启成功。\n  - 走 [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md) §10.4 手动回归（图片/路径/边界/升级）。\n- **出口关卡**：✅ 自动更新实测通过 + 回归清单全勾。\n- **收尾**：CHANGELOG 版本记录（已在 D 的 doc 提交里做）、CHANGELOG 对齐。\n\n---\n\n## 附录 — 闸门脚本速查\n\n| 命令 | 作用 | 关键开关 |\n|---|---|---|\n| `pwsh scripts/release-gate.ps1 -Stage PreTag` | 打 tag 前全闸门 | `-Fast`（跳过 test/build） |\n| `pwsh scripts/release-gate.ps1 -Stage PostCI` | CI 后校验 | `-Publish`（翻转发布）、`-CiTimeoutMin`（轮询上限） |\n\n**设计取舍**：脚本只做「判断结果的执行 + 机械校验」，不做任何产品决策。`-Publish` 默认关闭，避免误发；`/tmp` 路径错位坑（7-20 `gh release download` 在 Git Bash 落到 `F:\\tmp`）通过在项目内建 `.reltmp` 临时目录规避。\n"},"CONTRIBUTING.md":{"text":"# Contributing to solo\n\n感谢你（无论是人类开发者，还是另一个 AI agent）愿意接手或改进 solo。\n\n> **黄金法则（适用于所有人，尤其是 AI agent）**\n> **以代码为准，不以注释、文档或记忆为准。**\n> 改代码前先读实际行为；引用文件路径前先确认它存在；测试数量以命令实际输出为准，不要硬编码。本仓库的 `.trae/documents/` 目录已废弃，不要把它当真理源。\n\n---\n\n## 0. 先读这些（按顺序）\n\n| 顺序 | 文档 | 作用 |\n|---|---|---|\n| 1 | [`HANDOVER.md`](./HANDOVER.md) | 接手第一站：30 秒定位、环境、真理源文件 |\n| 2 | [`ARCHITECTURE.md`](./ARCHITECTURE.md) | 三层架构、决策阶梯、核心约束 |\n| 3 | [`AGENTS.md`](./AGENTS.md) | 工作纪律 + 文档地图 |\n| 4 | [`ARCHITECTURE.md §11`](./ARCHITECTURE.md) | 10 个 bug 易发区速查表，改前必看 |\n| 5 | [`docs/KNOWN-ISSUES.md`](./docs/KNOWN-ISSUES.md) | 已知问题 / 技术债 |\n| 6 | [`docs/debugging.md`](./docs/debugging.md) | 调试指南、环境坑位 |\n\n---\n\n## 1. 开发环境\n\n> **工具链版本、安装、环境变量配置、编译命令与踩坑**统一以 [BUILD_GUIDE.md](./BUILD_GUIDE.md) 为唯一真理源（§1 技术栈 / §2 安装 / §3 环境变量 / §4 编译 / §6–§7 踩坑）。本文只保留 BUILD_GUIDE 未覆盖的**本机特有坑位**。\n\n### 1.1 本机环境坑位（重要）\n\n> 以下坑是**本机特有**，CI（GitHub windows-latest）不受影响。本地开发务必照做。\n\n- **Rust / MSVC 不在默认 PATH**：编译前需手动加载 `vcvars64.bat` 并设置 `CARGO_HOME=M:\\rust\\.cargo`、`RUSTUP_HOME=M:\\rust\\.rustup`。完整 env 设置见 [BUILD_GUIDE.md §3](./BUILD_GUIDE.md)。\n- **bun 下 `vue-tsc` / `vite` / `vitest run <过滤>` 可能 segfault**：\n  - 类型检查兜底：`node node_modules/vue-tsc/bin/vue-tsc.js --noEmit`\n  - 构建兜底：`node node_modules/vite/bin/vite.js build`\n  - **测试必须全量跑**：`bun run test`（子集过滤会 segfault，全量不会）。\n\n---\n\n## 2. 常用命令\n\n```bash\nbun install                 # 安装 JS 依赖\nbun run dev                 # 仅前端（Vite）\nbun run dev:tauri           # 全栈（Rust + Vue）\nbun run dev:tauri:inspect   # 启动时自动开 DevTools（SOLO_OPEN_DEVTOOLS=1）\nbun run build               # vue-tsc --noEmit && vite build\nbun run build:tauri         # 打包安装器\nbun run test                # 全量 Vitest（happy-dom），必须 0 失败\nbun run lint                # 静态检查\n```\n\n验证标准动作见 [`docs/debugging.md` §验证标准动作](./docs/debugging.md)。\n\n---\n\n## 3. 分支与提交\n\n### 3.1 分支策略\n- 主分支：`master`（CI 在 push / PR 到 `master` / `main` 时跑测试）。\n- 功能 / 修复从 `master` 切出短生命周期分支，PR 回 `master`。\n\n### 3.2 提交信息\n- 用**中文**写 commit message（与历史一致），动词开头：`fix:` / `feat:` / `refactor:` / `chore:` / `docs:`。\n- 一句话说清「改了什么、为什么」。例如：\n  - `fix: 修复 asset:// 图片重开后裂图`\n  - `refactor: Callout 极简化 — 单一类型、无 icon`\n- 版本号提升用 `bump version to 1.x.x`（CI 识别语义）。\n\n### 3.3 提交前强制检查\n1. 跑 `bun run test` — **全量 0 失败**。\n2. 跑 `bun run build` — 类型 + 构建通过。\n3. 改了 Rust：本地 `cargo check`（按 §1.2 加载环境）必须过。\n4. 确认没有 `replaceAll` / `replaceAllAsync`（TS target = ES2020，用 `.split().join()` 替代）。检查：`rg \"replaceAll|replaceAllAsync\" src/`\n5. 先看 `git status` 再提交；**不提交 secrets、不提交 `node_modules` / `target`**。\n\n---\n\n## 4. 改代码的纪律（不可违反）\n\n1. **先读实际代码行为**，不以注释为准。\n2. **确认影响范围**：改了一个文件，还有哪些文件受影响？逐个检查。\n3. **改 parser / serializer 后必须**：\n   - `bun run test` 所有 roundtrip 测试通过；\n   - `vue-tsc --noEmit` 通过；\n   - `bun run build` 通过。\n4. **动「真理源」文件要格外小心**（见 `HANDOVER.md` 真理源表）：命令名只在 `command-names.ts`、命令定义只在 `registry.ts`、字体清单 `fonts.ts`、字体栈 `fontStack.ts`、主题映射 `types.ts::CSS_VAR_MAP`、Rust 命令总数 `lib.rs::generate_handler!`。\n5. **宁可少改，不要过度工程**（决策阶梯：YAGNI 优先）。\n\n---\n\n## 5. 报告问题 / 提 PR\n\n- **Bug 报告**：请使用仓库的 Issue 模板（`bug_report.md`），必填：环境版本、复现步骤、日志路径（`%APPDATA%\\solo\\`、`startup-open.log`）。\n- **PR**：请使用 PR 模板。说明「改了什么 / 为什么 / 测试如何验证」。\n- 发版相关请先读 [`RELEASE_PROCESS.md`](./RELEASE_PROCESS.md)（版本号四源一致、tag 规则、CI 流程）。\n\n---\n\n## 6. 给 AI agent 的特别提示\n\n- 不要信任 `.trae/documents/` 下的任何文档（已废弃，可能过时）。\n- 不要臆想测试数量、命令数量、文件存在性——用 `bun run test`、`Glob`、`Grep` 核实。\n- 改完务必跑全量测试 + 类型检查 + 构建，并把「坑位」记进 `docs/debugging.md`（若发现新坑）。\n- 涉及 Rust：本机必须按 §1.2 加载 MSVC 环境，否则 `cargo check` 会因缺 `cl.exe` 失败。\n"},"SECURITY.md":{"text":"# Security Policy\n\n## 1. 项目性质与攻击面\n\n**solo 是一个本地优先（local-first）的桌面 Markdown 编辑器**：纯前端 + Rust 桌面壳，**没有后端服务器、没有云端账户、不联网上传用户文档**。\n\n这意味着它的攻击面比「带后端的 Web 服务」小得多，但仍有几处需要认真对待：\n\n| 攻击面 | 说明 | 现状 |\n|---|---|---|\n| **图片资产路径穿越** | 渲染本地图片时，恶意构造的路径可能读取 `solo` 数据目录之外的文件 | Rust 侧 `validate_image_asset_path` 先做 `canonicalize` 再校验扩展名，防穿越 |\n| **自动更新供应链** | 自动更新会拉取 `latest.json` + 签名安装包，若签名校验被绕过可投毒 | 使用 Tauri updater + `TAURI_SIGNING_PRIVATE_KEY` 签名校验 |\n| **HTML / Markdown 粘贴** | 粘贴富文本 / HTML 时可能带入脚本、危险协议 | 前端 `turndown` 转换 + 内容经 TipTap/ProseMirror 净化；mermaid 用 `loose` 模式（本地单文件编辑器，风险可接受） |\n| **文件关联 / 右键新建** | 注册表项、`.md` 文件图标与 ShellNew | 安装时写入，卸载时清理 |\n| **WebView2 远程内容** | solo 本身不加载远程网页；CSP 已收紧（font-src 含 `blob:` 仅用于字体下载） | 仅加载本地 `asset://` 与 `http://asset.localhost` |\n\n> **不在攻击面内**：用户文档内容本身、本地文件系统读写（这是软件本职功能）、剪贴板（仅用户主动复制时写入）。\n\n---\n\n## 2. 支持的版本\n\n我们只对**最新正式版**提供安全修复。安全漏洞请在最新版上复现并报告。\n\n- 当前版本：`v1.2.24`（以 `package.json` 为准）。\n- 旧版本（< 最新版）不再单独打安全补丁；请升级到最新版。\n\n---\n\n## 3. 报告漏洞\n\n**请勿在公开 Issue 中披露安全漏洞。**\n\n请通过以下方式私下报告：\n\n- **微信**：`fzz198479`（项目维护者）\n- 或在仓库中创建 **private / 草稿 Issue / 私信**，标题注明 `[SECURITY]`。\n\n报告请包含：\n\n1. 漏洞类型（路径穿越 / 更新投毒 / XSS / 其他）\n2. 复现步骤（含环境版本，如 `v1.2.24`、Windows 版本）\n3. 影响范围评估（能读到什么、能执行什么）\n4. 如有，附最小复现样例或日志路径（`%APPDATA%\\solo\\`）\n\n我们会在收到报告后 **7 个工作日内**确认并评估，修复后随下一个版本发布，并在 `CHANGELOG.md` 中注明。\n\n---\n\n## 4. 已知安全相关设计取舍\n\n- **mermaid `securityLevel: 'loose'`**：本地优先单文件编辑器，文档由用户自己编写，外部注入风险极低，故放宽以修复「全黑」渲染问题。若未来支持加载不可信远程文档，需重新评估。\n- **图片资产 canonicalize 校验**：专门防御路径穿越，是安全边界的核心，改动需格外谨慎（见 `ARCHITECTURE.md` §11.4）。\n- **自动更新签名**：`TAURI_SIGNING_PRIVATE_KEY` 为 GitHub Secrets，不在仓库中。\n\n---\n\n## 5. 第三方依赖\n\nsolo 依赖 Tauri 2、Vue 3、TipTap/ProseMirror、Tailwind 等。依赖漏洞请先确认是否影响 solo 的实际攻击面（多数 Web 框架 CVE 不影响本地桌面壳），再决定是否升级。升级前先跑 `bun run test` + `bun run build`。\n"},"TROUBLESHOOTING.md":{"text":"# solo 运行故障排查指南\n\n> 面向**用户**的运行时问题排查，非编译问题（编译问题见 `BUILD_GUIDE.md`）。\n\n## 安装后问题\n\n### 1. 右键「新建」菜单出现两个 Markdown 项\n\n**原因**：旧版本（v1.2.2 及之前）注册了 `.markdown` 和 `.md` 两个 ShellNew。\n**解决**：\n1. 打开注册表编辑器 `regedit`\n2. 删除 `HKCU\\Software\\Classes\\.markdown\\ShellNew`（如果有）\n3. 确认 `HKCU\\Software\\Classes\\.md\\ShellNew` 存在且包含 `NullFile` 键（空值）\n4. 重启 Explorer 或重启电脑\n\n**根治**：v1.2.3+ 已在安装时自动清理 `.markdown\\ShellNew`，只需**卸载旧版 → 重启 → 安装新版**。\n\n### 2. `.md` 文件图标显示为空白/默认图标\n\n**原因**：Tauri 默认不写入 DefaultIcon 的 `,0` 索引后缀。\n**解决**：\n1. 重新运行最新安装包（v1.2.3+）\n2. 或者手动检查注册表：\n   - `HKCU\\Software\\Classes\\solo.markdown\\DefaultIcon\\`(默认) 值应为 `C:\\path\\to\\solo.exe,0`\n   - 如果缺少 `,0`，手动添加\n\n**根治**：安装包在 `NSIS_HOOK_POSTINSTALL` 中自动追加 `,0`。\n\n### 3. 安装后 `.md` 文件关联不生效（双击不打开）\n\n**原因**：Windows 文件关联优先级：`UserChoice` > `OpenWith` > `ProgID`。Tauri 写入的关联可能被其他程序覆盖。\n**解决**：\n1. 右键 `.md` 文件 → 打开方式 → 选择 solo\n2. 勾选「始终使用此应用打开 .md 文件」\n3. 重启 solo，启动时会调用 `register_shell_new` 刷新关联\n\n## 编辑器问题\n\n### 4. 编辑器一直空白/不显示内容\n\n**原因**：编辑器懒加载机制——`MarkdownEditor.vue` 只有在窗口获得焦点时才会创建 TipTap 实例。\n**触发条件**：窗口已显示但一直未激活（如被 Windows 前景锁压制）。\n**解决**：单击编辑器区域空白处即可触发 `lazyInitEditor`。\n\n### 5. 编辑器工具栏「导出 PDF」按钮名称成了「打印」\n\n**设计如此**：v1.2.0+ 已将名称修改为「打印」，因为实际调用的是浏览器打印功能而非真正的 PDF 生成。\n\n## 窗口/进程问题\n\n### 6. 关闭所有窗口后进程不退出\n\n**原因**：solo 使用多进程架构（v1.2.5+），每双击一个 `.md` 文件启动一个独立进程，关闭最后一个窗口时进程默认不退出。\n**解决**：从菜单选择「退出」→ 会调用 `app.exit(0)` 强制退出。如果菜单点了没反应：\n- 任务管理器中有没有残留 `solo.exe` 进程，手动结束即可（不影响其他进程打开的窗口）\n\n> v1.2.5 起不再使用单实例；一个窗口卡死或被强制结束进程，**不牵连**其他窗口。\n\n### 7. 编辑器内容丢失/未保存\n\nsolo 有自动保存机制（文档修改后 2s 自动保存）。如果遇到内容丢失：\n1. 检查 `%APPDATA%\\solo\\documents\\` 目录下是否存在 `.md` 文件\n2. 检查 `%APPDATA%\\solo\\settings.json` 中 `documents` 字段是否包含最近的文档路径\n3. 自动保存文件与编辑文件为同一路径（原地保存），非临时副本\n\n崩溃时 `.tmp` 文件的清理尚未实现。\n\n## 注册表参考\n\n| 路径 | 作用 |\n|---|---|\n| `HKCU\\Software\\Classes\\.md` | .md 扩展名关联 |\n| `HKCU\\Software\\Classes\\.md\\ShellNew` | 右键新建菜单（NullFile） |\n| `HKCU\\Software\\Classes\\.markdown` | .markdown 扩展名关联（建议删除 ShellNew） |\n| `HKCU\\Software\\Classes\\solo.markdown` | 自定义 ProgID |\n| `HKCU\\Software\\Classes\\solo.markdown\\DefaultIcon` | 文件图标路径（必须 `,0` 结尾） |\n| `HKCU\\Software\\Classes\\solo.markdown\\shell\\open\\command` | 双击打开命令 |\n| `HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\solo` | 卸载信息 |\n"},"src/main.ts":{"text":"import { createApp } from \"vue\";\nimport { createPinia } from \"pinia\";\nimport App from \"./App.vue\";\nimport \"./assets/styles/main.css\";\n\nconst app = createApp(App);\nconst pinia = createPinia();\n\napp.use(pinia);\napp.mount(\"#app\");"},"src-tauri/src/lib.rs":{"text":"mod commands;\r\nmod error;\r\nmod events;\r\nmod menu;\r\nmod models;\r\nmod state;\r\nmod updater;\r\n\r\nuse commands::*;\r\nuse models::{AppOpenPathsPayload, AppOpenSource};\r\nuse state::{FocusedWindow, LoadedWindows, PendingWindowPaths, StartupOpenRequests};\r\nuse std::collections::HashMap;\r\nuse std::fs::OpenOptions;\r\nuse std::io::Write;\r\nuse std::path::{Path, PathBuf};\r\nuse std::sync::atomic::{AtomicU64, Ordering};\r\nuse std::sync::Mutex;\r\nuse std::time::{SystemTime, UNIX_EPOCH};\r\nuse tauri::{Manager, WebviewUrl, WebviewWindowBuilder};\r\nuse tauri_plugin_window_state::StateFlags;\r\n\r\nstatic WINDOW_COUNTER: AtomicU64 = AtomicU64::new(0);\r\nstatic STARTUP_LOG_BUF: Mutex<Option<Vec<String>>> = Mutex::new(Some(Vec::new()));\r\n\r\n#[tauri::command]\r\nfn startup_ready(\r\n    loaded_windows: tauri::State<'_, LoadedWindows>,\r\n    pending_paths: tauri::State<'_, PendingWindowPaths>,\r\n    startup_requests: tauri::State<'_, StartupOpenRequests>,\r\n    window: tauri::WebviewWindow,\r\n) -> Result<Option<AppOpenPathsPayload>, error::AppError> {\r\n    // 此时 WebView 已完成渲染、Vue 已挂载、主题已应用，再显示窗口避免黑闪\r\n    window.show()?;\r\n\r\n    loaded_windows.mark_loaded(window.label().to_string())?;\r\n\r\n    let label = window.label().to_string();\r\n    if let Some(payload) = pending_paths.take(&label)? {\r\n        append_startup_log(\r\n            Some(&window.app_handle()),\r\n            format!(\"startup_ready: label={}, from pending_paths, payload={:?}\", label, payload),\r\n        );\r\n        return Ok(Some(payload));\r\n    }\r\n\r\n    let payload = startup_requests.take()?;\r\n    append_startup_log(\r\n        Some(&window.app_handle()),\r\n        format!(\"startup_ready: label={}, payload={:?}\", window.label(), payload),\r\n    );\r\n    Ok(payload)\r\n}\r\n\r\n/// 创建一个新的编辑器窗口。\r\n/// 通过原子计数器保证 label 唯一性。\r\nfn create_editor_window(\r\n    app: &tauri::AppHandle,\r\n    path: Option<String>,\r\n) -> Result<String, error::AppError> {\r\n    let label = format!(\"editor-{}\", WINDOW_COUNTER.fetch_add(1, Ordering::Relaxed));\r\n\r\n    let window = WebviewWindowBuilder::new(app, &label, WebviewUrl::App(\"index.html\".into()))\r\n        .title(\"solo\")\r\n        .inner_size(1200.0, 800.0)\r\n        .min_inner_size(320.0, 240.0)\r\n        .center()\r\n        .resizable(true)\r\n        .decorations(false)\r\n        .visible(false)\r\n        .build()\r\n        .map_err(|e| error::AppError::Native(e.to_string()))?;\r\n\r\n    // 有关联文件：存入 PendingWindowPaths，等前端 ready 后取走\r\n    if let Some(file_path) = path {\r\n        if let Some(pending) = app.try_state::<PendingWindowPaths>() {\r\n            let payload = AppOpenPathsPayload {\r\n                paths: vec![file_path],\r\n                source: AppOpenSource::NewWindow,\r\n            };\r\n            let _ = pending.insert(label.clone(), payload);\r\n        }\r\n    }\r\n\r\n    attach_window_events(&window, app);\r\n\r\n    #[cfg(target_os = \"macos\")]\r\n    window::apply_macos_window_background(&window, \"#ffffff\")?;\r\n\r\n    #[cfg(debug_assertions)]\r\n    if std::env::var_os(\"SOLO_OPEN_DEVTOOLS\").is_some() {\r\n        window.open_devtools();\r\n    }\r\n\r\n    // window.show() 由前端 startup_ready IPC 触发，避免黑闪\r\n    // 显式请求前台焦点，绕过 Windows 前台锁限制\r\n    let _ = window.set_focus();\r\n\r\n    append_startup_log(Some(app), format!(\"created window: label={}\", label));\r\n    Ok(label)\r\n}\r\n\r\n#[tauri::command]\r\nasync fn new_editor_window(\r\n    app: tauri::AppHandle,\r\n    path: Option<String>,\r\n) -> Result<String, error::AppError> {\r\n    create_editor_window(&app, path)\r\n}\r\n\r\n#[tauri::command]\r\nfn refresh_native_menu_shortcuts(\r\n    app: tauri::AppHandle,\r\n    shortcuts: HashMap<String, String>,\r\n) -> Result<(), error::AppError> {\r\n    menu::update_menu_shortcuts(&app, &shortcuts).map_err(error::AppError::from)\r\n}\r\n\r\n/// 手动检查更新时触发的代理检测。检测到代理时设 HTTPS_PROXY，否则清空。\r\n/// 前端调用此命令后再调 @tauri-apps/plugin-updater 的 check()。\r\n#[tauri::command]\r\nasync fn detect_proxy_for_update() -> Result<String, String> {\r\n    match updater::detect_github_proxy().await {\r\n        Some(proxy) => {\r\n            std::env::set_var(\"HTTPS_PROXY\", &proxy);\r\n            Ok(proxy)\r\n        }\r\n        None => {\r\n            std::env::remove_var(\"HTTPS_PROXY\");\r\n            Err(\"未检测到可用代理，将使用直连。若直连不上请检查网络配置。\".into())\r\n        }\r\n    }\r\n}\r\n\r\n#[tauri::command]\r\nfn reveal_startup_open_log(app: tauri::AppHandle) -> Result<String, error::AppError> {\r\n    use tauri_plugin_opener::OpenerExt;\r\n\r\n    append_startup_log(Some(&app), \"reveal_startup_open_log\");\r\n    flush_startup_log(&app);\r\n    let path = startup_log_path(Some(&app));\r\n    let path = path.to_string_lossy().to_string();\r\n    app.opener()\r\n        .reveal_item_in_dir(path.clone())\r\n        .map_err(|error| error::AppError::Native(error.to_string()))?;\r\n    Ok(path)\r\n}\r\n\r\nfn supported_open_path(path: &Path) -> bool {\r\n    matches!(\r\n        path.extension()\r\n            .and_then(|extension| extension.to_str())\r\n            .map(str::to_ascii_lowercase)\r\n            .as_deref(),\r\n        Some(\"md\" | \"markdown\" | \"txt\")\r\n    )\r\n}\r\n\r\nfn startup_log_path(app: Option<&tauri::AppHandle>) -> PathBuf {\r\n    app.and_then(|handle| handle.path().app_log_dir().ok())\r\n        .unwrap_or_else(std::env::temp_dir)\r\n        .join(\"startup-open.log\")\r\n}\r\n\r\nfn flush_startup_log(app: &tauri::AppHandle) {\r\n    let path = startup_log_path(Some(app));\r\n    let lines = STARTUP_LOG_BUF.lock().ok().and_then(|mut guard| guard.take());\r\n    if let Some(lines) = lines {\r\n        if lines.is_empty() {\r\n            if let Some(parent) = path.parent() {\r\n                let _ = std::fs::create_dir_all(parent);\r\n            }\r\n            return;\r\n        }\r\n        if let Some(parent) = path.parent() {\r\n            let _ = std::fs::create_dir_all(parent);\r\n        }\r\n        if let Ok(mut file) = OpenOptions::new().create(true).append(true).open(&path) {\r\n            for line in &lines {\r\n                let _ = writeln!(file, \"{}\", line);\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\nfn append_startup_log(app: Option<&tauri::AppHandle>, message: impl AsRef<str>) {\r\n    let timestamp_ms = SystemTime::now()\r\n        .duration_since(UNIX_EPOCH)\r\n        .map(|duration| duration.as_millis())\r\n        .unwrap_or_default();\r\n\r\n    let line = format!(\"[{}] {}\", timestamp_ms, message.as_ref());\r\n\r\n    if let Ok(mut guard) = STARTUP_LOG_BUF.lock() {\r\n        if let Some(buf) = guard.as_mut() {\r\n            buf.push(line);\r\n            return;\r\n        }\r\n    }\r\n\r\n    let path = startup_log_path(app);\r\n    if let Some(parent) = path.parent() {\r\n        let _ = std::fs::create_dir_all(parent);\r\n    }\r\n    if let Ok(mut file) = OpenOptions::new().create(true).append(true).open(&path) {\r\n        let _ = writeln!(file, \"{}\", line);\r\n    }\r\n}\r\n\r\nfn normalize_open_path(value: &str, cwd: Option<&str>) -> Option<String> {\r\n    if value.starts_with('-') {\r\n        return None;\r\n    }\r\n\r\n    let path = PathBuf::from(value);\r\n    if !supported_open_path(&path) {\r\n        return None;\r\n    }\r\n\r\n    let path = if path.is_absolute() {\r\n        path\r\n    } else if let Some(cwd) = cwd {\r\n        PathBuf::from(cwd).join(path)\r\n    } else {\r\n        path\r\n    };\r\n    path.to_str().map(|value| value.to_string())\r\n}\r\n\r\nfn open_paths_from_args<I, S>(args: I, cwd: Option<&str>) -> Vec<String>\r\nwhere\r\n    I: IntoIterator<Item = S>,\r\n    S: AsRef<str>,\r\n{\r\n    args.into_iter()\r\n        .filter_map(|arg| normalize_open_path(arg.as_ref(), cwd))\r\n        .collect()\r\n}\r\n\r\npub fn run() {\r\n    let updater = tauri_plugin_updater::Builder::new();\r\n\r\n    tauri::Builder::default()\r\n        .plugin(tauri_plugin_opener::init())\r\n        .plugin(tauri_plugin_dialog::init())\r\n        .plugin(tauri_plugin_clipboard_manager::init())\r\n        .plugin(tauri_plugin_cli::init())\r\n        .plugin(tauri_plugin_store::Builder::default().build())\r\n        .plugin(updater.build())\r\n        .plugin(\r\n            tauri_plugin_window_state::Builder::default()\r\n                .with_state_flags(\r\n                    StateFlags::SIZE\r\n                        | StateFlags::POSITION\r\n                        | StateFlags::MAXIMIZED,\r\n                )\r\n                .map_label(|label| {\r\n                    if label.starts_with(\"main-\") {\r\n                        \"secondary\"\r\n                    } else {\r\n                        label\r\n                    }\r\n                })\r\n                .build(),\r\n        )\r\n        .setup(|app| {\r\n            app.manage(StartupOpenRequests::default());\r\n            app.manage(PendingWindowPaths::default());\r\n            app.manage(LoadedWindows::default());\r\n            app.manage(FocusedWindow::default());\r\n\r\n            let raw_args = std::env::args().collect::<Vec<_>>();\r\n            append_startup_log(\r\n                Some(&app.handle()),\r\n                format!(\"setup raw args={:?}\", raw_args),\r\n            );\r\n\r\n            let raw_paths = open_paths_from_args(raw_args.iter().skip(1), None);\r\n            if !raw_paths.is_empty() {\r\n                append_startup_log(\r\n                    Some(&app.handle()),\r\n                    format!(\"startup paths from raw args={:?}\", raw_paths),\r\n                );\r\n                if let Some(state) = app.try_state::<StartupOpenRequests>() {\r\n                    let _ = state.merge(AppOpenPathsPayload {\r\n                        paths: raw_paths,\r\n                        source: AppOpenSource::Cli,\r\n                    });\r\n                }\r\n            }\r\n\r\n            use tauri_plugin_cli::CliExt;\r\n            if let Ok(matches) = app.cli().matches() {\r\n                if let Some(file_arg) = matches.args.get(\"file\") {\r\n                    if let Some(file_path) = file_arg.value.as_str() {\r\n                        append_startup_log(\r\n                            Some(&app.handle()),\r\n                            format!(\"startup cli file arg={}\", file_path),\r\n                        );\r\n                        if let Some(file_path) = normalize_open_path(file_path, None) {\r\n                            if let Some(state) = app.try_state::<StartupOpenRequests>() {\r\n                                let _ = state.merge(AppOpenPathsPayload {\r\n                                    paths: vec![file_path],\r\n                                    source: AppOpenSource::Cli,\r\n                                });\r\n                            }\r\n                        } else if let Some(state) = app.try_state::<StartupOpenRequests>() {\r\n                            let _ = state.merge(AppOpenPathsPayload {\r\n                                paths: vec![file_path.to_string()],\r\n                                source: AppOpenSource::Cli,\r\n                            });\r\n                        };\r\n                    }\r\n                }\r\n            }\r\n\r\n            menu::setup_menu(&app.handle(), &HashMap::new()).map_err(error::AppError::from)?;\r\n            menu::attach_menu_events(&app.handle());\r\n\r\n            if let Some(main_window) = app.get_webview_window(\"main\") {\r\n                #[cfg(any(target_os = \"windows\", target_os = \"linux\"))]\r\n                main_window\r\n                    .set_decorations(false)\r\n                    .map_err(error::AppError::from)?;\r\n\r\n                #[cfg(target_os = \"macos\")]\r\n                apply_macos_window_background(&main_window, \"#ffffff\")?;\r\n\r\n                #[cfg(debug_assertions)]\r\n                if std::env::var_os(\"SOLO_OPEN_DEVTOOLS\").is_some() {\r\n                    main_window.open_devtools();\r\n                }\r\n\r\n                attach_window_events(&main_window, app.handle());\r\n            }\r\n\r\n            flush_startup_log(app.handle());\r\n            Ok(())\r\n        })\r\n        .invoke_handler(tauri::generate_handler![\r\n            open_document,\r\n            save_document,\r\n            rename_file,\r\n            import_document_image,\r\n            save_clipboard_image,\r\n            authorize_image_asset,\r\n            resolve_image_display,\r\n            read_clipboard_html,\r\n            fetch_remote_image,\r\n            startup_ready,\r\n            new_editor_window,\r\n            fetch_font_data,\r\n            get_cached_font_path,\r\n            save_font_cache,\r\n            refresh_native_menu_shortcuts,\r\n            reveal_startup_open_log,\r\n            exit_app,\r\n            set_window_background_color,\r\n            register_shell_new,\r\n            unregister_shell_new,\r\n            detect_proxy_for_update\r\n        ])\r\n        .build(tauri::generate_context!())\r\n        .expect(\"error while running tauri application\")\r\n        .run(|_app_handle, _event| {\r\n            #[cfg(any(target_os = \"macos\", target_os = \"ios\"))]\r\n            if let tauri::RunEvent::Opened { urls } = &_event {\r\n                append_startup_log(\r\n                    Some(_app_handle),\r\n                    format!(\"RunEvent::Opened urls={:?}\", urls),\r\n                );\r\n                let paths = urls\r\n                    .iter()\r\n                    .filter_map(|url| url.to_file_path().ok())\r\n                    .filter_map(|path| path.to_str().map(|value| value.to_string()))\r\n                    .collect::<Vec<_>>();\r\n\r\n                for path in paths {\r\n                    if let Err(e) = create_editor_window(_app_handle, Some(path)) {\r\n                        append_startup_log(Some(_app_handle), format!(\"RunEvent::Opened create_editor_window error: {e}\"));\r\n                    }\r\n                }\r\n            }\r\n        });\r\n}\r\n"},"src/components/Editor/MarkdownEditor.vue":{"text":"<template>\r\n    <div\r\n      class=\"editor-shell relative h-full w-full cursor-text transition-colors\"\r\n      @click=\"lazyInitEditor\"\r\n    >\r\n    <div ref=\"editorWrapRef\" class=\"mk-editor h-full overflow-y-auto outline-none\">\r\n      <div class=\"mk-editor-inner\">\r\n        <EditorContent v-if=\"editor\" :editor=\"editor\" />\r\n      </div>\r\n    </div>\r\n\r\n    <BubbleMenuComponent ref=\"bubbleMenuRef\" :on-action=\"onBubbleMenuAction\" />\r\n    <SlashMenu ref=\"slashMenuRef\" :items=\"slashMenuItems\" :command=\"slashMenuCommand\" />\r\n    <EmojiMenu ref=\"emojiMenuRef\" :items=\"emojiMenuItems\" :command=\"emojiMenuCommand\" />\r\n\r\n    <!-- 搜索替换面板 -->\r\n    <Transition name=\"search-panel\" :appear=\"true\">\r\n    <div v-show=\"isSearchVisible\" class=\"search-panel\" @keydown.escape.stop=\"handleSearchEscape\">\r\n      <div class=\"search-row\">\r\n        <svg class=\"search-icon\" width=\"14\" height=\"14\" viewBox=\"0 0 15 15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\r\n          <circle cx=\"6\" cy=\"6\" r=\"4.5\" />\r\n          <line x1=\"9.5\" y1=\"9.5\" x2=\"14\" y2=\"14\" />\r\n        </svg>\r\n        <input\r\n          ref=\"searchInputRef\"\r\n          v-model=\"searchQuery\"\r\n          type=\"text\"\r\n          placeholder=\"搜索…\"\r\n          class=\"search-input\"\r\n          spellcheck=\"false\"\r\n          @input=\"onSearchQuery(searchQuery)\"\r\n          @keydown.enter.exact.prevent=\"onSearchNext()\"\r\n          @keydown.shift.enter.prevent=\"onSearchPrev()\"\r\n        />\r\n        <div class=\"search-meta\">\r\n          <button\r\n            class=\"search-btn-meta\"\r\n            :class=\"{ active: caseSensitive }\"\r\n            title=\"区分大小写\"\r\n            @click=\"toggleCaseSensitive\"\r\n          >\r\n            Aa\r\n          </button>\r\n          <span v-if=\"searchMatchCount > 0\" class=\"search-count\">{{ searchCurrentIndex }}/{{ searchMatchCount }}</span>\r\n        </div>\r\n        <button class=\"search-btn-nav\" title=\"上一个 (Shift+Enter)\" @click=\"onSearchPrev()\">\r\n          <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" fill=\"currentColor\"><path d=\"M5 2l4 6H1z\" /></svg>\r\n        </button>\r\n        <button class=\"search-btn-nav\" title=\"下一个 (Enter)\" @click=\"onSearchNext()\">\r\n          <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" fill=\"currentColor\"><path d=\"M1 2h8l-4 6z\" /></svg>\r\n        </button>\r\n        <button class=\"search-btn-close\" title=\"关闭 (Esc)\" @click=\"closeSearch()\">\r\n          <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><line x1=\"1\" y1=\"1\" x2=\"9\" y2=\"9\" /><line x1=\"9\" y1=\"1\" x2=\"1\" y2=\"9\" /></svg>\r\n        </button>\r\n      </div>\r\n\r\n      <div v-if=\"showReplace\" class=\"search-row search-replace-row\">\r\n        <svg class=\"search-icon\" width=\"14\" height=\"14\" viewBox=\"0 0 15 15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\r\n          <path d=\"M4.5 2v10M2.5 9.5l2 2 2-2M10.5 13V3M8.5 5.5l2-2 2 2\" />\r\n        </svg>\r\n        <input\r\n          v-model=\"replaceText\"\r\n          type=\"text\"\r\n          placeholder=\"替换为…\"\r\n          class=\"search-input\"\r\n          spellcheck=\"false\"\r\n          @keydown.enter.prevent=\"onSearchReplace(replaceText)\"\r\n        />\r\n        <div class=\"search-actions\">\r\n          <button class=\"search-action-btn\" :disabled=\"searchMatchCount === 0\" @click=\"onSearchReplace(replaceText)\">替换</button>\r\n          <button class=\"search-action-btn\" :disabled=\"searchMatchCount === 0\" @click=\"onSearchReplaceAll(replaceText)\">全部替换</button>\r\n        </div>\r\n      </div>\r\n    </div>\r\n    </Transition>\r\n  </div>\r\n</template>\r\n\r\n<script setup lang=\"ts\">\r\nimport { nextTick, onMounted, ref, shallowRef, onBeforeUnmount, watch } from 'vue';\r\nimport { debounce } from 'lodash-es';\r\nimport { Editor as TiptapEditor, EditorContent } from '@tiptap/vue-3';\r\nimport { getCurrentWindow } from '@tauri-apps/api/window';\r\n\r\nimport { useFileStore } from '../../stores/file';\r\nimport { useSettingsStore } from '../../stores/settings';\r\nimport { parseMarkdown } from './tiptap/markdown/parser';\r\nimport { serializeMarkdown, serializeClipboardSlice } from './tiptap/markdown/serializer';\r\nimport type { Slice } from '@tiptap/pm/model';\r\nimport type { EditorView } from '@tiptap/pm/view';\r\nimport type { SlashCommandItem } from './tiptap/extensions/slash-commands';\r\nimport type { EmojiItem } from './tiptap/extensions/emoji-suggest';\r\nimport {\r\n  executeEditorCommand,\r\n  runBubbleMenuAction,\r\n  type BubbleMenuActionData,\r\n} from './tiptap/editor-commands';\r\nimport { createEditorExtensions, type SlashMenuController, type EmojiMenuController } from './tiptap/editor-extensions';\r\nimport {\r\n  extractEditorOutline,\r\n  getEditorCursorInfo,\r\n  getEditorWordCount,\r\n  type EditorOutlineItem,\r\n} from './tiptap/editor-metadata';\r\nimport { setupEditorImageDrop } from './tiptap/editor-image-drop';\r\nimport { resetLocalSrcResolver, setLocalSrcResolver } from './tiptap/extensions/image';\r\nimport { useEditorAppearance } from './tiptap/useEditorAppearance';\r\nimport { useEditorSearch, pulseJumpTarget } from './tiptap/useEditorSearch';\r\nimport { resolveImageDisplay } from '../../services/tauri/document';\r\nimport { toAssetUrl } from '../../services/tauri/asset';\r\nimport { refreshParagraphFocus } from './tiptap/extensions/paragraph-focus';\r\nimport BubbleMenuComponent from './views/BubbleMenu.vue';\r\nimport SlashMenu from './views/SlashMenu.vue';\r\nimport EmojiMenu from './views/EmojiMenu.vue';\r\nimport './tiptap/editor.css';\r\n\r\ntype EditorUpdatePayload = {\r\n  wordCount?: number;\r\n  cursor?: { line: number; col: number };\r\n  selectionText?: string;\r\n  outline?: EditorOutlineItem[];\r\n};\r\n\r\n// 字数统计轻量（读 doc.textContent），150ms 均衡响应与开销\r\nconst WORD_COUNT_DEBOUNCE_MS = 150;\r\n// 大纲提取需遍历 headings，500ms 避免高频编辑时频繁重建\r\nconst OUTLINE_DEBOUNCE_MS = 500;\r\n// 序列化防抖：500ms 停顿后再序列化 markdown 并同步 store，避免连续击键时频繁序列化\r\nconst SERIALIZE_DEBOUNCE_MS = 500;\r\n// 光标信息防抖：拖选时频繁触发 selection 更新，100ms 节流避免全量遍历 doc 计算行号\r\nconst CURSOR_INFO_DEBOUNCE_MS = 100;\r\n\r\nconst props = defineProps<{ initialContent?: string }>();\r\nconst emit = defineEmits<{\r\n  (e: 'update', data: EditorUpdatePayload): void;\r\n  (e: 'image-dblclick', src: string): void;\r\n}>();\r\n\r\n// 图片双击事件处理（用于冒泡监听器移除）\r\nfunction handleImageDblClick(event: Event) {\r\n  const detail = (event as CustomEvent).detail;\r\n  if (detail?.src) {\r\n    emit('image-dblclick', detail.src);\r\n  }\r\n}\r\n\r\nconst fileStore = useFileStore();\r\nconst settingsStore = useSettingsStore();\r\nconst editorWrapRef = ref<HTMLElement | null>(null);\r\nconst bubbleMenuRef = ref<InstanceType<typeof BubbleMenuComponent> | null>(null);\r\nconst slashMenuRef = ref<SlashMenuController | null>(null);\r\nconst slashMenuItems = ref<SlashCommandItem[]>([]);\r\nconst slashMenuCommand = ref<(item: SlashCommandItem) => void>(() => {});\r\nconst emojiMenuRef = ref<EmojiMenuController | null>(null);\r\nconst emojiMenuItems = ref<EmojiItem[]>([]);\r\nconst emojiMenuCommand = ref<(item: EmojiItem) => void>(() => {});\r\nconst editor = shallowRef<TiptapEditor | null>(null);\r\nuseEditorAppearance(editor);\r\n\r\n// ── 创建 TipTap Editor ────────────────────────────────────────\r\n\r\nconst {\r\n  isSearchVisible,\r\n  searchMatchCount,\r\n  searchCurrentIndex,\r\n  onSearchQuery,\r\n  onSearchNext,\r\n  onSearchPrev,\r\n  onSearchReplace,\r\n  onSearchReplaceAll,\r\n  onSearchCaseSensitive,\r\n  currentMatches,\r\n  openSearch,\r\n  closeSearch,\r\n} = useEditorSearch(editor);\r\n\r\nconst searchQuery = ref('');\r\nconst replaceText = ref('');\r\nconst showReplace = ref(false);\r\nconst caseSensitive = ref(false);\r\nconst searchInputRef = ref<HTMLInputElement | null>(null);\r\n\r\nwatch(isSearchVisible, (visible) => {\r\n  if (visible) {\r\n    nextTick(() => searchInputRef.value?.focus());\r\n  } else {\r\n    // 关闭时重置状态\r\n    searchQuery.value = '';\r\n    replaceText.value = '';\r\n    showReplace.value = false;\r\n  }\r\n});\r\n\r\nfunction toggleCaseSensitive() {\r\n  caseSensitive.value = !caseSensitive.value;\r\n  onSearchCaseSensitive(caseSensitive.value);\r\n  if (searchQuery.value) onSearchQuery(searchQuery.value);\r\n}\r\n\r\nfunction handleSearchEscape() {\r\n  if (showReplace.value) {\r\n    showReplace.value = false;\r\n  } else {\r\n    closeSearch();\r\n  }\r\n}\r\n\r\nfunction createEditor(content: string) {\r\n  if (editor.value) {\r\n    editor.value.destroy();\r\n  }\r\n\r\n  const e = new TiptapEditor({\r\n    extensions: createEditorExtensions({\r\n      slashMenuRef,\r\n      slashMenuItems,\r\n      slashMenuCommand,\r\n      emojiMenuRef,\r\n      emojiMenuItems,\r\n      emojiMenuCommand,\r\n      searchHighlightOptions: {\r\n        getMatches: () => currentMatches.value,\r\n        getActiveIndex: () => searchCurrentIndex.value - 1,\r\n      },\r\n      getDocumentPath: () => fileStore.currentFile.path,\r\n      getStoragePath: () => settingsStore.settings.imageStoragePath || null,\r\n    }),\r\n    editorProps: {\r\n      attributes: {\r\n        class: 'tiptap-editor',\r\n        spellcheck: settingsStore.settings.spellCheck ? 'true' : 'false',\r\n      },\r\n      // 出站修复：选区复制时产出 Markdown 纯文本，确保 callout / 数学公式 /\r\n      // mermaid / wikilink / frontmatter / 脚注等扩展语法粘到外部 MD 编辑器不丢。\r\n      // text/html 仍由 ProseMirror 默认生成（标准格式走 HTML 还原，不受影响）。\r\n      clipboardTextSerializer: (slice: Slice, view: EditorView) => {\r\n        return serializeClipboardSlice(view.state.doc, slice);\r\n      },\r\n    },\r\n    onUpdate: ({ editor: ed }) => {\r\n      const t = ed as unknown as TiptapEditor;\r\n      // 即时标脏：用户打字后状态栏立刻显示\"未保存\"，不等防抖\r\n      fileStore.markUserEdit();\r\n      debouncedWordCount(t);\r\n      debouncedOutline(t);\r\n      debouncedSerialize(t);\r\n    },\r\n    onSelectionUpdate: ({ editor: ed }) => {\r\n      rafUpdateBubbleMenu(ed as unknown as TiptapEditor);\r\n      debouncedEmitCursorInfo(ed as unknown as TiptapEditor);\r\n    },\r\n  });\r\n\r\n  // 解析 markdown 并设置文档\r\n  if (content) {\r\n    const doc = parseMarkdown(e.schema, content);\r\n    e.commands.setContent(doc.toJSON(), { emitUpdate: false });\r\n  }\r\n\r\n  editor.value = e;\r\n\r\n  // 自动聚集，打开即写（注意：需在 editor.value 赋值之后调用，否则 isFocused 为 false）\r\n  e.commands.focus('start');\r\n\r\n  // 同步基线 — 直接用原始内容建立，避免无意义的解析→序列化轮转\r\n  fileStore.setContent(content || '');\r\n\r\n  // 触发初始字数统计\r\n  const wc = getEditorWordCount(e);\r\n  const ol = extractEditorOutline(e);\r\n  emit('update', { wordCount: wc, outline: ol });\r\n}\r\n\r\n// ── 更新回调 ──────────────────────────────────────────────────\r\n\r\n// 字数统计：轻量操作，150ms 快速响应\r\nconst debouncedWordCount = debounce((ed: TiptapEditor) => {\r\n  if (ed.isDestroyed) return;\r\n  emit('update', { wordCount: getEditorWordCount(ed) });\r\n}, WORD_COUNT_DEBOUNCE_MS);\r\n\r\n// 大纲提取：需遍历 headings，500ms 低频率刷新\r\nconst debouncedOutline = debounce((ed: TiptapEditor) => {\r\n  if (ed.isDestroyed) return;\r\n  emit('update', { outline: extractEditorOutline(ed) });\r\n}, OUTLINE_DEBOUNCE_MS);\r\n\r\n// 序列化 + store 同步：重量操作，500ms 防抖减少频繁序列化开销\r\nconst debouncedSerialize = debounce((ed: TiptapEditor) => {\r\n  // 防止 debounce 延迟期间切换文件导致旧内容写入新文件\r\n  if (ed.isDestroyed) return;\r\n\r\n  const markdown = serializeMarkdown(ed.state.doc);\r\n  // 规范化比较：序列化器总是追加 \\n，store 初始值可能是 ''\r\n  const normalizedStored = fileStore.currentFile.content.replace(/\\n+$/, '');\r\n  const normalizedNew = markdown.replace(/\\n+$/, '');\r\n  if (normalizedNew !== normalizedStored) {\r\n    fileStore.setContent(markdown);\r\n  }\r\n}, SERIALIZE_DEBOUNCE_MS);\r\n\r\n// 选区信息更新做节流，避免拖选时频繁全量遍历 doc 计算行号\r\nconst debouncedEmitCursorInfo = debounce((ed: TiptapEditor) => {\r\n  if (ed.isDestroyed) return;\r\n  emit('update', getEditorCursorInfo(ed));\r\n}, CURSOR_INFO_DEBOUNCE_MS);\r\n\r\n// ── 文件切换：复用 editor 实例替换文档（避免全量重建） ─────────\r\nwatch(\r\n  () => fileStore.currentFile.path,\r\n  () => {\r\n    if (!editor.value || editor.value.isDestroyed) return;\r\n    const content = fileStore.currentFile.content;\r\n    // 比较当前 editor 序列化结果与目标内容，相同则跳过（如另存为场景）\r\n    const currentMarkdown = serializeMarkdown(editor.value.state.doc).replace(/\\n+$/, '');\r\n    const targetMarkdown = content.replace(/\\n+$/, '');\r\n    if (currentMarkdown === targetMarkdown) return;\r\n\r\n    debouncedWordCount.cancel();\r\n    debouncedOutline.cancel();\r\n    debouncedSerialize.cancel();\r\n    debouncedEmitCursorInfo.cancel();\r\n    const doc = parseMarkdown(editor.value.schema, content);\r\n    // emitUpdate: false 避免触发 onUpdate 导致误判 dirty\r\n    editor.value.commands.setContent(doc.toJSON(), { emitUpdate: false });\r\n    // 重置基线：直接用目标内容，避免一次序列化\r\n    fileStore.setContent(targetMarkdown);\r\n    // setContent({ emitUpdate:false }) 不触发 onUpdate → 手动补发字数和大纲\r\n    const wc = getEditorWordCount(editor.value);\r\n    const ol = extractEditorOutline(editor.value);\r\n    emit('update', { wordCount: wc, outline: ol });\r\n    editor.value.commands.focus('start');\r\n  },\r\n);\r\n\r\n// ── BubbleMenu ────────────────────────────────────────────────\r\n\r\nlet _bubbleMenuRafId: number | null = null;\r\nlet _bubbleMenuPendingEd: TiptapEditor | null = null;\r\n\r\nfunction rafUpdateBubbleMenu(ed: TiptapEditor) {\r\n  _bubbleMenuPendingEd = ed;\r\n  if (_bubbleMenuRafId != null) return;\r\n  _bubbleMenuRafId = requestAnimationFrame(() => {\r\n    _bubbleMenuRafId = null;\r\n    const e = _bubbleMenuPendingEd;\r\n    _bubbleMenuPendingEd = null;\r\n    if (e && !e.isDestroyed) updateBubbleMenu(e);\r\n  });\r\n}\r\n\r\nfunction updateBubbleMenu(ed: TiptapEditor) {\r\n  const { from, to, empty } = ed.state.selection;\r\n  // IME 输入法组合输入期间抑制 BubbleMenu，避免中文标点输入时闪烁\r\n  if (empty || (ed.view as unknown as { composing?: boolean }).composing) {\r\n    bubbleMenuRef.value?.update(false, 0, 0, {});\r\n    return;\r\n  }\r\n\r\n  // 获取选区坐标\r\n  const coords = ed.view.coordsAtPos(from);\r\n  const endCoords = ed.view.coordsAtPos(to);\r\n  // 定位到选区右端，格式栏显示在右侧，避免行首时溢出左边界\r\n  // 视口边界钳位：防止 BubbleMenu 溢出右边界\r\n  const BUBBLE_MENU_ESTIMATED_WIDTH = 360;\r\n  const BUBBLE_MENU_OFFSET_X = 8;\r\n  const viewportWidth = window.innerWidth;\r\n  const maxLeft = viewportWidth - BUBBLE_MENU_ESTIMATED_WIDTH - BUBBLE_MENU_OFFSET_X - 8;\r\n  const left = Math.max(8, Math.min(endCoords.right, maxLeft));\r\n  const top = coords.top;\r\n\r\n  // 检测当前 marks\r\n  const marks = {\r\n    bold: ed.isActive('bold'),\r\n    italic: ed.isActive('italic'),\r\n    code: ed.isActive('code'),\r\n    link: ed.isActive('link'),\r\n    bulletList: ed.isActive('bulletList'),\r\n  };\r\n\r\n  const linkAttributes = ed.getAttributes('link') as { href?: unknown };\r\n  const linkHref = typeof linkAttributes.href === 'string' ? linkAttributes.href : undefined;\r\n\r\n  bubbleMenuRef.value?.update(true, left, top, marks, linkHref);\r\n}\r\n\r\nfunction onBubbleMenuAction(type: string, data?: BubbleMenuActionData) {\r\n  runBubbleMenuAction(editor.value, type, data);\r\n}\r\n\r\n// ── 图片拖拽上传 ──────────────────────────────────────────────\r\n\r\nlet unlistenDragDrop: (() => void) | null = null;\r\n\r\nasync function setupDragDrop() {\r\n  unlistenDragDrop = await setupEditorImageDrop({\r\n    editor,\r\n    getDocumentPath: () => fileStore.currentFile.path,\r\n    getStoragePath: () => settingsStore.settings.imageStoragePath || null,\r\n  });\r\n}\r\n\r\n// ── 编辑器懒初始化 ────────────────────────────────────────────────\r\n// 新窗口打开时不立即创建编辑器，首次聚焦或点击时才初始化。\r\n// 注意：不活跃窗口不销毁编辑器——保留内容可见，仅由 Rust 侧\r\n// MemoryUsageTargetLevel=Low 降低 WebView2 内存占用。\r\n\r\nfunction lazyInitEditor() {\r\n  if (editor.value && !editor.value.isDestroyed) return;\r\n  createEditor(fileStore.currentFile.content || props.initialContent || '');\r\n}\r\n\r\nlet unlistenFocus: (() => void) | null = null;\r\n\r\nasync function setupWindowFocusHandlers() {\r\n  try {\r\n    const appWindow = getCurrentWindow();\r\n    unlistenFocus = await appWindow.listen('solo:editor-focus', () => {\r\n      if (editor.value && !editor.value.isDestroyed) return;\r\n      lazyInitEditor();\r\n    });\r\n  } catch {\r\n    // 事件系统初始化失败，跳过懒初始化\r\n  }\r\n}\r\n\r\n// ── 生命周期 ──────────────────────────────────────────────────\r\n\r\nonMounted(async () => {\r\n  setupDragDrop();\r\n  await setupWindowFocusHandlers();\r\n\r\n  // 先设图片路径解析器，再建编辑器——确保 Node View 初始化时能用上\r\n  setLocalSrcResolver(async (src: string) => {\r\n    const storagePath = settingsStore.settings.imageStoragePath;\r\n    const docPath = fileStore.currentFile.path;\r\n    try {\r\n      const resolved = await resolveImageDisplay(src, docPath, storagePath);\r\n      return toAssetUrl(resolved.path);\r\n    } catch {\r\n      return null;\r\n    }\r\n  });\r\n\r\n  // 编辑器懒初始化\r\n  if (document.hasFocus()) {\r\n    // 快速路径：窗口已有焦点，直接创建\r\n    createEditor(props.initialContent || '');\r\n  } else {\r\n    // 延迟兜底：Focused(true) 事件可能早于 listener 注册到达而被丢弃。\r\n    // 短延迟给事件队列一次额外处理机会，之后仍无焦点则强行创建编辑器\r\n    // （失去的只是懒加载优化，窗口正确可用更重要）\r\n    setTimeout(() => {\r\n      if (editor.value && !editor.value.isDestroyed) return;\r\n      lazyInitEditor();\r\n    }, 50);\r\n  }\r\n\r\n  // 图片双击 → 全屏预览（从 CustomImage NodeView 冒泡上来的自定义事件）\r\n  editorWrapRef.value?.addEventListener('editor:image-dblclick', handleImageDblClick);\r\n});\r\n\r\nonBeforeUnmount(() => {\r\n  // 1. 先断开 focus 事件，防止销毁期间回调触发\r\n  unlistenFocus?.();\r\n  unlistenFocus = null;\r\n\r\n  // 2. 清理图片路径解析器\r\n  resetLocalSrcResolver();\r\n\r\n  // 3. 取消所有防抖操作，防止回调中操作已销毁的 editor\r\n  debouncedWordCount.cancel();\r\n  debouncedOutline.cancel();\r\n  debouncedSerialize.cancel();\r\n  debouncedEmitCursorInfo.cancel();\r\n\r\n  // 3. 清理拖拽监听\r\n  if (unlistenDragDrop) {\r\n    unlistenDragDrop();\r\n    unlistenDragDrop = null;\r\n  }\r\n\r\n  // 4. 销毁 TipTap editor（释放 ProseMirror DOM + 内部事件监听）\r\n  if (editor.value && !editor.value.isDestroyed) {\r\n    editor.value.destroy();\r\n  }\r\n  editor.value = null;\r\n\r\n  // 5. 清理 DOM 级事件监听\r\n  editorWrapRef.value?.removeEventListener('editor:image-dblclick', handleImageDblClick);\r\n});\r\n\r\n// 拼写检查：编辑器创建后 settings 变更时动态更新 DOM 属性\r\nwatch(\r\n  () => settingsStore.settings.spellCheck,\r\n  (enabled) => {\r\n    editor.value?.view.dom.setAttribute('spellcheck', enabled ? 'true' : 'false');\r\n  },\r\n);\r\n\r\n// 焦点模式：切换时强制刷新段落聚焦装饰层\r\nwatch(\r\n  () => settingsStore.isFocusMode,\r\n  () => {\r\n    if (editor.value?.view) {\r\n      refreshParagraphFocus(editor.value.view);\r\n    }\r\n  },\r\n);\r\n\r\n// ── Expose ────────────────────────────────────────────────────\r\n\r\ndefineExpose({\r\n  scrollToPos: (pos: number) => {\r\n    if (!editor.value) return;\r\n    const docSize = editor.value.state.doc.content.size;\r\n    const target = Math.max(0, Math.min(pos, docSize));\r\n    editor.value.commands.focus(target);\r\n    // 滚动到视图\r\n    const dom = editor.value.view.domAtPos(target);\r\n    const el = dom.node instanceof HTMLElement ? dom.node : dom.node.parentElement;\r\n    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });\r\n    // 大纲跳转也给一次命中脉冲，体感和搜索「下一个」一致\r\n    pulseJumpTarget(el);\r\n  },\r\n  getContent: () => {\r\n    if (!editor.value) return null;\r\n    return serializeMarkdown(editor.value.state.doc);\r\n  },\r\n  getDoc: () => editor.value?.state.doc ?? null,\r\n  getEditorView: () => editor.value?.view ?? n
