<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>solo 项目导游 · 小白友好文件地图</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e6e8ec;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #4f6ef7;
    --accent-soft: #eef1fe;
    --green: #18a957;
    --yellow: #d98300;
    --red: #e0413a;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.05);
    --ease: cubic-bezier(.2,.8,.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei UI", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .2px; }
  .brand .sub { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }
  .search {
    position: relative; display: flex; align-items: center;
  }
  .search input {
    width: 240px; padding: 8px 12px 8px 32px;
    border: 1px solid var(--border); border-radius: 9px;
    background: var(--bg); color: var(--text); font-size: 13px;
    outline: none; transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 10px; color: var(--muted); }
  .filters { display: flex; gap: 6px; }
  .filters button {
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); font-size: 12px; padding: 7px 11px;
    border-radius: 9px; cursor: pointer; transition: all .15s var(--ease);
  }
  .filters button:hover { border-color: var(--accent); color: var(--accent); }
  .filters button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Body */
  .body { display: flex; flex: 1 1 auto; min-height: 0; }

  /* Sidebar */
  .sidebar {
    width: 340px; flex: 0 0 340px;
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 10px 8px 40px;
  }
  .cat { margin: 4px 0; }
  .cat-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    user-select: none; transition: background .15s var(--ease);
  }
  .cat-head:hover { background: var(--bg); }
  .cat-head .arrow { transition: transform .25s var(--ease); color: var(--muted); font-size: 11px; }
  .cat.collapsed .arrow { transform: rotate(-90deg); }
  .cat-head .cat-name { font-weight: 600; font-size: 13.5px; }
  .cat-head .cat-count {
    margin-left: auto; font-size: 11px; color: var(--muted);
    background: var(--bg); padding: 1px 8px; border-radius: 20px;
  }
  .cat-items {
    display: grid; grid-template-rows: 1fr;
    transition: grid-template-rows .28s var(--ease);
  }
  .cat.collapsed .cat-items { grid-template-rows: 0fr; }
  .cat-items > .inner { overflow: hidden; }

  .file-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px 7px 26px; margin: 1px 4px;
    border-radius: 8px; cursor: pointer;
    transition: background .14s var(--ease), transform .14s var(--ease);
  }
  .file-item:hover { background: var(--accent-soft); }
  .file-item.active { background: var(--accent); color: #fff; }
  .file-item.active .dot { box-shadow: 0 0 0 2px rgba(255,255,255,.5); }
  .file-item.active .fname { color: #fff; }
  .file-item.active .fpath { color: rgba(255,255,255,.75); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--red); }
  .fmeta { min-width: 0; }
  .fname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fpath { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Main */
  .main { flex: 1 1 auto; overflow-y: auto; padding: 30px 40px 60px; }
  .detail { max-width: 760px; margin: 0 auto; }
  .detail.enter { animation: fadeUp .32s var(--ease); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .d-head { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .d-title { font-size: 22px; font-weight: 700; margin: 0; line-height: 1.3; }
  .d-path {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 12.5px; color: var(--muted); background: var(--bg);
    padding: 3px 9px; border-radius: 7px; margin-top: 6px; display: inline-block;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 20px;
    flex: 0 0 auto; margin-top: 3px;
  }
  .badge.green { background: #e7f7ee; color: var(--green); }
  .badge.yellow { background: #fdf2e0; color: var(--yellow); }
  .badge.red { background: #fdeceb; color: var(--red); }

  .d-section { margin-top: 26px; }
  .d-section h3 {
    font-size: 13px; text-transform: none; color: var(--accent);
    margin: 0 0 10px; font-weight: 700; letter-spacing: .3px;
    display: flex; align-items: center; gap: 8px;
  }
  .d-section h3::before {
    content: ""; width: 4px; height: 15px; background: var(--accent); border-radius: 3px;
  }
  .d-tldr {
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    padding: 12px 16px; border-radius: 0 10px 10px 0; font-size: 14.5px; line-height: 1.6;
  }
  .d-what p { margin: 0 0 12px; line-height: 1.75; }
  .analogy {
    background: #fffaf0; border: 1px solid #f3e4c4; border-radius: 10px;
    padding: 12px 16px; font-size: 13.5px; color: #7a5a16;
  }
  .analogy b { color: #9a6b10; }
  .d-list { margin: 0; padding-left: 0; list-style: none; }
  .d-list li {
    position: relative; padding-left: 20px; margin-bottom: 8px; line-height: 1.7;
  }
  .d-list li::before {
    content: "•"; position: absolute; left: 4px; color: var(--accent); font-weight: 700;
  }
  .related { display: flex; flex-wrap: wrap; gap: 8px; }
  .related span {
    font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 7px;
  }

  /* Welcome */
  .welcome { max-width: 760px; margin: 0 auto; }
  .welcome h2 { font-size: 24px; margin: 0 0 6px; }
  .welcome .lead { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .route-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px 26px; box-shadow: var(--shadow); margin-bottom: 18px;
  }
  .route-card h3 { margin: 0 0 14px; font-size: 15px; }
  .route-step { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .route-step:last-child { border-bottom: none; }
  .route-num {
    flex: 0 0 28px; height: 28px; border-radius: 50%; background: var(--accent);
    color: #fff; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .route-step .rs-title { font-weight: 600; }
  .route-step .rs-desc { color: var(--muted); font-size: 13px; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 6px; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); }

  .empty { text-align: center; color: var(--muted); margin-top: 80px; font-size: 14px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
  @media (max-width: 720px) {
    .sidebar { width: 100%; flex-basis: auto; }
    .body { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <h1>solo 项目导游</h1>
      <span class="sub">小白友好 · 文件地图 v1.2.24</span>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="9.5" y1="9.5" x2="14" y2="14"/></svg>
      <input id="search" type="text" placeholder="搜文件名或关键词…" />
    </div>
    <div class="filters" id="filters">
      <button data-level="all" class="active">全部</button>
      <button data-level="red">必看</button>
      <button data-level="yellow">偶尔</button>
      <button data-level="green">可忽略</button>
    </div>
  </div>

  <div class="body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
</div>

<script>
const LEVEL = {
  green: { label: "可放心忽略", cls: "green" },
  yellow: { label: "偶尔看看", cls: "yellow" },
  red: { label: "搞懂项目必看", cls: "red" },

const CATS = [
  { id: "facade", name: "门面文档" },
  { id: "arch", name: "架构大脑" },
  { id: "config", name: "配置中枢" },
  { id: "release", name: "发版与构建" },
  { id: "collab", name: "协作与规范" },

  { id: "docs", name: "文档专题" },

const FILES = [
  // ── 门面文档 ──
  { cat: "facade", path: "README.md", level: "green",
    tldr: "solo 对外的产品介绍与安装说明书。",
    what: "这是项目对外的「第一张脸」。它用大白话告诉外人：solo 是什么（本地优先的 Markdown 编辑器）、能干什么、怎么装、怎么跑。",
    analogy: "就像手机包装盒上的产品介绍页——你不用拆机，光看它就知道这玩意儿是干嘛的、适不适合自己。",
    contents: ["产品定位：本地优先、极简、所见即所得的 Markdown 编辑器", "功能清单（多窗口、公式、流程图、主题字体等）", "技术栈一句话 + 安装/开发命令", "许可证与联系方式"],
    related: ["README.zh-CN.md", "ARCHITECTURE.md", "package.json"] },

  { cat: "facade", path: "README.zh-CN.md", level: "green",
    tldr: "README 的简体中文版，内容一致。",
    what: "和 README.md 是同一份东西，只是语言换成中文。面向中文用户。",
    analogy: "同一份说明书的中译本，看哪个都行。",
    contents: ["英文 README 的中文翻译", "与 README.md 同步维护"],
    related: ["README.md", "README.ja-JP.md", "README.ko-KR.md"] },

  { cat: "facade", path: "LICENSE", level: "green",
    tldr: "开源许可证（Apache-2.0），规定别人怎么用这份代码。",
    what: "这是法律层面的「使用公约」。solo 用 Apache-2.0，意味着任何人都能免费看、改、分发，但得保留原作者署名、不能拿去当闭源商业机密。",
    analogy: "像房子的「产权证类型」——告诉你这屋子能租能改，但有几条规矩不能破。",
    contents: ["Apache License 2.0 全文", "fork 自 MarkLight 的声明"],
    related: ["README.md"] },

  // ── 架构大脑 ──
  { cat: "arch", path: "HANDOVER.md", level: "red",
    tldr: "接手第一站：30 秒定位 + 环境搭建 + 真理源文件表。",
    what: "这是前任交房时留的「交接清单」。新人或 AI 接手项目，第一眼就该看它：项目到底是啥、本机环境怎么配、改东西前该先读哪些文件。",
    analogy: "好比你接手一间出租屋，原房东留给你的便利贴：Wi-Fi 密码、电表在哪、哪扇门别乱动。",
    contents: ["30 秒定位：solo = Tauri2 + Vue3 + Rust 的本地编辑器", "本机真实环境路径（Rust 在 M:\\rust，MSVC 在 M:\\VS，别重装）", "常用命令复制即用", "「真理源文件」对照表：改 X 该读哪个文件", "黄金法则：文档只是代码快照，以代码为准"],

  { cat: "arch", path: "AGENTS.md", level: "red",
    tldr: "项目工作手册：AI/开发者的纪律约束 + 文档地图。",
    what: "这是团队的「员工手册」。它规定了改代码前的纪律（先读实际行为、确认影响范围）、发版前的检查清单、提交前的红线。同时也充当文档索引。",
    analogy: "相当于公司入职手册 + 考勤制度——告诉你什么能做、什么碰了要挨骂。",
    contents: ["改代码前纪律（以代码为准、确认影响范围）", "改 parser/serializer 后必须跑的三道关：测试/类型/构建", "发版前常见踩坑（升版本号、去 replaceAll）", "完整文档地图与关键约束速查"],
    related: ["HANDOVER.md", "ARCHITECTURE.md", "CONTRIBUTING.md"] },

  { cat: "arch", path: "ARCHITECTURE.md", level: "red",

    what: "这是整栋楼的「蓝图」。它把项目拆成三层讲清楚：Rust 核心（地基/发动机）→ IPC 服务层（前台收发室）→ Vue 前端（房间与家具），并列出全部 20 个底层命令、目录结构、以及改代码前必须知道的雷区。",

    related: ["HANDOVER.md", "src-tauri/src/lib.rs", "src/services/tauri/"] },

  { cat: "arch", path: "CHANGELOG.md", level: "yellow",

  // ── 配置中枢 ──

    analogy: "好比餐厅的食材采购单 + 菜谱卡：要买什么、怎么做、叫什么菜，全在这一张。",

    related: ["tsconfig.json", "vite.config.ts", "Cargo.toml", "tauri.conf.json"] },

  { cat: "config", path: "tsconfig.json", level: "yellow",

    what: "它告诉 TypeScript 怎么检查代码：目标环境是 ES2020、严格模式打开、不允许没用到的变量。改这里会影响全项目的类型检查行为。",

    related: ["package.json", "src-tauri/tauri.conf.json", "src-tauri/src/lib.rs"] },

  { cat: "config", path: "src-tauri/tauri.conf.json", level: "red",
    tldr: "Tauri 应用的总规约：窗口、权限、更新、文件关联、安装包。",

    analogy: "像小区的物业管理公约：大门多宽、谁有权进、外墙怎么装，全由它定。",
    contents: ["productName=solo，identifier=com.solomarkdown", "窗口默认 1200×800、无边框、启动隐藏", "security.csp 安全策略（收紧外部加载）", "bundle：NSIS 安装器 + .md 文件关联", "plugins.updater 自动更新端点与签名公钥"],
    related: ["Cargo.toml", "src-tauri/Cargo.toml", "RELEASE_PROCESS.md"] },

  // ── 发版与构建 ──

// ── Render ──
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
let activeFilter = "all";
let activeId = null;

function fileById(id) { return FILES.find(f => f.path === id); }
function catName(id) { return CATS.find(c => c.id === id).name; }

function buildSidebar() {
  sidebar.innerHTML = "";
  CATS.forEach(cat => {
    const items = FILES.filter(f => f.cat === cat.id);
    if (!items.length) return;
    const catEl = document.createElement("div");
    catEl.className = "cat";
    catEl.dataset.cat = cat.id;

    const head = document.createElement("div");
    head.className = "cat-head";
    head.innerHTML = `<span class="arrow">▾</span><span class="cat-name">${cat.name}</span><span class="cat-count">${items.length}</span>`;
    head.addEventListener("click", () => catEl.classList.toggle("collapsed"));
    catEl.appendChild(head);

    const wrap = document.createElement("div");
    wrap.className = "cat-items";
    const inner = document.createElement("div");
    inner.className = "inner";

    items.forEach(f => {
      const item = document.createElement("div");
      item.className = "file-item";
      item.dataset.path = f.path;
      item.dataset.level = f.level;
      item.innerHTML = `
        <span class="dot ${f.level}"></span>
        <span class="fmeta">
          <span class="fname">${f.path.split("/").pop()}</span>
          <span class="fpath">${f.path}</span>
        </span>`;
      item.addEventListener("click", () => selectFile(f.path));
      inner.appendChild(item);
    });

    wrap.appendChild(inner);
    catEl.appendChild(wrap);
    sidebar.appendChild(catEl);
  });
}

function selectFile(path) {
  const f = fileById(path);
  if (!f) return;
  activeId = path;
  document.querySelectorAll(".file-item").forEach(el => {
    el.classList.toggle("active", el.dataset.path === path);
  });
  renderDetail(f);
}

function renderDetail(f) {
  const lv = LEVEL[f.level];
  const relatedHtml = f.related.map(r => `<span>${r}</span>`).join("");
  main.innerHTML = `
    <div class="detail enter">
      <div class="d-head">
        <div>
          <h2 class="d-title">${f.path.split("/").pop()}</h2>
          <div class="d-path">${f.path}</div>
        </div>
        <span class="badge ${lv.cls}">● ${lv.label}</span>
      </div>

      <div class="d-section">
        <h3>一句话总结</h3>
        <div class="d-tldr">${f.tldr}</div>
      </div>

      <div class="d-section d-what">
        <h3>它是干啥的（人话版）</h3>
        <p>${f.what}</p>
        <div class="analogy"><b>打个比方：</b>${f.analogy}</div>
      </div>

      <div class="d-section">
        <h3>关键内容</h3>
        <ul class="d-list">${f.contents.map(c => `<li>${c}</li>`).join("")}</ul>
      </div>

      <div class="d-section">
        <h3>相关文件</h3>
        <div class="related">${relatedHtml}</div>
      </div>
    </div>`;
  main.scrollTop = 0;
}

function renderWelcome() {
  main.innerHTML = `
    <div class="welcome">
      <h2>欢迎来到 solo 项目导游 👋</h2>
      <p class="lead">这不是一份冰冷的文件清单，而是一张「带讲解的地图」。左边按功能分了类，点开任意文件，右边会用大白话告诉你它是干啥的、像生活中的什么。</p>

      <div class="route-card">
        <h3>🧭 推荐阅读路线（别跳，按顺序走）</h3>
        <div class="route-step"><div class="route-num">1</div><div><div class="rs-title">README.md</div><div class="rs-desc">先知道这项目是啥、能干嘛。</div></div></div>
        <div class="route-step"><div class="route-num">2</div><div><div class="rs-title">HANDOVER.md → AGENTS.md → ARCHITECTURE.md</div><div class="rs-desc">30 秒定位 → 工作纪律 → 权威架构蓝图。这是搞懂项目的三块基石。</div></div></div>
        <div class="route-step"><div class="route-num">3</div><div><div class="rs-desc">配置中枢（package.json / Cargo.toml / tauri.conf.json）看一眼，知道版本号和依赖在哪。</div></div></div>
        <div class="route-step"><div class="route-num">4</div><div><div class="rs-desc">核心代码入口挑着看：main.ts、lib.rs、MarkdownEditor.vue、parser/serializer。</div></div></div>
        <div class="route-step"><div class="route-num">5</div><div><div class="rs-desc">按需查 docs/：改代码前看 defect-hotspots，排错看 debugging，想发版看 RELEASE_PROCESS。</div></div></div>
      </div>

      <div class="route-card">
        <h3>🔖 颜色图例（帮你分配有限的注意力）</h3>
        <div class="legend">
          <span><span class="dot red"></span> 搞懂项目必看</span>
          <span><span class="dot yellow"></span> 偶尔看看</span>
          <span><span class="dot green"></span> 可放心忽略（小白阶段先别管）</span>
        </div>
        <p style="color:var(--muted);font-size:13px;margin:14px 0 0;">顶部还能按「文件名/关键词」搜索，或按颜色筛选。先从红色开始看，绿色的基本可以跳过。</p>
      </div>
    </div>`;
}

function applyFilter() {
  document.querySelectorAll(".file-item").forEach(el => {
    const matchLevel = activeFilter === "all" || el.dataset.level === activeFilter;
    const q = document.getElementById("search").value.trim().toLowerCase();
    const f = fileById(el.dataset.path);
    const matchSearch = !q ||
      f.path.toLowerCase().includes(q) ||
      f.tldr.toLowerCase().includes(q) ||
      f.what.toLowerCase().includes(q) ||
      f.contents.join(" ").toLowerCase().includes(q);
    el.style.display = (matchLevel && matchSearch) ? "" : "none";
  });
  // hide empty categories
  document.querySelectorAll(".cat").forEach(cat => {
    const visible = [...cat.querySelectorAll(".file-item")].some(el => el.style.display !== "none");
    cat.style.display = visible ? "" : "none";
  });
}

// wire up
document.getElementById("search").addEventListener("input", applyFilter);
document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.level;
  applyFilter();
});

buildSidebar();
renderWelcome();
</script>
</body>
