ull,\r\n  hasFocus: () => editor.value?.isFocused ?? false,\r\n  executeCommand: (commandId: string) => executeEditorCommand(editor.value, commandId),\r\n  undo: () => editor.value?.commands.undo(),\r\n  redo: () => editor.value?.commands.redo(),\r\n  openSearch: (_showReplace = false) => {\r\n    showReplace.value = _showReplace;\r\n    openSearch();\r\n  },\r\n  closeSearch,\r\n});\r\n<\/script>\r\n\r\n<style scoped>\r\n.editor-shell {\r\n  background-color: var(--bg-color);\r\n}\r\n\r\n/* ── 搜索面板 ──────────────────────────────────────────── */\r\n.search-panel {\r\n  position: absolute;\r\n  top: 0;\r\n  left: 50%;\r\n  transform: translateX(-50%);\r\n  z-index: 300;\r\n  min-width: 420px;\r\n  max-width: 520px;\r\n  background: color-mix(in srgb, var(--bg-color) 92%, transparent);\r\n  backdrop-filter: blur(8px);\r\n  -webkit-backdrop-filter: blur(8px);\r\n  border: 1px solid var(--border-color);\r\n  border-top: none;\r\n  border-radius: 0 0 var(--radius-lg) var(--radius-lg);\r\n  box-shadow: var(--popover-shadow);\r\n  overflow: hidden;\r\n}\r\n\r\n/* search-panel 进出场动画：仅用 opacity，避免覆盖 translateX(-50%) 居中 */\r\n.search-panel-enter-active,\r\n.search-panel-leave-active {\r\n  transition: opacity 0.15s ease;\r\n}\r\n.search-panel-enter-from,\r\n.search-panel-leave-to {\r\n  opacity: 0;\r\n}\r\n\r\n.search-row {\r\n  display: flex;\r\n  align-items: center;\r\n  gap: 8px;\r\n  padding: 8px 10px;\r\n}\r\n\r\n.search-replace-row {\r\n  border-top: 1px solid var(--border-color);\r\n  padding-top: 6px;\r\n}\r\n\r\n.search-icon {\r\n  flex-shrink: 0;\r\n  color: var(--muted-color);\r\n  opacity: 0.6;\r\n}\r\n\r\n.search-input {\r\n  flex: 1;\r\n  min-width: 0;\r\n  height: 28px;\r\n  border: none;\r\n  background: transparent;\r\n  color: var(--text-color);\r\n  font-size: 13px;\r\n  font-family: inherit;\r\n  outline: none;\r\n  caret-color: var(--primary-color);\r\n}\r\n\r\n.search-input::placeholder {\r\n  color: var(--muted-color);\r\n  opacity: 0.5;\r\n}\r\n\r\n.search-meta {\r\n  display: flex;\r\n  align-items: center;\r\n  gap: 6px;\r\n  flex-shrink: 0;\r\n}\r\n\r\n.search-btn-meta {\r\n  display: inline-flex;\r\n  align-items: center;\r\n  justify-content: center;\r\n  width: 26px;\r\n  height: 22px;\r\n  border: none;\r\n  border-radius: 4px;\r\n  background: transparent;\r\n  color: var(--muted-color);\r\n  font-family: var(--font-mono, monospace);\r\n  font-size: 11px;\r\n  font-weight: 600;\r\n  cursor: pointer;\r\n  transition: background-color 0.15s, color 0.15s;\r\n}\r\n\r\n.search-btn-meta:hover {\r\n  background: var(--hover-bg);\r\n  color: var(--text-color);\r\n}\r\n\r\n.search-btn-meta.active {\r\n  color: var(--primary-color);\r\n  background: color-mix(in srgb, var(--primary-color) 12%, transparent);\r\n}\r\n\r\n.search-count {\r\n  color: var(--muted-color);\r\n  font-size: 11px;\r\n  font-variant-numeric: tabular-nums;\r\n  min-width: 2.8em;\r\n  text-align: right;\r\n  white-space: nowrap;\r\n}\r\n\r\n.search-btn-nav {\r\n  display: inline-flex;\r\n  align-items: center;\r\n  justify-content: center;\r\n  width: 24px;\r\n  height: 24px;\r\n  border: none;\r\n  border-radius: 4px;\r\n  background: transparent;\r\n  color: var(--text-secondary);\r\n  cursor: pointer;\r\n  transition: background-color 0.15s, color 0.15s;\r\n}\r\n\r\n.search-btn-nav:hover {\r\n  background: var(--hover-bg);\r\n  color: var(--text-color);\r\n}\r\n\r\n.search-btn-close {\r\n  display: inline-flex;\r\n  align-items: center;\r\n  justify-content: center;\r\n  width: 24px;\r\n  height: 24px;\r\n  border: none;\r\n  border-radius: 4px;\r\n  background: transparent;\r\n  color: var(--muted-color);\r\n  cursor: pointer;\r\n  transition: background-color 0.15s, color 0.15s;\r\n}\r\n\r\n.search-btn-close:hover {\r\n  background: var(--hover-bg);\r\n  color: var(--text-color);\r\n}\r\n\r\n.search-actions {\r\n  display: flex;\r\n  gap: 6px;\r\n  flex-shrink: 0;\r\n}\r\n\r\n.search-action-btn {\r\n  height: 24px;\r\n  padding: 0 10px;\r\n  border: 1px solid var(--border-color);\r\n  border-radius: 5px;\r\n  background: transparent;\r\n  color: var(--text-secondary);\r\n  font-size: 12px;\r\n  cursor: pointer;\r\n  transition: background-color 0.15s, border-color 0.15s, color 0.15s;\r\n  white-space: nowrap;\r\n}\r\n\r\n.search-action-btn:hover:not(:disabled) {\r\n  background: var(--hover-bg);\r\n  border-color: var(--primary-color);\r\n  color: var(--text-color);\r\n}\r\n\r\n.search-action-btn:disabled {\r\n  opacity: 0.35;\r\n  cursor: default;\r\n}\r\n</style>\r\n\r\n<style>\r\n/* 搜索匹配高亮（ProseMirror decorations 添加，须全局生效） */\r\n.search-match {\r\n  background-color: color-mix(in srgb, var(--primary-color) 18%, transparent);\r\n  border-radius: 2px;\r\n  box-decoration-break: clone;\r\n  -webkit-box-decoration-break: clone;\r\n}\r\n\r\n.search-match-active {\r\n  background-color: color-mix(in srgb, var(--primary-color) 32%, transparent);\r\n}\r\n</style>\r\n"},"src/components/Editor/tiptap/markdown/parser.ts":{"text":"/**\r\n * Markdown → ProseMirror Document 解析器\r\n *\r\n * 使用 markdown-it 解析 markdown 文本，转换为 ProseMirror 文档节点。\r\n * 基于 prosemirror-markdown 的 MarkdownParser 模式，但自定义 token 映射以支持 GFM 扩展。\r\n */\r\nimport MarkdownIt from 'markdown-it';\r\nimport type Token from 'markdown-it/lib/token.mjs';\r\nimport { Mark } from '@tiptap/pm/model';\r\nimport type { Schema, Node as PMNode, MarkType, NodeType } from '@tiptap/pm/model';\r\n\r\n// markdown-it 插件\r\nimport markdownItTaskLists from 'markdown-it-task-lists';\r\nimport markdownItMark from 'markdown-it-mark';\r\nimport markdownItSub from 'markdown-it-sub';\r\nimport markdownItSup from 'markdown-it-sup';\r\nimport markdownItTexmath from 'markdown-it-texmath';\r\nimport markdownItFootnote from 'markdown-it-footnote';\r\nimport {\r\n  getPluginFenceHandlers,\r\n  getPluginPreprocessors,\r\n  getPluginTokenHandlers,\r\n  getPluginTokenInterceptors,\r\n} from './plugins';\r\nimport type { Preprocessor, TokenInterceptor } from './plugins';\r\n\r\n// ── markdown-it 实例 ───────────────────────────────────────────\r\n\r\n// texmath 插件需要一个 KaTeX 引擎用于渲染 HTML，但解析器只调用 md.parse()（仅分词），\r\n// 不调用 md.render()，因此引擎永远不会被调用。传入空壳对象避免静态导入 KaTeX，\r\n// 使 KaTeX 可以作为独立 chunk 懒加载（由 math-block/math-inline 的 NodeView 按需加载）。\r\nconst dummyKatexEngine = {\r\n  renderToString: (latex: string) => latex,\r\n};\r\n\r\nfunction createMarkdownIt(): MarkdownIt {\r\n  const md = new MarkdownIt('commonmark', { html: false, linkify: false })\r\n    .enable(['table', 'strikethrough']);\r\n\r\n  md.use(markdownItTaskLists, { enabled: true, label: false });\r\n  md.use(markdownItMark);\r\n  md.use(markdownItSub);\r\n  md.use(markdownItSup);\r\n  md.use(markdownItTexmath, {\r\n    engine: dummyKatexEngine,\r\n    delimiters: 'dollars',\r\n  });\r\n\r\n  md.use(markdownItFootnote);\r\n\r\n  return md;\r\n}\r\n\r\n// ── Token → PM 节点映射 ────────────────────────────────────────\r\n\r\ninterface StackItem {\r\n  type: NodeType;\r\n  attrs: Record<string, unknown>;\r\n  content: PMNode[];\r\n  marks: readonly Mark[];\r\n}\r\n\r\nexport class MarkdownParseState {\r\n  schema: Schema;\r\n  stack: StackItem[];\r\n  marks: readonly Mark[];\r\n  pluginData: Record<string, unknown>;\r\n\r\n  constructor(schema: Schema, pluginData: Record<string, unknown> = {}) {\r\n    this.schema = schema;\r\n    this.stack = [{ type: schema.nodes.doc, attrs: {}, content: [], marks: Mark.none }];\r\n    this.marks = Mark.none;\r\n    this.pluginData = pluginData;\r\n  }\r\n\r\n  get top(): StackItem {\r\n    return this.stack[this.stack.length - 1];\r\n  }\r\n\r\n  addText(text: string) {\r\n    if (!text) return;\r\n    const top = this.top;\r\n    const nodes = top.content;\r\n    const last = nodes[nodes.length - 1];\r\n    const textNode = this.schema.text(text, this.marks);\r\n    if (last?.isText && Mark.sameSet(last.marks, textNode.marks)) {\r\n      nodes[nodes.length - 1] = this.schema.text(last.text! + text, this.marks);\r\n    } else {\r\n      nodes.push(textNode);\r\n    }\r\n  }\r\n\r\n  openMark(markType: MarkType, attrs?: Record<string, unknown>) {\r\n    this.marks = markType.create(attrs).addToSet(this.marks);\r\n  }\r\n\r\n  closeMark(markType: MarkType) {\r\n    this.marks = markType.removeFromSet(this.marks);\r\n  }\r\n\r\n  openNode(type: NodeType, attrs: Record<string, unknown> = {}) {\r\n    this.stack.push({ type, attrs, content: [], marks: Mark.none });\r\n  }\r\n\r\n  closeNode(): PMNode {\r\n    const item = this.stack.pop()!;\r\n    const node = item.type.createAndFill(item.attrs, item.content, this.marks);\r\n    if (!node) {\r\n      // 兜底：创建空段落\r\n      return this.schema.nodes.paragraph.create();\r\n    }\r\n    this.top.content.push(node);\r\n    return node;\r\n  }\r\n\r\n  addNode(type: NodeType, attrs: Record<string, unknown> = {}, content?: PMNode[]) {\r\n    const node = type.createAndFill(attrs, content);\r\n    if (node) this.top.content.push(node);\r\n    return node;\r\n  }\r\n\r\n  buildDoc(): PMNode {\r\n    while (this.stack.length > 1) this.closeNode();\r\n    return this.top.type.createAndFill(this.top.attrs, this.top.content) || this.schema.nodes.doc.create();\r\n  }\r\n}\r\n\r\n// ── Token 处理器 ────────────────────��───────────────────────────\r\n\r\nexport type TokenHandler = (\r\n  state: MarkdownParseState,\r\n  token: Token,\r\n  tokens: Token[],\r\n  index: number,\r\n) => void;\r\n\r\nconst handlersCache = new WeakMap<Schema, Record<string, TokenHandler>>();\r\nconst preprocessorsCache = new WeakMap<Schema, Preprocessor[]>();\r\nconst interceptorsCache = new WeakMap<Schema, TokenInterceptor[]>();\r\n\r\nexport function getTokenHandlers(schema: Schema): Record<string, TokenHandler> {\r\n  const cached = handlersCache.get(schema);\r\n  if (cached) return cached;\r\n\r\n  const handlers: Record<string, TokenHandler> = {};\r\n  const fenceHandlers = getPluginFenceHandlers(schema);\r\n\r\n  // ── 块级节点 ──\r\n\r\n  handlers.paragraph_open = (state) => {\r\n    state.openNode(schema.nodes.paragraph);\r\n  };\r\n  handlers.paragraph_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.heading_open = (state, token) => {\r\n    const level = parseInt(token.tag.slice(1));\r\n    state.openNode(schema.nodes.heading, { level });\r\n  };\r\n  handlers.heading_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.blockquote_open = (state) => {\r\n    state.openNode(schema.nodes.blockquote);\r\n  };\r\n  handlers.blockquote_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.bullet_list_open = (state, _token, tokens, index) => {\r\n    // 前看：检查列表项是否包含任务列表标记（class=\"task-list-item\"）\r\n    if (schema.nodes.taskList && schema.nodes.taskItem) {\r\n      for (let i = index + 1; i < tokens.length; i++) {\r\n        const t = tokens[i];\r\n        if (t.type === 'bullet_list_close') break;\r\n        if (t.type === 'list_item_open') {\r\n          const cls = t.attrGet('class');\r\n          if (cls?.includes('task-list-item')) {\r\n            state.openNode(schema.nodes.taskList);\r\n            return;\r\n          }\r\n        }\r\n      }\r\n    }\r\n    state.openNode(schema.nodes.bulletList);\r\n  };\r\n  handlers.bullet_list_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.ordered_list_open = (state, token) => {\r\n    const start = token.attrGet('start');\r\n    state.openNode(schema.nodes.orderedList, { start: start ? parseInt(start) : 1 });\r\n  };\r\n  handlers.ordered_list_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.list_item_open = (state, token) => {\r\n    // 检测是否是任务列表项\r\n    // markdown-it-task-lists 在 li_open 的 class 中标记 task-list-item\r\n    // checked 状态实际在子 html_inline 的 <input checked=\"\" ...> 中，不在 class 里\r\n    const isTask = token.attrGet('class')?.includes('task-list-item') ?? false;\r\n    if (isTask) {\r\n      state.openNode(schema.nodes.taskItem, { checked: false });\r\n    } else {\r\n      state.openNode(schema.nodes.listItem);\r\n    }\r\n  };\r\n  handlers.list_item_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.code_block = (state, token) => {\r\n    state.addNode(schema.nodes.codeBlock, { language: null }, [\r\n      schema.text(token.content.replace(/\\n$/, '') || ' '),\r\n    ]);\r\n  };\r\n\r\n  handlers.fence = (state, token) => {\r\n    const lang = token.info?.trim()?.toLowerCase() || null;\r\n    const content = token.content.replace(/\\n$/, '');\r\n\r\n    for (const handler of fenceHandlers) {\r\n      if (handler(state, token, lang, content)) {\r\n        return;\r\n      }\r\n    }\r\n\r\n    state.addNode(schema.nodes.codeBlock, { language: lang }, content ? [schema.text(content)] : undefined);\r\n  };\r\n\r\n  handlers.hr = (state) => {\r\n    state.addNode(schema.nodes.horizontalRule);\r\n  };\r\n\r\n  // ── 表格 ──\r\n\r\n  handlers.table_open = (state) => {\r\n    state.openNode(schema.nodes.table);\r\n  };\r\n  handlers.table_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.thead_open = () => { /* skip, rows handled directly */ };\r\n  handlers.thead_close = () => {};\r\n  handlers.tbody_open = () => {};\r\n  handlers.tbody_close = () => {};\r\n\r\n  handlers.tr_open = (state) => {\r\n    state.openNode(schema.nodes.tableRow);\r\n  };\r\n  handlers.tr_close = (state) => {\r\n    state.closeNode();\r\n  };\r\n\r\n  handlers.th_open = (state) => {\r\n    state.openNode(schema.nodes.tableHeader);\r\n    state.openNode(schema.nodes.paragraph);\r\n  };\r\n  handlers.th_close = (state) => {\r\n    state.closeNode(); // paragraph\r\n    state.closeNode(); // tableHeader\r\n  };\r\n\r\n  handlers.td_open = (state) => {\r\n    state.openNode(schema.nodes.tableCell);\r\n    state.openNode(schema.nodes.paragraph);\r\n  };\r\n  handlers.td_close = (state) => {\r\n    state.closeNode(); // paragraph\r\n    state.closeNode(); // tableCell\r\n  };\r\n\r\n  // ── 图片 ──\r\n\r\n  handlers.image = (state, token) => {\r\n    const src = token.attrGet('src') || '';\r\n    const alt = token.content || token.children?.map(t => t.content).join('') || '';\r\n    const title = token.attrGet('title') || null;\r\n    state.addNode(schema.nodes.image, { src, alt, title });\r\n  };\r\n\r\n  // ── 行内标记 ──\r\n\r\n  handlers.em_open = (state) => {\r\n    state.openMark(schema.marks.italic);\r\n  };\r\n  handlers.em_close = (state) => {\r\n    state.closeMark(schema.marks.italic);\r\n  };\r\n\r\n  handlers.strong_open = (state) => {\r\n    state.openMark(schema.marks.bold);\r\n  };\r\n  handlers.strong_close = (state) => {\r\n    state.closeMark(schema.marks.bold);\r\n  };\r\n\r\n  handlers.s_open = (state) => {\r\n    state.openMark(schema.marks.strike);\r\n  };\r\n  handlers.s_close = (state) => {\r\n    state.closeMark(schema.marks.strike);\r\n  };\r\n\r\n  handlers.code_inline = (state, token) => {\r\n    state.openMark(schema.marks.code);\r\n    state.addText(token.content);\r\n    state.closeMark(schema.marks.code);\r\n  };\r\n\r\n  handlers.link_open = (state, token) => {\r\n    const href = token.attrGet('href') || '';\r\n    const title = token.attrGet('title') || null;\r\n    state.openMark(schema.marks.link, { href, target: null, title });\r\n  };\r\n  handlers.link_close = (state) => {\r\n    state.closeMark(schema.marks.link);\r\n  };\r\n\r\n  // highlight (==text==)\r\n  handlers.mark_open = (state) => {\r\n    state.openMark(schema.marks.highlight);\r\n  };\r\n  handlers.mark_close = (state) => {\r\n    state.closeMark(schema.marks.highlight);\r\n  };\r\n\r\n  // superscript (^text^)\r\n  if (schema.marks.superscript) {\r\n    handlers.sup_open = (state) => {\r\n      state.openMark(schema.marks.superscript);\r\n    };\r\n    handlers.sup_close = (state) => {\r\n      state.closeMark(schema.marks.superscript);\r\n    };\r\n  }\r\n\r\n  // subscript (~text~)\r\n  if (schema.marks.subscript) {\r\n    handlers.sub_open = (state) => {\r\n      state.openMark(schema.marks.subscript);\r\n    };\r\n    handlers.sub_close = (state) => {\r\n      state.closeMark(schema.marks.subscript);\r\n    };\r\n  }\r\n\r\n  // ── 文本和硬换行 ──\r\n\r\n  handlers.text = (state, token) => {\r\n    state.addText(token.content);\r\n  };\r\n\r\n  handlers.inline = (state, token) => {\r\n    if (token.children) {\r\n      let skipNextSpace = false;\r\n      for (let i = 0; i < token.children.length; i++) {\r\n        const child = token.children[i];\r\n        // 任务列表 checkbox 后，下一个文本节点开头的空格是 checkbox 与内容之间的分隔符\r\n        // 去掉它以保持输出整洁（否则 - [ ] todo → - [ ]  todo）\r\n        if (skipNextSpace && child.type === 'text' && child.content.startsWith(' ')) {\r\n          state.addText(child.content.slice(1));\r\n          skipNextSpace = false;\r\n          continue;\r\n        }\r\n        const handler = handlers[child.type];\r\n        if (handler) {\r\n          handler(state, child, token.children!, i);\r\n          if (child.type === 'html_inline' && child.content.includes('type=\"checkbox\"')) {\r\n            skipNextSpace = true;\r\n          }\r\n        } else if (child.type === 'text') {\r\n          state.addText(child.content);\r\n        }\r\n      }\r\n    }\r\n  };\r\n\r\n  handlers.softbreak = (state) => {\r\n    state.addText('\\n');\r\n  };\r\n\r\n  handlers.hardbreak = (state) => {\r\n    state.addNode(schema.nodes.hardBreak);\r\n  };\r\n\r\n  // ── HTML 块（忽略） ──\r\n  handlers.html_block = () => {};\r\n  handlers.html_inline = (state, token) => {\r\n    // 任务列表复选框：inline 在 paragraph 中处理，paragraph 在 taskItem 中\r\n    // 提取 checked=\"\" 状态设置到父级 taskItem 节点\r\n    if (token.content.includes('type=\"checkbox\"')) {\r\n      if (token.content.includes('checked=\"\"')) {\r\n        for (let i = state.stack.length - 1; i >= 0; i--) {\r\n          if (state.stack[i].type.name === 'taskItem') {\r\n            state.stack[i].attrs = { ...state.stack[i].attrs, checked: true };\r\n            break;\r\n          }\r\n        }\r\n      }\r\n      return;\r\n    }\r\n    if (/^<br\\s*\\/?>$/i.test(token.content.trim())) {\r\n      state.addNode(schema.nodes.hardBreak);\r\n      return;\r\n    }\r\n    state.addText(token.content);\r\n  };\r\n\r\n  Object.assign(handlers, getPluginTokenHandlers(schema));\r\n\r\n  handlersCache.set(schema, handlers);\r\n  return handlers;\r\n}\r\n\r\n// ── 解析入口 ──────────────────────────��──────────────────────────\r\n\r\nconst md = createMarkdownIt();\r\n\r\nexport function parseMarkdown(schema: Schema, content: string): PMNode {\r\n  if (!content || !content.trim()) {\r\n    return schema.nodes.doc.create(null, [schema.nodes.paragraph.create()]);\r\n  }\r\n\r\n  const pluginData: Record<string, unknown> = {};\r\n  const state = new MarkdownParseState(schema, pluginData);\r\n\r\n  let preprocessors = preprocessorsCache.get(schema);\r\n  if (!preprocessors) {\r\n    preprocessors = getPluginPreprocessors(schema);\r\n    preprocessorsCache.set(schema, preprocessors);\r\n  }\r\n  const preprocessResults = preprocessors.map((preprocessor) => {\r\n    const result = preprocessor.preprocess({ content });\r\n    content = result.content;\r\n    pluginData[preprocessor.name] = result.data;\r\n    return { preprocessor, data: result.data };\r\n  });\r\n\r\n  for (const result of preprocessResults) {\r\n    if (result.preprocessor.beforeParse && result.data !== undefined) {\r\n      result.preprocessor.beforeParse(state, result.data);\r\n    }\r\n  }\r\n\r\n  // 1.5. 预处理：插入 ZWNJ，防止 markdown-it 因 Unicode 标点边界拒绝打开或关闭\r\n  // 详见 AGENTS.md 「方案决策」章节了解背景和取舍。\r\n  // 顺序很重要：必须先关后开，避免互踩。\r\n  // 关闭方向：punct**word → punct\\u200C**word（如 」**吗 → right_flanking=false）\r\n  // 排除 ASCII 标点（!-/:;?@[-`{-~），它们是 markdown 语法字符而非内容标点。\r\n  // 注意：不能按\"是否含 CJK 字符\"短路，因为 ™(U+2122) 等 Unicode 符号(\\p{S})\r\n  // 同样需要 flanking 处理，而它们不在 CJK 范围内。\r\n  content = content.replace(\r\n    /(?<!\\*)(?<=[\\p{P}\\p{S}])(\\*+)(?=[^\\s\\p{P}\\p{S}])/gu,\r\n    (_match, delim: string, offset: number) => {\r\n      const prevChar = content[offset - 1];\r\n      if (prevChar && /[\\x21-\\x2F\\x3A-\\x40\\x5B-\\x60\\x7B-\\x7E]/.test(prevChar)) {\r\n        return delim;\r\n      }\r\n      return '\\u200C' + delim;\r\n    },\r\n  );\r\n  // 开启方向：word**punct → word**\\u200Cpunct（如 嘿**「→ left_flanking=false）\r\n  content = content.replace(\r\n    /(?<!\\*)(?<=[^\\s\\p{P}\\p{S}])(\\*{1,2})(?=[\\p{P}\\p{S}])(?!\\*)/gu,\r\n    (_match, delim: string, offset: number) => {\r\n      const nextChar = content[offset + delim.length];\r\n      if (nextChar && /[\\x21-\\x2F\\x3A-\\x40\\x5B-\\x60\\x7B-\\x7E]/.test(nextChar)) {\r\n        return delim;\r\n      }\r\n      return delim + '\\u200C';\r\n    },\r\n  );\r\n\r\n  // 2. 用 markdown-it 解析主体内容\r\n  const tokens = md.parse(content, {});\r\n  const handlers = getTokenHandlers(schema);\r\n  let tokenInterceptors = interceptorsCache.get(schema);\r\n  if (!tokenInterceptors) {\r\n    tokenInterceptors = getPluginTokenInterceptors(schema);\r\n    interceptorsCache.set(schema, tokenInterceptors);\r\n  }\r\n\r\n  for (let i = 0; i < tokens.length; i++) {\r\n    const token = tokens[i];\r\n\r\n    if (tokenInterceptors.some((interceptor) => interceptor(state, token, tokens, i))) {\r\n      continue;\r\n    }\r\n\r\n    const handler = handlers[token.type];\r\n    if (handler) {\r\n      handler(state, token, tokens, i);\r\n    }\r\n  }\r\n\r\n  return state.buildDoc();\r\n}\r\n"},"src/components/Editor/tiptap/markdown/serializer.ts":{"text":"/**\n * ProseMirror Document → Markdown 序列化器\n *\n * 将 ProseMirror 文档树转换为 markdown 字符串。\n * 自定义实现以精确控制输出格式，支持 GFM 表格、任务列表等扩展语法。\n */\nimport type { Node as PMNode, Mark, Slice } from '@tiptap/pm/model';\nimport { getPluginNodeSerializers } from './plugins';\n\n// ── 序列化状态 ────────────────────────────────────���─────────────\n\nexport class MarkdownSerializerState {\n  output = '';\n  private closed: PMNode | null = null;\n  private inTightList = false;\n  private listDepth = 0;\n  private readonly clipboard: boolean;\n\n  constructor(options?: { clipboard?: boolean }) {\n    this.clipboard = options?.clipboard ?? false;\n  }\n\n  /** 写入文本 */\n  write(text: string) {\n    this.flushClose();\n    this.output += text;\n  }\n\n  /** 写入一行（末尾加换行） */\n  writeLine(text: string) {\n    this.write(text + '\\n');\n  }\n\n  /** 确保输出以换行结尾 */\n  ensureNewline() {\n    if (this.output.length && !this.output.endsWith('\\n')) {\n      this.output += '\\n';\n    }\n  }\n\n  /** 关闭段落（延迟写入换行，用于列表紧凑模式判断） */\n  closeBlock(node: PMNode) {\n    this.closed = node;\n  }\n\n  flushClose(extra = 0) {\n    if (!this.closed) return;\n    this.closed = null;\n    this.ensureNewline();\n    for (let i = 0; i < extra; i++) this.output += '\\n';\n  }\n\n  /** 增加空行分隔 */\n  blankLine() {\n    this.flushClose();\n    this.ensureNewline();\n    if (!this.output.endsWith('\\n\\n')) {\n      this.output += '\\n';\n    }\n  }\n\n  /** 序列化 inline 内容 */\n  renderInline(parent: PMNode) {\n    const codeDelims = this._precomputeCodeDelims(parent);\n    parent.forEach((child, _offset, index) => {\n      if (child.isText) {\n        this.renderMarks(child, parent, index, true, codeDelims);\n        const hasCodeMark = child.marks.some((mark) => mark.type.name === 'code');\n        this.write(hasCodeMark ? (child.text ?? '') : this.escapeInline(child.text ?? ''));\n        this.renderMarks(child, parent, index, false, codeDelims);\n      } else {\n        this.renderMarks(child, parent, index, true, codeDelims);\n        this.renderNode(child);\n        this.renderMarks(child, parent, index, false, codeDelims);\n      }\n    });\n  }\n\n  private activeMarks: readonly Mark[] = [];\n\n  /** 开启/关闭 marks */\n  private renderMarks(node: PMNode, parent: PMNode, index: number, opening: boolean, codeDelims?: Map<number, { open: string; close: string }>) {\n    const marks = node.marks;\n    if (opening) {\n      for (const mark of marks) {\n        if (!mark.isInSet(this.activeMarks)) {\n          this.activeMarks = mark.addToSet(this.activeMarks);\n          if (mark.type.name === 'code') {\n            this.write(codeDelims?.get(index)?.open ?? this._codeSpanDelims(node, parent, index).open);\n          } else {\n            this.write(this.markDelimiter(mark, true));\n          }\n        }\n      }\n    } else {\n      const next = this.findNextNonToken(parent, index);\n      for (let i = marks.length - 1; i >= 0; i--) {\n        const mark = marks[i];\n        if (!next || !mark.isInSet(next.marks)) {\n          this.activeMarks = mark.removeFromSet(this.activeMarks);\n          if (mark.type.name === 'code') {\n            this.write(codeDelims?.get(index)?.close ?? this._codeSpanDelims(node, parent, index).close);\n          } else {\n            this.write(this.markDelimiter(mark, false));\n          }\n        }\n      }\n    }\n  }\n\n  /** 预计算 code span 分隔符组，O(N) 一次扫描替代 _codeSpanDelims 的 O(N²) 扫描 */\n  private _precomputeCodeDelims(parent: PMNode): Map<number, { open: string; close: string }> {\n    const cache = new Map<number, { open: string; close: string }>();\n    let i = 0;\n    const count = parent.childCount;\n    while (i < count) {\n      const child = parent.child(i);\n      if (child.isText && child.marks.some(m => m.type.name === 'code')) {\n        let start = i;\n        while (start > 0) {\n          const prev = parent.child(start - 1);\n          if (!prev.isText || !prev.marks.some(m => m.type.name === 'code') || !this._hasSameCodeMarkSet(prev, child)) break;\n          start--;\n        }\n        let end = i;\n        while (end < count - 1) {\n          const next = parent.child(end + 1);\n          if (!next.isText || !next.marks.some(m => m.type.name === 'code') || !this._hasSameCodeMarkSet(next, child)) break;\n          end++;\n        }\n        let content = '';\n        for (let j = start; j <= end; j++) content += parent.child(j).text ?? '';\n        let maxRun = 0, cur = 0;\n        for (const ch of content) {\n          if (ch === '`') { cur++; maxRun = Math.max(maxRun, cur); } else { cur = 0; }\n        }\n        const delim = '`'.repeat(maxRun + 1);\n        const delims = content.startsWith('`') || content.endsWith('`')\n          ? { open: delim + ' ', close: ' ' + delim }\n          : { open: delim, close: delim };\n        for (let j = start; j <= end; j++) cache.set(j, delims);\n        i = end + 1;\n      } else {\n        i++;\n      }\n    }\n    return cache;\n  }\n\n  /** 计算 code span 的开/关分隔符（处理内容含反引号、首尾空白等边界） */\n  private _codeSpanDelims(node: PMNode, parent: PMNode, index: number): { open: string; close: string } {\n    let startIdx = index;\n    while (startIdx > 0) {\n      const prev = parent.child(startIdx - 1);\n      if (!prev.isText) break;\n      if (!prev.marks.some(m => m.type.name === 'code')) break;\n      if (!this._hasSameCodeMarkSet(prev, node)) break;\n      startIdx--;\n    }\n    let endIdx = index;\n    while (endIdx < parent.childCount - 1) {\n      const next = parent.child(endIdx + 1);\n      if (!next.isText) break;\n      if (!next.marks.some(m => m.type.name === 'code')) break;\n      if (!this._hasSameCodeMarkSet(next, node)) break;\n      endIdx++;\n    }\n    let content = '';\n    for (let i = startIdx; i <= endIdx; i++) {\n      content += parent.child(i).text ?? '';\n    }\n    let maxRun = 0;\n    let cur = 0;\n    for (const ch of content) {\n      if (ch === '`') { cur++; maxRun = Math.max(maxRun, cur); }\n      else { cur = 0; }\n    }\n    const delim = '`'.repeat(maxRun + 1);\n    if (content.startsWith('`') || content.endsWith('`')) {\n      return { open: delim + ' ', close: ' ' + delim };\n    }\n    return { open: delim, close: delim };\n  }\n\n  private _hasSameCodeMarkSet(a: PMNode, b: PMNode): boolean {\n    const aCode = a.marks.filter(m => m.type.name === 'code');\n    const bCode = b.marks.filter(m => m.type.name === 'code');\n    if (aCode.length !== bCode.length) return false;\n    for (let i = 0; i < aCode.length; i++) {\n      if (!aCode[i].eq(bCode[i])) return false;\n    }\n    return true;\n  }\n\n  private markDelimiter(mark: Mark, _opening: boolean): string {\n    switch (mark.type.name) {\n      case 'bold': return '**';\n      case 'italic': return '*';\n      case 'strike': return '~~';\n      case 'code': return '`';\n      case 'highlight': return '==';\n      case 'superscript': return '^';\n      case 'subscript': return '~';\n      case 'link': {\n        if (_opening) return '[';\n        const href = (mark.attrs.href as string).replace(/\\(/g, '\\\\(').replace(/\\)/g, '\\\\)');\n        return `](${href}${mark.attrs.title ? ` \"${escapeLinkTitle(mark.attrs.title as string)}\"` : ''})`;\n      }\n      default: return '';\n    }\n  }\n\n  /** 查找下一个非 token 节点（用于判断 mark 是否需要关闭） */\n  private findNextNonToken(parent: PMNode, index: number): PMNode | null {\n    // ProseMirror 中所有子节点都是真实节点，不存在需要跳过的 token。\n    // 直接返回下一个兄弟节点，若无则返回 null。\n    const nextIndex = index + 1;\n    return nextIndex < parent.childCount ? parent.child(nextIndex) : null;\n  }\n\n  private escapeInline(text: string): string {\n    // 判断当前是否处于行首位置（需要额外转义行首特殊字符）\n    // this.closed 不为 null 表示前一个块已关闭但换行尚未写入，等效于行首\n    const atLineStart =\n      this.closed !== null ||\n      this.output.length === 0 ||\n      this.output.endsWith('\\n');\n\n    let result = text.replace(/\\\\/g, '\\\\\\\\');\n\n    if (this.clipboard) {\n      // 剪贴板模式：只转义核心 markdown 语法，避免 `\\=` `\\?` `\\!` 等多余符号\n      result = result.replace(/([`*])/g, '\\\\$1');\n      if (atLineStart) {\n        result = result.replace(/^([#+\\-.>=])/, '\\\\$1');\n      }\n      result = result.replace(/\\n([#+\\-.>=])/g, '\\n\\\\$1');\n    } else {\n      // 文件保存模式：严格转义所有特殊字符，保证 roundtrip fidelity\n      result = result.replace(/([`[\\]()*~^=|$<>{}])/g, '\\\\$1');\n      if (atLineStart) {\n        result = result.replace(/^([#+\\-.])/, '\\\\$1');\n      }\n      result = result.replace(/\\n([#+\\-.])/g, '\\n\\\\$1');\n    }\n\n    // ZWNJ 仅供解析阶段使用，序列化时移除以避免污染输出\n    result = result.replace(/\\u200C/g, '');\n\n    return result;\n  }\n\n  /** 序列化节点 */\n  renderNode(node: PMNode) {\n    const handler = nodeSerializers[node.type.name];\n    if (handler) {\n      handler(this, node);\n    } else {\n      // 未知节点 → 按文本序列化\n      if (node.isTextblock) {\n        this.renderInline(node);\n        this.closeBlock(node);\n      } else {\n        this.renderContent(node);\n      }\n    }\n  }\n\n  /** 递归序列化子节点 */\n  renderContent(parent: PMNode) {\n    let prev: PMNode | null = null;\n    parent.forEach((child, _offset, index) => {\n      if (index > 0) {\n        if (child.isBlock) {\n          if (prev?.type.name === 'horizontalRule' && child.type.name === 'horizontalRule') {\n            this.ensureNewline();\n          } else {\n            this.blankLine();\n          }\n        }\n      }\n      prev = child;\n      this.renderNode(child);\n    });\n  }\n\n  /** 序列化列表 */\n  renderList(node: PMNode, getDelim: (index: number, node: PMNode) => string) {\n    const prevTight = this.inTightList;\n    this.inTightList = true;\n    const savedDepth = this.listDepth;\n    this.listDepth++;\n    const indent = '   '.repeat(savedDepth);\n    node.forEach((child, _offset, index) => {\n      if (index > 0) this.ensureNewline();\n      const delim = getDelim(index, child);\n      this.write(indent + delim);\n      this.renderContent(child);\n    });\n    this.listDepth = savedDepth;\n    this.inTightList = prevTight;\n  }\n}\n\n// ── 节点序列化器 ──────────────────���─────────────────────────────\n\nexport type NodeSerializer = (state: MarkdownSerializerState, node: PMNode) => void;\n\nconst nodeSerializers: Record<string, NodeSerializer> = {\n  doc(state, node) {\n    state.renderContent(node);\n  },\n\n  paragraph(state, node) {\n    if (node.childCount === 0) {\n      state.write('\\u00a0');\n      state.closeBlock(node);\n      return;\n    }\n\n    state.renderInline(node);\n    state.closeBlock(node);\n  },\n\n  heading(state, node) {\n    const marker = '#'.repeat(node.attrs.level);\n    state.write(marker + ' ');\n    const start = state.output.length;\n    state.renderInline(node);\n    // 转义行末 #（前有空格），避免被 re-parse 当成 ATX closing marker 吃掉\n    let hashStart = state.output.length - 1;\n    while (hashStart >= start && state.output[hashStart] === '#') hashStart--;\n    if (state.output.length - 1 - hashStart > 0 && hashStart >= start && state.output[hashStart] === ' ') {\n      state.output = state.output.slice(0, hashStart + 1) + '\\\\' + state.output.slice(hashStart + 1);\n    }\n    state.closeBlock(node);\n  },\n\n  blockquote(state, node) {\n    // 序列化引用块：逐行添加 > 前缀\n    const inner = new MarkdownSerializerState();\n    inner.renderContent(node);\n    const text = inner.output.replace(/\\n$/, '');\n    const lines = text.split('\\n');\n    for (const line of lines) {\n      state.writeLine(`> ${line}`);\n    }\n    state.closeBlock(node);\n  },\n\n  bulletList(state, node) {\n    state.renderList(node, () => '- ');\n  },\n\n  orderedList(state, node) {\n    const start = node.attrs.start ?? 1;\n    state.renderList(node, (index) => `${start + index}. `);\n  },\n\n  listItem(state, node) {\n    state.renderContent(node);\n  },\n\n  taskList(state, node) {\n    state.renderList(node, (_index, child) => {\n      const checked = child.attrs.checked;\n      return checked ? '- [x] ' : '- [ ] ';\n    });\n  },\n\n  taskItem(state, node) {\n    state.renderContent(node);\n  },\n\n  codeBlock(state, node) {\n    const lang = node.attrs.language || '';\n    const content = node.textContent;\n    // CommonMark: backtick fence 的 info string 不能含反引号,\n    // 遇到含反引号的 language 时改用 ~~~ fence\n    const hasLangBackticks = lang.includes('`');\n    const fenceChar = hasLangBackticks ? '~' : '`';\n    let fenceLen = Math.max(3, _maxCharRun(content, fenceChar) + 1);\n    while (_lineClash(content, fenceChar, fenceLen)) fenceLen++;\n    const fence = fenceChar.repeat(fenceLen);\n    state.writeLine(fence + lang);\n    state.writeLine(content);\n    state.writeLine(fence);\n    state.closeBlock(node);\n  },\n\n  horizontalRule(state, node) {\n    state.writeLine('---');\n    state.closeBlock(node);\n  },\n\n  hardBreak(state) {\n    state.write('  \\n');\n  },\n\n  image(state, node) {\n    const alt = node.attrs.alt || '';\n    const src = node.attrs.src || '';\n    const title = node.attrs.title;\n    if (title) {\n      state.write(`![${alt}](${src} \"${escapeLinkTitle(title as string)}\")`);\n    } else {\n      state.write(`![${alt}](${src})`);\n    }\n  },\n\n  // ── 表格 ──\n\n  table(state, node) {\n    const rows: PMNode[] = [];\n    node.forEach((row) => rows.push(row));\n    if (rows.length === 0) return;\n\n    // 收集列数\n    const colCount = rows[0].childCount;\n\n    // 计算每列最大宽度\n    const colWidths: number[] = Array(colCount).fill(3); // 最小3（分隔行 ---）\n    for (const row of rows) {\n      row.forEach((cell, _offset, colIndex) => {\n        const text = cellToText(cell);\n        colWidths[colIndex] = Math.max(colWidths[colIndex], text.length);\n      });\n    }\n\n    // 序列化每行\n    for (let r = 0; r < rows.length; r++) {\n      const row = rows[r];\n      const cells: string[] = [];\n      row.forEach((cell, _offset, colIndex) => {\n        const text = cellToText(cell);\n        cells.push(text.padEnd(colWidths[colIndex]));\n      });\n      state.writeLine('| ' + cells.join(' | ') + ' |');\n\n      // 在第一行（表头）后插入分隔行\n      if (r === 0) {\n        const sep = colWidths.map(w => '-'.repeat(w));\n        state.writeLine('| ' + sep.join(' | ') + ' |');\n      }\n    }\n    state.closeBlock(node);\n  },\n\n  tableRow() { /* handled by table */ },\n  tableHeader() { /* handled by table */ },\n  tableCell() { /* handled by table */ },\n\n  // ── 插件节点 ──\n\n  ...getPluginNodeSerializers(),\n\n};\n\n/** 将表格单元格节点序列化为纯文本（含 inline 标记） */\nfunction cellToText(cell: PMNode): string {\n  const s = new MarkdownSerializerState();\n  cell.forEach((child) => {\n    if (child.type.name === 'paragraph') {\n      s.renderInline(child);\n    } else {\n      s.renderNode(child);\n    }\n  });\n  return s.output.trim().replace(/ {2}\\n/g, '<br>').replace(/\\n/g, '<br>');\n}\n\n/** 计算文本中最长的连续字符运行 */\nfunction _maxCharRun(text: string, ch: string): number {\n  let max = 0, cur = 0;\n  for (const c of text) {\n    if (c === ch) { cur++; max = Math.max(max, cur); }\n    else { cur = 0; }\n  }\n  return max;\n}\n\n/** 检查内容中是否含整行连续 fenceChar >= fenceLen（会被误判为 closing fence） */\nfunction _lineClash(content: string, fenceChar: string, fenceLen: number): boolean {\n  const escaped = fenceChar === '`' ? '\\\\`' : '\\\\~';\n  const re = new RegExp(`(^|\\\\n) {0,3}${escaped}{${fenceLen},}[ \\\\t]*$`, 'm');\n  return re.test(content);\n}\n\nfunction escapeLinkTitle(title: string): string {\n  return title.replace(/\\\\/g, '\\\\\\\\').replace(/\"/g, '\\\\\"');\n}\n\n// ── 导出 ─────────────────��────────────��───────────────────────\n\nexport function serializeMarkdown(doc: PMNode): string {\n  const state = new MarkdownSerializerState();\n  state.renderNode(doc);\n  let output = state.output;\n  // 确保文件以单个换行结尾\n  output = output.replace(/\\n*$/, '\\n');\n  return output;\n}\n\n/** 剪贴板序列化：使用轻量转义，避免 `\\=` `\\?` `\\!` 等多余符号 */\nexport function serializeMarkdownForClipboard(doc: PMNode): string {\n  const state = new MarkdownSerializerState({ clipboard: true });\n  state.renderNode(doc);\n  let output = state.output;\n  output = output.replace(/\\n*$/, '\\n');\n  return output;\n}\n\n/**\n * 出站复制：把选区 Slice 序列化为 Markdown 纯文本（供 `editorProps.clipboardTextSerializer` 使用）。\n *\n * ProseMirror 默认 `clipboardTextSerializer` 只输出 `textContent`（纯文本），\n * 导致 callout / 数学公式 / mermaid / wikilink / frontmatter / 脚注等 solo\n * 扩展语法粘到外部 Markdown 编辑器时标记全丢。这里用文档的 schema 把选区内容\n * 重新序列化为 Markdown，外部编辑器从 `text/plain` 即可拿到完整语法。\n * `text/html` 仍由 ProseMirror 默认生成（标准格式走 HTML 还原，不受影响）。\n */\nexport function serializeClipboardSlice(doc: PMNode, slice: Slice): string {\n  const sliced = doc.copy(slice.content);\n  return serializeMarkdownForClipboard(sliced);\n}\n"},"src/services/tauri/client.ts":{"text":"import { invoke } from '@tauri-apps/api/core';\nimport type { TauriCommandName } from './command-names';\n\nexport interface TauriAppError {\n  code: string;\n  message: string;\n}\n\nfunction isRecord(value: unknown): value is Record<string, unknown> {\n  return value !== null && typeof value === 'object';\n}\n\nfunction parseJsonError(error: string): TauriAppError | null {\n  try {\n    const parsed = JSON.parse(error);\n    if (isRecord(parsed) && typeof parsed.code === 'string' && typeof parsed.message === 'string') {\n      return {\n        code: parsed.code,\n        message: parsed.message,\n      };\n    }\n  } catch {\n    return null;\n  }\n\n  return null;\n}\n\nexport function normalizeTauriError(error: unknown): TauriAppError {\n  if (typeof error === 'string') {\n    return parseJsonError(error) ?? { code: 'unknown_error', message: error };\n  }\n\n  if (isRecord(error)) {\n    if (typeof error.code === 'string' && typeof error.message === 'string') {\n      return {\n        code: error.code,\n        message: error.message,\n      };\n    }\n\n    if (typeof error.message === 'string') {\n      return { code: 'unknown_error', message: error.message };\n    }\n  }\n\n  if (error instanceof Error) {\n    return { code: 'unknown_error', message: error.message };\n  }\n\n  return {\n    code: 'unknown_error',\n    message: '发生未知错误',\n  };\n}\n\nexport async function invokeCommand<T>(\n  command: TauriCommandName,\n  args?: Record<string, unknown>,\n): Promise<T> {\n  try {\n    return await invoke<T>(command, args);\n  } catch (error) {\n    throw normalizeTauriError(error);\n  }\n}\n\n\n"},"src/services/tauri/command-names.ts":{"text":"export const TAURI_COMMANDS = {\r\n  authorizeImageAsset: 'authorize_image_asset',\r\n  resolveImageDisplay: 'resolve_image_display',\r\n  detectProxyForUpdate: 'detect_proxy_for_update',\r\n  fetchFontData: 'fetch_font_data',\r\n  fetchRemoteImage: 'fetch_remote_image',\r\n  getCachedFontPath: 'get_cached_font_path',\r\n  importDocumentImage: 'import_document_image',\r\n  newEditorWindow: 'new_editor_window',\r\n  openDocument: 'open_document',\r\n  readClipboardHtml: 'read_clipboard_html',\r\n  refreshNativeMenuShortcuts: 'refresh_native_menu_shortcuts',\r\n  renameFile: 'rename_file',\r\n  registerShellNew: 'register_shell_new',\r\n  exitApp: 'exit_app',\r\n  revealStartupOpenLog: 'reveal_startup_open_log',\r\n  saveCachedFont: 'save_font_cache',\r\n  saveClipboardImage: 'save_clipboard_image',\r\n  saveDocument: 'save_document',\r\n  setWindowBackgroundColor: 'set_window_background_color',\r\n  startupReady: 'startup_ready',\r\n  unregisterShellNew: 'unregister_shell_new',\r\n} as const;\r\n\r\nexport type TauriCommandName = (typeof TAURI_COMMANDS)[keyof typeof TAURI_COMMANDS];\r\n"},"src/stores/file.ts":{"text":"import { defineStore } from 'pinia';\r\n\r\n/** 默认显示名称 / 无标题文档占位名 */\r\nexport const DEFAULT_DISPLAY_NAME = '未命名';\r\n\r\nexport interface FileState {\r\n  path: string | null;\r\n  content: string;\r\n  isDirty: boolean;\r\n  lastModifiedTime: number | null;\r\n  /** Display name shown in titlebar (editable by user) */\r\n  displayName: string;\r\n  /** 从 path 提取的原始文件名基础名（去扩展名）。保存后 displayName 会重置回此值。 */\r\n  originalBaseName: string;\r\n}\r\n\r\ninterface FileStoreState {\r\n  currentFile: FileState;\r\n  hasUserEdit: boolean;\r\n  isLoading: boolean;\r\n}\r\n\r\nfunction createEmptyFileState(): FileState {\r\n  return {\r\n    path: null,\r\n    content: '',\r\n    isDirty: false,\r\n    lastModifiedTime: null,\r\n    displayName: DEFAULT_DISPLAY_NAME,\r\n    originalBaseName: DEFAULT_DISPLAY_NAME,\r\n  };\r\n}\r\n\r\nexport const useFileStore = defineStore('file', {\r\n  state: (): FileStoreState => ({\r\n    currentFile: createEmptyFileState(),\r\n    // 标记用户是否有过编辑操作\r\n    hasUserEdit: false,\r\n    isLoading: false,\r\n  }),\r\n\r\n  actions: {\r\n    setLoading(loading: boolean) {\r\n      this.isLoading = loading;\r\n    },\r\n\r\n    setContent(content: string) {\r\n      this.currentFile.content = content;\r\n      // 只有用户有编辑操作时才标记为脏\r\n      if (this.hasUserEdit) {\r\n        this.currentFile.isDirty = true;\r\n      }\r\n    },\r\n\r\n    // 用户编辑操作时调用\r\n    markUserEdit() {\r\n      this.hasUserEdit = true;\r\n      this.currentFile.isDirty = true;\r\n    },\r\n\r\n    setFile(content: string, path: string | null, lastModifiedTime: number | null = null) {\r\n      const baseName = path\r\n        ? (path.split(/[/\\\\]/).pop() || DEFAULT_DISPLAY_NAME).replace(/\\.(md|markdown|txt)$/i, '')\r\n        : DEFAULT_DISPLAY_NAME;\r\n      this.currentFile = {\r\n        path,\r\n        content,\r\n        isDirty: false,\r\n        lastModifiedTime,\r\n        displayName: baseName,\r\n        originalBaseName: baseName,\r\n      };\r\n      // 重置编辑标志\r\n      this.hasUserEdit = false;\r\n    },\r\n\r\n    setDisplayName(name: string) {\r\n      const trimmed = name.trim();\r\n      this.currentFile.displayName = trimmed || DEFAULT_DISPLAY_NAME;\r\n      this.currentFile.isDirty = true;\r\n      this.hasUserEdit = true;\r\n    },\r\n\r\n    renamePath(newPath: string) {\r\n      const baseName = newPath\r\n        ? (newPath.split(/[/\\\\]/).pop() || DEFAULT_DISPLAY_NAME).replace(/\\.(md|markdown|txt)$/i, '')\r\n        : DEFAULT_DISPLAY_NAME;\r\n      this.currentFile.path = newPath;\r\n      this.currentFile.displayName = baseName;\r\n      this.currentFile.originalBaseName = baseName;\r\n    },\r\n\r\n    markSaved(lastModifiedTime: number | null = null) {\r\n      this.currentFile.isDirty = false;\r\n      this.hasUserEdit = false;\r\n      this.currentFile.displayName = this.currentFile.originalBaseName;\r\n      if (lastModifiedTime !== null) {\r\n        this.currentFile.lastModifiedTime = lastModifiedTime;\r\n      }\r\n    },\r\n\r\n    reset() {\r\n      this.currentFile = createEmptyFileState();\r\n      this.hasUserEdit = false;\r\n    },\r\n  },\r\n});\r\n"},"src/stores/settings.ts":{"text":"import { defineStore } from 'pinia';\nimport { watch, type WatchStopHandle } from 'vue';\nimport type { Theme as AppTheme, ThemeId } from '../themes/types';\nimport { applyTheme, generateThemeId, getAllPresetThemes, getTheme } from '../themes/manager';\nimport {\n  readStoredFocusMode,\n  readStoredSettings,\n  writeStoredFocusMode,\n  writeStoredSettings,\n} from '../services/tauri/store';\nimport { setCurrentWindowAlwaysOnTop } from '../services/tauri/window';\n\nexport interface Settings {\n  /** Current app theme ID */\n  activeThemeId: ThemeId;\n  /** Custom themes */\n  customThemes: AppTheme[];\n  /** Font size (px). null = use current theme's typography default. */\n  fontSize: number | null;\n  /** Font family */\n  fontFamily: string;\n  /** Auto save */\n  autoSave: boolean;\n  /** Auto save interval in seconds */\n  autoSaveInterval: number;\n  /** Spell check */\n  spellCheck: boolean;\n  /** Titlebar auto-hide (false = always visible) */\n  titlebarAutoHide: boolean;\n  /** Editor line height. null = use current theme's typography default. */\n  lineHeight: number | null;\n  /** Custom shortcuts */\n  customShortcuts: Record<string, string>;\n  /** Window always on top */\n  alwaysOnTop: boolean;\n  /** Custom image storage directory (empty = use assets/ next to document) */\n  imageStoragePath: string;\n  /** Windows shell integration: register .md file association and right-click \"New\" menu */\n  shellIntegration: boolean;\n  /** Auto check for updates on startup */\n  enableAutoUpdateCheck: boolean;\n  /** Config version */\n  configVersion: number;\n}\nconst DEFAULT_SETTINGS: Settings = {\n  activeThemeId: 'scholar-light',\n  customThemes: [],\n  fontSize: null,\n  fontFamily: 'Microsoft YaHei UI',\n  autoSave: false,\n  autoSaveInterval: 30,\n  spellCheck: true,\n  titlebarAutoHide: false,\n  lineHeight: null,\n  customShortcuts: {},\n  alwaysOnTop: false,\n  imageStoragePath: '',\n  shellIntegration: false,\n  enableAutoUpdateCheck: false,\n  configVersion: 12,\n};\n\nconst CURRENT_CONFIG_VERSION = 12;\n\n/** v11 之前的排版默认值，迁移时用于判断用户是否主动修改过 */\nconst LEGACY_FONT_SIZE = 16;\nconst LEGACY_LINE_HEIGHT = 1.6;\n\n/** 自动保存间隔下限（秒），防止配置异常导致过于频繁的保存 */\nconst MIN_AUTOSAVE_INTERVAL_SECONDS = 5;\n\n// 非响应式内部状态（不参与渲染，避免写入 reactive 触发无谓通知）\nlet _saveTimeout: ReturnType<typeof setTimeout> | null = null;\nlet _stopSettingsWatcher: WatchStopHandle | null = null;\nlet _stopActiveThemeIdWatcher: WatchStopHandle | null = null;\nlet _stopFocusModeWatcher: WatchStopHandle | null = null;\n\nexport function normalizeSettings(storedSettings?: Partial<Settings> | null): Settings {\n  const merged = { ...DEFAULT_SETTINGS, ...storedSettings };\n\n  // v12 迁移：排版默认值从硬编码数字改为 null（使用主题默认值）\n  const storedVersion = storedSettings?.configVersion ?? 0;\n  if (storedVersion < 12) {\n    if (merged.fontSize === LEGACY_FONT_SIZE) {\n      merged.fontSize = null;\n    }\n    if (merged.lineHeight === LEGACY_LINE_HEIGHT) {\n      merged.lineHeight = null;\n    }\n  }\n\n  return {\n    ...merged,\n    autoSaveInterval: Math.max(merged.autoSaveInterval, MIN_AUTOSAVE_INTERVAL_SECONDS),\n    configVersion: CURRENT_CONFIG_VERSION,\n  };\n}\n\ninterface SettingsStoreState {\n  settings: Settings;\n  isModalOpen: boolean;\n  isFocusMode: boolean;\n  isLoaded: boolean;\n  presetThemes: AppTheme[];\n  allThemes: AppTheme[];\n  currentTheme: AppTheme | null;\n}\n\nexport const useSettingsStore = defineStore('settings', {\n  state: (): SettingsStoreState => ({\n    settings: normalizeSettings(),\n    isModalOpen: false,\n    isFocusMode: false,\n    isLoaded: false,\n    presetThemes: getAllPresetThemes(),\n    allThemes: [],\n    currentTheme: null,\n  }),\n\n  actions: {\n    async saveSettingsToStore(newSettings: Settings) {\n      if (!this.isLoaded) {\n        return;\n      }\n\n      if (_saveTimeout) {\n        clearTimeout(_saveTimeout);\n      }\n\n      _saveTimeout = setTimeout(async () => {\n        try {\n          await writeStoredSettings({\n            ...newSettings,\n            configVersion: CURRENT_CONFIG_VERSION,\n          });\n        } catch (error) {\n          console.error('[Settings] 保存配置失败:', error);\n        }\n      }, 300);\n    },\n\n    /**\n     * 仅加载主题和背景色（启动阶段3用）。\n     * 不读取完整配置，不触发 watcher，不等 writeStoredSettings。\n     * 返回 false 表示需要后续补全完整加载。\n     */\n    async initThemeOnly(): Promise<boolean> {\n      try {\n        const stored = await readStoredSettings<Partial<Settings>>();\n        if (stored?.activeThemeId) {\n          this.settings.activeThemeId = stored.activeThemeId;\n        }\n        this.applyCurrentTheme(this.settings.activeThemeId);\n        return true;\n      } catch {\n        return false;\n      }\n    },\n\n    /**\n     * 补全完整配置加载（窗口可见后调用）。\n     * 如果 initThemeOnly 没跑过，会完整执行 init()。\n     */\n    async initFull(): Promise<void> {\n      let shouldPersistNormalizedState: boolean;\n\n      try {\n        const [storedSettings, storedFocusMode] = await Promise.all([\n          readStoredSettings<Partial<Settings>>(),\n          readStoredFocusMode(),\n        ]);\n\n        if (storedSettings) {\n          this.settings = normalizeSettings(storedSettings);\n          shouldPersistNormalizedState =\n            (storedSettings.configVersion ?? 0) !== CURRENT_CONFIG_VERSION;\n          if (storedFocusMode !== undefined) {\n            this.isFocusMode = storedFocusMode;\n          } else {\n            this.isFocusMode = false;\n            shouldPersistNormalizedState = true;\n          }\n        } else {\n          this.settings = normalizeSettings();\n          this.isFocusMode = false;\n          shouldPersistNormalizedState = true;\n        }\n\n        if (shouldPersistNormalizedState) {\n          await Promise.all([\n            writeStoredSettings(this.settings),\n            writeStoredFocusMode(this.isFocusMode),\n          ]);\n        }\n      } catch (error) {\n        console.error('[Settings] 加载配置失败:', error);\n        this.settings = normalizeSettings();\n        this.isFocusMode = false;\n        try {\n          await Promise.all([\n            writeStoredSettings(this.settings),\n            writeStoredFocusMode(this.isFocusMode),\n          ]);\n        } catch (saveError) {\n          console.error('[Settings] 保存配置失败:', saveError);\n        }\n      }\n\n      this.isLoaded = true;\n    },\n\n    updateAllThemes() {\n      this.allThemes = [...this.presetThemes, ...this.settings.customThemes];\n    },\n\n    ensureThemeId(themeId: ThemeId): ThemeId {\n      const theme = getTheme(themeId, this.settings.customThemes);\n      if (theme) {\n        return theme.id;\n      }\n\n      const fallbackAppearance = this.currentTheme?.appearance ?? 'light';\n      const fallbackId = fallbackAppearance === 'dark' ? 'scholar-dark' : DEFAULT_SETTINGS.activeThemeId;\n      return getTheme(fallbackId, this.settings.customThemes)\n        ? fallbackId\n        : DEFAULT_SETTINGS.activeThemeId;\n    },\n\n    applyCurrentTheme(themeId: ThemeId) {\n      const resolvedThemeId = this.ensureThemeId(themeId);\n      if (resolvedThemeId !== this.settings.activeThemeId) {\n        this.settings.activeThemeId = resolvedThemeId;\n      }\n\n      const theme = getTheme(resolvedThemeId, this.settings.customThemes);\n      if (!theme) {\n        return;\n      }\n\n      this.currentTheme = theme;\n      applyTheme(theme);\n\n      // 主题排版注入后，重新应用用户自定义的字号/行高（覆盖主题默认值）\n      const style = document.documentElement.style;\n      if (this.settings.fontSize != null) {\n        style.setProperty('--mk-font-size', `${this.settings.fontSize}px`);\n      }\n      if (this.settings.lineHeight != null) {\n        style.setProperty('--mk-line-height', String(this.settings.lineHeight));\n      }\n    },\n\n    setColorTheme(themeId: ThemeId) {\n      this.settings.activeThemeId = themeId;\n      this.applyCurrentTheme(themeId);\n    },\n\n    addCustomTheme(theme: AppTheme) {\n      const nextTheme: AppTheme = {\n        ...theme,\n        id: theme.id || generateThemeId(),\n        type: 'custom',\n      };\n      this.settings.customThemes.push(nextTheme);\n      this.updateAllThemes();\n      void this.saveSettingsToStore(this.settings);\n    },\n\n    removeCustomTheme(themeId: ThemeId) {\n      const index = this.settings.customThemes.findIndex((theme) => theme.id === themeId);\n      if (index === -1) {\n        return;\n      }\n\n      this.settings.customThemes.splice(index, 1);\n      this.updateAllThemes();\n      void this.saveSettingsToStore(this.settings);\n\n      if (this.settings.activeThemeId === themeId) {\n        this.setColorTheme(DEFAULT_SETTINGS.activeThemeId);\n      }\n    },\n\n    startWatchers() {\n      if (!_stopSettingsWatcher) {\n        // 精确 watch 需持久化的顶层字段（不 watch customThemes，由 action 触发持久化）\n        _stopSettingsWatcher = watch(\n          [\n            () => this.settings.activeThemeId,\n            () => this.settings.fontSize,\n            () => this.settings.fontFamily,\n            () => this.settings.lineHeight,\n            () => this.settings.autoSave,\n            () => this.settings.autoSaveInterval,\n            () => this.settings.spellCheck,\n            () => this.settings.titlebarAutoHide,\n            () => this.settings.customShortcuts,\n            () => this.settings.alwaysOnTop,\n            () => this.settings.imageStoragePath,\n            () => this.settings.shellIntegration,\n            () => this.settings.enableAutoUpdateCheck,\n          ],\n          () => {\n            void this.saveSettingsToStore(this.settings);\n          },\n        );\n      }\n\n      // customThemes 由 addCustomTheme / removeCustomTheme action 触发持久化，无需 watcher\n\n      // 主题切换单独监听，仅 activeThemeId 变化时才重注入 CSS 变量\n      if (!_stopActiveThemeIdWatcher) {\n        _stopActiveThemeIdWatcher = watch(\n          () => this.settings.activeThemeId,\n          (themeId) => {\n            this.applyCurrentTheme(themeId);\n          },\n        );\n      }\n\n      if (!_stopFocusModeWatcher) {\n        _stopFocusModeWatcher = watch(\n          () => this.isFocusMode,\n          (value) => {\n            if (this.isLoaded) {\n              void writeStoredFocusMode(value).catch((error) => {\n                console.error('[Settings] 保存 focus mode 配置失败:', error);\n              });\n            }\n            this.applyFocusMode(value);\n          },\n        );\n      }\n    },\n\n    applyFocusMode(enabled: boolean) {\n      document.documentElement.classList.toggle('focus-mode', enabled);\n    },\n\n    toggleFocusMode() {\n      this.isFocusMode = !this.isFocusMode;\n    },\n\n    async toggleAlwaysOnTop(): Promise<void> {\n      const next = !this.settings.alwaysOnTop;\n      try {\n        await setCurrentWindowAlwaysOnTop(next);\n        this.settings.alwaysOnTop = next;\n      } catch (error) {\n        console.error('[Settings] 切换置顶失败:', error);\n      }\n    },\n\n    updateSetting<K extends keyof Settings>(key: K, value: Settings[K]) {\n      this.settings[key] = value;\n    },\n\n    updateSettings(newSettings: Partial<Settings>) {\n      this.settings = normalizeSettings({\n        ...this.settings,\n        ...newSettings,\n      });\n    },\n\n    resetSettings() {\n      this.settings = normalizeSettings();\n    },\n\n  openModal() {\n    this.isModalOpen = true;\n  },\n\n    closeModal() {\n      this.isModalOpen = false;\n    },\n\n    initTheme() {\n      this.updateAllThemes();\n      this.applyCurrentTheme(this.settings.activeThemeId);\n    },\n\n    initFocusMode() {\n      this.applyFocusMode(this.isFocusMode);\n    },\n\n    async init() {\n      await this.initFull();\n      this.startWatchers();\n      this.initTheme();\n      this.initFocusMode();\n      this.initAlwaysOnTop();\n    },\n\n    initAlwaysOnTop() {\n      if (!this.isLoaded) return;\n      setCurrentWindowAlwaysOnTop(this.settings.alwaysOnTop)\n        .catch((error) => {\n          console.error('[Settings] 恢复置顶状态失败:', error);\n        });\n    },\n  },\n});\n"},"docs/INDEX.md":{"text":"# docs/INDEX.md — 文档索引与术语表\n\n> 接手者第一站（`HANDOVER.md`）之外的「地图」。所有文档按受众/状态列清，废弃项显式标出。\n\n## 文档地图\n\n> 本表每个路径均可点击。相对路径，仓库移动也不碎。\n\n| 路径 | 受众 | 用途 | 状态 |\n|---|---|---|---|\n| [`README.md`](../README.md) / [`README.zh-CN.md`](../README.zh-CN.md) / [`README.ja-JP.md`](../README.ja-JP.md) / [`README.ko-KR.md`](../README.ko-KR.md) | 用户 | 产品介绍、安装、dev 起步 | 活跃（已对账 2026-07-20） |\n| [`HANDOVER.md`](../HANDOVER.md) | 接手者/agent | **接手入口**（本批新增） | 活跃 |\n| [`AGENTS.md`](../AGENTS.md) | AI/开发者 | 工作纪律 + 快速入门 | 活跃 |\n| [`ARCHITECTURE.md`](../ARCHITECTURE.md) | 开发者/agent | **权威架构地图**（代码真相） | 活跃（附录 C 固化差异） |\n| [`BUILD_GUIDE.md`](../BUILD_GUIDE.md) | 开发者 | 编译手册 | 活跃 |\n| [`TROUBLESHOOTING.md`](../TROUBLESHOOTING.md) | 用户 | 运行时问题排查 | 活跃 |\n| [`docs/PLAYBOOK.md`](./PLAYBOOK.md) | 维护者/agent | **发布全生命周期剧本（A–F 六阶段总纲）** | 活跃（2026-07-21 新增） |\n| [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md) | 维护者 | 发版机制细节（PLAYBOOK 的 Phase E 子文档） | 活跃 |\n| `RELEASE-CHECKLIST.md`（已并入） | 维护者 | 发版手动回归清单 → 已并入 [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md) §10.4 | 已合并（2026-07-21） |\n| [`PUBLISH_GUIDE.md`](../PUBLISH_GUIDE.md) | 维护者 | 发布指南（RELEASE_PROCESS 小白实操版） | 活跃 |\n| [`PROFILE.md`](../.opencode/PROFILE.md)（`.opencode/`） | 维护者 | 技术档案（与 ARCHITECTURE/CHANGELOG 去重，以二者为真理源） | 活跃 |\n| [`docs/cjk-boundary.md`](./cjk-boundary.md) | 开发者 | CJK 加粗边界专题（历史过程记录） | 活跃（历史快照，勿当现状） |\n| [`docs/network-proxy-guide.md`](./network-proxy-guide.md) | 维护者 | 更新检测代理 | 活跃 |\n| [`docs/KNOWN-ISSUES.md`](./KNOWN-ISSUES.md) | 接手者/agent | **已知问题+技术债**（本批新增） | 活跃 |\n| `docs/defect-hotspots.md`（已并入） | 接手者/agent | **bug 易发区地图** → 已并入 [`ARCHITECTURE.md`](../ARCHITECTURE.md) §11 速查表 | 已合并（2026-07-21） |\n| [`docs/debugging.md`](./debugging.md) | 接手者/agent | **调试指南**（本批新增） | 活跃 |\n| [`docs/INDEX.md`](./INDEX.md) | 接手者/agent | 本文（本批新增） | 活跃 |\n| [`CHANGELOG.md`](../CHANGELOG.md) | 接手者/维护者 | **版本变更史**（P1 新增，由真实 git log 整理） | 活跃 |\n| [`CONTRIBUTING.md`](../CONTRIBUTING.md) | 开发者/agent | **协作规范 / 开发环境 / 提交纪律**（P1 新增） | 活跃 |\n| [`SECURITY.md`](../SECURITY.md) | 维护者/安全研究员 | **安全披露政策 + 攻击面**（P1 新增） | 活跃 |\n| [`.github/ISSUE_TEMPLATE/bug_report.md`](../.github/ISSUE_TEMPLATE/bug_report.md) | 用户/测试 | Bug 报告模板（强制环境 + 日志路径） | 活跃 |\n| [`.github/ISSUE_TEMPLATE/config.yml`](../.github/ISSUE_TEMPLATE/config.yml) | 维护者 | 禁空白 Issue + 安全/讨论链接 | 活跃 |\n| [`.github/PULL_REQUEST_TEMPLATE.md`](../.github/PULL_REQUEST_TEMPLATE.md) | 开发者 | PR 模板（验证清单） | 活跃 |\n| [`docs/archive/`](./archive/) | 维护者 | 时点诊断快照（如 settings-audit-report.md） | 归档 |\n| `.trae/documents/` | — | **旧架构文档（文件树/workspace watcher 等）** | [已废弃] 忽略 |\n\n## 术语表（项目黑话）\n\n| 术语 | 含义 |\n|---|---|\n| 脏态 (dirty state) | 文档相对磁盘是否被修改。`setContent()`（程序写回，不置脏）vs `markUserEdit()`（用户编辑，置脏）分离，防脏态闪烁。 |\n| roundtrip | Markdown → 解析 → 序列化 → 再解析的保真测试。安全网：[`roundtrip.spec.ts`](../src/components/Editor/tiptap/markdown/__tests__/roundtrip.spec.ts) + [`commonmark.spec.ts`](../src/components/Editor/tiptap/markdown/__tests__/commonmark.spec.ts)。 |\n| IPC 服务层 | [`src/services/tauri/`](../src/services/tauri/)，前端唯一 IPC 入口，绝不直接 `invoke`。 |\n| capabilities 权限 | [`src-tauri/capabilities/`](../src-tauri/capabilities/)，最小权限白名单，新增 IPC 须登记。 |\n| 原子写 | 先写 `.tmp` 再 `rename`（`MoveFileExW`），防写入中断损坏原文件。 |\n| 规范化基线 | 编辑器加载后立即序列化写回 store，消除 parser/serializer 归一化差异导致的假脏态。 |\n| 启动开打竞态 | 前端未 ready 就收到开文件请求；三层缓冲兜底（[`state.rs`](../src-tauri/src/state.rs) + [`lib.rs`](../src-tauri/src/lib.rs)）。 |\n| 多窗口进程模型 | 每 `.md` 独立进程（v1.2.5+），关最后一窗默认不退出。 |\n| 主题色彩映射 | [`src/themes/types.ts`](../src/themes/types.ts)`::CSS_VAR_MAP`，68 个颜色字段 → CSS 变量。 |\n| 防抖分层 | 统计 50ms / 光标 100ms / 序列化 500ms，刻意分离。 |\n| Markdown 保真 | 解析/序列化精确还原，不丢数据、不引入隐形字符。 |\n"},"docs/KNOWN-ISSUES.md":{"text":"# docs/KNOWN-ISSUES.md — 已知问题与技术债\n\n> 接手者 / agent 排查问题时先查本表：能区分「这是已知坑」还是「新 bug」。\n> 状态图例：`[已修复]` 供溯源 ｜ `[部分缓解]` ｜ `[未解决]` 待办 ｜ `[文档坑]` 文档类陷阱 ｜ `[设计取舍]` 非 bug\n\n## 一、已修复（保留供溯源，勿误当现状）\n\n| # | 现象 | 根因 | 修复 | 文件 |\n|---|---|---|---|---|\n| 1 | mermaid 图表全黑 | `securityLevel:'strict'` 使 DOMPurify 删掉主题 `<style>` | 改 `'loose'`（本地优先单文件，风险可忽略） | [`src/components/Editor/tiptap/extensions/mermaid-block.ts`](../src/components/Editor/tiptap/extensions/mermaid-block.ts) |\n| 2 | 拖入 `.md` 不打开新窗口 | [`src/services/tauri/events.ts`](../src/services/tauri/events.ts) 的 `activeDragDropHandler` 单值变量，后注册覆盖前者 | 改为 `Set<DragDropHandler>` 广播分发 | [`src/services/tauri/events.ts`](../src/services/tauri/events.ts) |\n| 3 | 图片拖入调用点 5 行 if/else | 路径模式判别 + authorize 分散 | 新增 `resolve_image_display` 单命令合并 | [`src-tauri/src/commands/document.rs`](../src-tauri/src/commands/document.rs) |\n| 4 | IME 候选栏变箭头 | `editor.css` 的 `ime-mode: active`（IE 遗留，WebView2 上致候选窗变形） | 删除该属性 | [`src/components/Editor/tiptap/editor.css`](../src/components/Editor/tiptap/editor.css) |\n| 5 | 文档干净度矛盾（导出功能/测试数） | 多份文档与代码脱节 | 2026-07-20 文档对账，导出功能按代码为准对齐 | [`README.md`](../README.md)×4 / [`ARCHITECTURE.md`](../ARCHITECTURE.md) / [`.opencode/PROFILE.md`](../.opencode/PROFILE.md) / [`RELEASE_PROCESS.md`](../RELEASE_PROCESS.md) |\n| 6 | 字体缓存文档脱节（IndexedDB vs 文件系统） | [`ARCHITECTURE.md`](../ARCHITECTURE.md) 原写 IndexedDB，[`.opencode/PROFILE.md`](../.opencode/PROFILE.md) 说 v1.2.10 后改文件系统，两说打架 | 2026-07-21 文档规范化：以 `fontLoader.ts` 实际机制（文件系统缓存）为准，ARCHITECTURE 改文件系统、PROFILE 删除重复段改指针 | [`ARCHITECTURE.md`](../ARCHITECTURE.md):489/574 / [`.opencode/PROFILE.md`](../.opencode/PROFILE.md) |\n\n## 二、未解决 / 待办（[未解决]）\n\n| # | 现象 | 说明 | 相关文件 |\n|---|---|---|---|\n| 1 | 崩溃时 `.tmp` 文件未清理 | `save_document` 原子写产生 `.tmp`，崩溃路径无清理 | [`src-tauri/src/commands/document.rs`](../src-tauri/src/commands/document.rs) |\n| 2 | mermaid 中文标签体验有限 | 已加错误提示 + 5 个单测，但中文/特殊字符标签仍需用户自加引号 `A[\"文本\"]` | [`src/components/Editor/tiptap/extensions/mermaid-block.ts`](../src/components/Editor/tiptap/extensions/mermaid-block.ts) |\n| 3 | 测试数曾多处不一致 | 2026-07-20 已治理（README/PROFILE/ARCHITECTURE 去硬编码），但**新增文档请勿再硬编码测试数**，统一写「以 `bun run test` 实际输出为准」 | 全局 |\n\n## 三、设计取舍（[设计取舍]，非 bug，勿\"修\"）\n\n| 项 | 说明 |\n|---|---|\n| 导出系统 v1.2.18 删除 | 改为状态栏「复制为 HTML」（剪贴板），无独立导出/PDF/微信。PDF 实为浏览器打印（[`TROUBLESHOOTING.md`](../TROUBLESHOOTING.md) §5） |\n| `html:false` / `linkify:false` | 解析器刻意不保留原始 HTML、不自动链接裸 URL，保真优先 |\n| 多进程架构（v1.2.5+） | 每双击一个 `.md` 起独立进程；关最后一个窗口默认不退出，需菜单「退出」 |\n\n## 四、文档类已知坑（[文档坑]，agent 必读）\n\n- **`.trae/documents/`**：旧架构文档（文件树/workspace watcher/fs.rs 等），**已失效，忽略**（不要链接、不要读取）。\n- **[`.opencode/PROFILE.md`](../.opencode/PROFILE.md)**：技术档案，含历史快照，可能与当前代码有延迟；以 [`ARCHITECTURE.md`](../ARCHITECTURE.md) + 代码为准。\n- **[`ARCHITECTURE.md`](../ARCHITECTURE.md) 附录 C**：已固化「文档-代码差异」清单，遇到矛盾先查此表。\n- 任何文档若与代码不符，**以代码为准并更新文档**。\n\n## See also\n\n- [bug 易发区地图（ARCHITECTURE §11）](../ARCHITECTURE.md)\n- [调试指南](./debugging.md)\n- [文档索引与术语表](./INDEX.md)\n- [接手指南](../HANDOVER.md)\n- [项目工作手册](../AGENTS.md)\n- [架构权威地图](../ARCHITECTURE.md)\n"},"docs/debugging.md":{"text":"# docs/debugging.md — 调试指南（人 + agent 共用）\n\n## 一、前端运行时调试\n- **DevTools**：`bun run dev:tauri:inspect`（设 `SOLO_OPEN_DEVTOOLS=1` 打开 WebView2 DevTools）。\n- 日志约定：项目禁 `console.log`，仅允许 `warn`/`error`（[`AGENTS.md`](../AGENTS.md)）。排查时看 DevTools Console 的 warn/error。\n- 编辑器懒加载：窗口未获焦点时 TipTap 实例不创建 → 编辑器空白，单击编辑区触发 `lazyInitEditor`（非 bug，见 [`TROUBLESHOOTING.md`](../TROUBLESHOOTING.md) §4）。\n\n## 二、Markdown 解析调试（草稿脚本 [`_diag.ts`](../_diag.ts)）\n- 用途：单独验证 markdown-it 的 token 流（排查加粗/中文边界等解析问题）。\n- 注意：脚本用 CommonJS `require('jsdom')`，且项目 `type:module`。**jsdom 不在 `package.json` 依赖里**，直接跑会缺模块。复用方式（二选一）：\n  - `bun add -d jsdom` 后用 `bun _diag.ts`；或\n  - 临时改 `.mjs` + 装 jsdom 后用 `node _diag.ts`。\n- 这是**未接入构建的草稿**，仅供手动排查，不要依赖它做 CI。\n\n## 三、启动开打竞态调试\n- Rust 命令 `reveal_startup_open_log` 返回 `startup-open.log` 路径；该日志记录 CLI/OS-open/NewWindow 三类开打请求的缓冲过程。\n- 前端调用：经 [`src/services/tauri/`](../src/services/tauri/) 封装，或直接 `invoke('reveal_startup_open_log')`。\n\n## 四、重置设置 / 缓存（用户侧自救）\n- 设置：`%APPDATA%\\solo\\settings.json`（tauri-plugin-store 持久化）。删除即恢复默认。\n- 文档缓存：`%APPDATA%\\solo\\documents\\`（自动保存的原地文件，非临时副本）。\n- Windows 文件关联注册表（出问题时清理）：\n  - `HKCU\\Software\\Classes\\.md\\ShellNew`（NullFile）\n  - `HKCU\\Software\\Classes\\solo.markdown`（ProgID / DefaultIcon 须 `,0` 结尾）\n  - 详见 [`TROUBLESHOOTING.md`](../TROUBLESHOOTING.md) 注册表表。\n\n## 五、Rust / 构建调试\n- `cargo check` 必须先注入 MSVC 环境（PATH/INCLUDE/LIB 指向 `M:\\VS\\BuildTools` + Windows SDK `10.0.26100.0`，`CARGO_HOME=M:\\rust\\.cargo`）。完整命令见 [`HANDOVER.md`](../HANDOVER.md) 环境段。\n- **bun 下 segfault 的兜底**（本机 bun 1.3.14 / Windows）：\n  - 类型检查：`node node_modules/vue-tsc/bin/vue-tsc.js --noEmit`\n  - 构建：`node node_modules/vite/bin/vite.js build`\n  - 测试：**只跑 `bun run test`**（完整），绝不用 `bunx vitest run <过滤>`（segfault）。\n\n## 六、验证改动的标准动作\n1. 改 parser/serializer → `bun run test` 全绿（roundtrip + commonmark 必过）。\n2. 改前端 → 刷新实测（本环境无 GUI，需用户在 Win11 验证的，明确标注）。\n3. 改 Rust → `cargo check`（带 MSVC 环境）。\n4. 发版前 → 升版本号（package.json / Cargo.toml / tauri.conf.json 三处）+ 去硬编码测试数。\n\n## 七、桌面应用快捷键调试（Tauri/Electron + ProseMirror 通用）\n\n> 来源：`_docs/经验/桌面应用快捷键调试经验.md`（2026-06-25）已收编于此，原文件已归档。\n\n### 1. 四层拦截点（从底层到上层）\n```\nIME(输入法) → 原生菜单加速器(Tauri) → WebView2浏览器控件 → JavaScript keydown\n```\n- 快捷键\"没反应\"先怀疑前两层（IME / 原生菜单），不是 JS 层的问题。\n- **快速定位法**：换一个不冲突的键（如 `Ctrl+Alt+字母`），换了能用 = 被拦截，不是逻辑坏。\n\n### 2. 设计默认快捷键的避坑清单\n| 组合 | 风险 | 推荐替代 |\n|------|------|----------|\n| `Ctrl+Shift+F` | IME 繁简切换拦截 | `Ctrl+Alt+F` |\n| `Ctrl+F` / `Ctrl+H` | WebView2 原生查找/替换拦截 | `Ctrl+G` / `Ctrl+Shift+G` |\n| `Ctrl+Alt+字母` / `Ctrl+Shift+字母`(非 F/H) | 中文 Windows 上最安全 | 首选 |\n- 同一快捷键可能被多层处理导致**双重触发抵消**（窗口 handler + ProseMirror 各触发一次）→ 窗口 handler 跳过 `scope:'editor'` 的默认快捷键。\n\n### 3. 逻辑触发了但无视觉反馈（ProseMirror 装饰层）\n- `view.updateState(view.state)` 传入**同个 state 对象** → ProseMirror 内部 `state === prevState` 检查直接跳过（空操作）。\n- 正确做法：`view.dispatch(state.tr)` 或 `view.updateState(state.apply(state.tr))`。\n- 更可靠：扩展自身用 `MutationObserver` 监听 DOM 类变化，不依赖外部调用（如 `paragraph-focus.ts`）。\n\n### 4. command 链路排查\n```\n快捷键 → findCommandByShortcut → executeCommand\n  → (scope:'editor') editorRef.executeCommand → editor-commands.ts\n  → (scope:'app') switch case → handler\n```\n- `eventToKeyString` 大小写敏感，确认 `event.key` 取值。\n- `scope:'editor'` 默认先被 ProseMirror 处理，窗口级 handler 别再处理一次。\n\n## See also\n\n- [bug 易发区地图（ARCHITECTURE §11）](../ARCHITECTURE.md)\n- [已知问题与技术债](./KNOWN-ISSUES.md)\n- [文档索引与术语表](./INDEX.md)\n- [接手指南](../HANDOVER.md)\n- [项目工作手册](../AGENTS.md)\n- [用户侧问题排查](../TROUBLESHOOTING.md)\n- [架构权威地图](../ARCHITECTURE.md)\n"},"docs/cjk-boundary.md":{"text":"# CJK Markdown 经验沉淀\r\n\r\n> 本文件记录 markdown-it 对 CJK 标点后 `**`/`*` 关闭失效的根因、方案决策和关键约束。\r\n> 下次改 parser/serializer 涉及 CJK 边界时必须优先阅读。\r\n\r\n---\r\n\r\n## 问题\r\n\r\nCommonMark 的 delimiter flanking 规则以英文视角设计：\r\n\r\n```\r\nright_flanking = !isLastWhitespace && (!isLastPunctChar || isNextPunctChar || isLastWhitespace)\r\n```\r\n\r\nCJK 文本中，`，**继续` 场景：\r\n- `isLastPunctChar = true`（`，` 是标点）\r\n- `isNextPunctChar = false`（`继` 不是标点/空白）\r\n- → `right_flanking = false` → `can_close = false` → `**` 无法关闭加粗\r\n\r\n类似问题也出现在开启侧：`嘿**「` → `isLastPunctChar = false`（`嘿` 不是标点），`isNextPunctChar = true`（`「` 是标点）→ `left_flanking = false` → `can_open = false`。\r\n\r\n## 方案选择\r\n\r\n| 方案 | 思路 | 优缺点 |\r\n|------|------|--------|\r\n| **A. 预处理 ZWNJ（已采用）** | 在 `**` 前后插入零宽连字符 U+200C，改变 flanking 判断 | 外围打补丁，不动引擎；兼容性好；但略显 hacky |\r\n| **B. 改 markdown-it scanDelims** | monkey-patch `State.prototype.scanDelims`，让 CJK 标点不阻塞 flanking | 更优雅；但依赖内部方法，升级有风险 |\r\n| **C. `markdown-it-cjk-friendly` 插件** | 方案 B 的封装版，VitePress 2.x 已内置 | 现成可用；但 ESLM-only，与现有插件栈有集成风险 |\r\n\r\n**选 A 的原因**：改动范围最小，不引入新依赖，能通过全部 829 个测试。\r\n\r\n## 关键约束\r\n\r\n1. **Roundtrip 稳定性**：parse → serialize → re-parse 结果必须一致\r\n2. **CommonMark 兼容**：618 个标准用例不能受影响\r\n3. **`**` 和 `*` 都要处理**（不包括 `_`）\r\n4. **`***`（加粗+斜体混合）也要处理**，不能只匹配 `\\*{1,2}`\r\n5. **不能干扰 markdown 语法字符**：`~`（删除线）、`` ` ``（代码）、`=`（高亮）、`[` `]`（链接）等 ASCII 标点是语法字符，不能插入 ZWNJ\r\n\r\n## 实现决策\r\n\r\n### 预处理正则（parser.ts:438-462）\r\n\r\n**关闭方向**（punct → `**` → word）：\r\n```\r\n(?<!\\*)(?<=[\\p{P}\\p{S}])(\\*+)(?=[^\\s\\p{P}\\p{S}])\r\n```\r\n- `\\*+` 而非 `\\*{1,2}`：兼容 `***`（加粗+斜体混合）\r\n- 排除 ASCII 标点 `[\\x21-\\x2F\\x3A-\\x40\\x5B-\\x60\\x7B-\\x7E]`：防误伤 `~` `` ` `` `=` `[` `]` `(` `)` 等 markdown 语法字符\r\n- `(?<!\\*)` 放首位而非末尾：JS 的 lookbehind 在末尾时检查的是匹配结束前位置，不是匹配开始前位置\r\n\r\n**开启方向**（word → `**` → punct）：\r\n```\r\n(?<!\\*)(?<=[^\\s\\p{P}\\p{S}])(\\*{1,2})(?=[\\p{P}\\p{S}])(?!\\*)\r\n```\r\n- `(?!\\*)` 防止匹配到关闭 `**` 的第一个 `*`（否则 `**hello**` 会被拆成 `*\\u200C*`）\r\n- 同样排除 ASCII 标点\r\n\r\n### 顺序必须固定\r\n先处理关闭方向，再处理开启方向。颠倒会导致互踩。\r\n\r\n### 序列化器（serializer.ts）\r\n\r\n- ZWNJ 只在解析阶段使用，序列化时从文本中剥离\r\n- 删除原有的 `_delimiterBoundaryUnsafe` ZWNJ 插入逻辑（由预处理统一接管）\r\n\r\n## 测试覆盖（829 个用例）\r\n\r\n| 测试文件 | 用例数 | 覆盖场景 |\r\n|----------|--------|----------|\r\n| `commonmark.spec.ts` | 618 | CommonMark 标准合规 |\r\n| `roundtrip.spec.ts` | 81 | parse→serialize→re-parse 闭环 |\r\n| `fuzz.spec.ts` | 100 | 随机输入稳定性 |\r\n| `fixtures.spec.ts` | 19 | 预设文件对比 |\r\n| `_cjk-diag.spec.ts` | 8 | CJK 边界用例专项 |\r\n\r\n## CJK 边界用例目录\r\n\r\n以下是用例的完整集合，不依赖具体实现，任何引擎均可直接使用：\r\n\r\n### 纯加粗\r\n```\r\n**「hello world」**                    → bold\r\n**「网页转电脑软件的超级瘦身工具」**    → bold\r\n**「hello」** world                    → bold\r\nhello **「world」**                    → bold\r\n嘿**「你好」**                        → bold\r\n嘿，**「你好」**。                    → bold\r\n嘿 **「你好」** 吗                    → bold\r\n**「你好」**吗                        → bold\r\n```\r\n\r\n### 加粗 + 标点边界\r\n```\r\n**沉浸式体验，**继续                   → bold（逗号后关闭）\r\n*沉浸式体验，*继续                     → italic（逗号后关闭）\r\n***你好，***继续                       → bold+italic（逗号后关闭）\r\n```\r\n\r\n### 混合 mark + CJK\r\n```\r\n**粗体 *斜体* 混合，**                → bold with italic inside\r\n**（沉浸式体验），**                   → bold（括号后关闭）\r\n**他说“你好”**                         → bold（引号后关闭）\r\n**第一段，****第二段。**               → 跨段落加粗\r\n```\r\n\r\n### Unicode 符号\r\n```\r\n*hello™*world                          → italic（™ 后关闭）\r\n```\r\n\r\n### ZWNJ 剥离验证\r\n```\r\n**沉浸式体验，\\u200C**继续             → 输出不含 ZWNJ\r\n*沉浸式体验，\\u200C*继续               → 输出不含 ZWNJ\r\n***你好，\\u200C***继续                 → 输出不含 ZWNJ\r\n```\r\n\r\n### 不应受影响的场景（负例）\r\n```\r\n`code **not bold**`                    → code 内 ** 不做加粗\r\n~~**hello**~~                          → strike(bold)，不做 ZWNJ 插入\r\n==**bold highlight**==                 → highlight(bold)\r\n[**bold link**](https://example.com)   → bold inside link\r\n**hello world.**                       → 句号末尾，无后续文本\r\n**hello, world,**                      → 逗号末尾\r\n**hello!**                             → 感叹号末尾\r\n**hello?**                             → 问号末尾\r\n```\r\n\r\n---\r\n\r\n## 关联文件\r\n\r\n- `src/components/Editor/tiptap/markdown/parser.ts` — ZWNJ 预处理（关键入口）\r\n- `src/components/Editor/tiptap/markdown/serializer.ts` — ZWNJ 剥离（出口）\r\n- `src/components/Editor/tiptap/editor.css` — `ime-mode: active`（IME 助手）\r\n- `src/components/Editor/tiptap/markdown/__tests__/_cjk-diag.spec.ts` — CJK 诊断测试\r\n- `src/components/Editor/tiptap/markdown/__tests__/roundtrip.spec.ts` — 闭环测试\r\n\r\n---\r\n\r\n## 会话日志\r\n\r\n### 2026-06-29 会话 #1 — CJK 标点修复 + IME 优化\r\n\r\n**目标**：解决 markdown-it 因 CJK 标点边界导致 `**`/`*`/`***` 无法正确关闭或打开的问题。\r\n\r\n**完成项**：\r\n- [x] parser.ts preprocessor：插入 ZWNJ 处理关闭方向（punct→`**`→word）和开启方向（word→`**`→punct）\r\n- [x] 排除 ASCII 标点（`~` `` ` `` `=` `[` `]` `(` `)` 等），只对非 ASCII `\\p{P}\\p{S}` 加 ZWNJ\r\n- [x] `\\*+` 兼容 `***`（加粗+斜体混合）\r\n- [x] `(?<!\\*)` 放首位而非末尾（JS lookbehind 位置陷阱）\r\n- [x] serializer.ts：删除 `_delimiterBoundaryUnsafe` ZWNJ 插入逻辑，改由预处理统一接管\r\n- [x] serializer.ts：`escapeInline` 中 strip ZWNJ，保证输出干净\r\n- [x] `editor.css`：添加 `ime-mode: active` 缓解微软拼音浮动候选框 ⚠️ **后于 2026-07-20 移除**：该属性在 Win11+WebView2 下反而导致候选栏变箭头，见 `editor.css` 注释\r\n- [x] 更新 roundtrip 测试期望值（CJK 边界从转义恢复到正确解析）\r\n- [x] 前端构建通过（`bun run build`）\r\n- [ ] Tauri 打包未完成（缺 Rust 工具链）\r\n\r\n**测试结果**（截至 2026-06-29 修复时）：978 全过（27 个测试文件，0 失败），markdown 解析相关测试全部通过\r\n**经验沉淀**：本文件 + `parser.ts` 注释索引\r\n\r\n**未完成任务**（留给下次）：\r\n1. 在用户环境执行 `bun run build && bun run tauri build` 打包\r\n2. ~~验证 `ime-mode: active` 对微软拼音浮动框的实际缓解效果~~（已作废：2026-07-20 移除该属性，候选栏箭头由删除 `ime-mode` 解决）\r\n"}};

const FILES = [
  // ── 门面文档 ──
  { cat: "facade", path: "README.md", level: "green",

// ── Render ──
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
const sourceEl = document.getElementById("source");
const sourcePath = document.getElementById("sourcePath");
const ghLink = document.getElementById("ghLink");
const sourceToc = document.getElementById("sourceToc");
const sourceBody = document.getElementById("sourceBody");
const sourceBackdrop = document.getElementById("sourceBackdrop");
const sourceClose = document.getElementById("sourceClose");
const srcCopy = document.getElementById("srcCopy");
const srcDownload = document.getElementById("srcDownload");
const srcLines = document.getElementById("srcLines");
let activeFilter = "all";
let activeId = null;

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function fileById(id) { return FILES.find(f => f.path === id); }
function catName(id) { return CATS.find(c => c.id === id).name; }

function buildSidebar() {
  sidebar.innerHTML = "";
  CATS.forEach(cat => {
    const items = FILES.filter(f => f.cat === cat.id);
    if (!items.length) return;
    const catEl = document.createElement("div");
    catEl.className = "cat";
    catEl.dataset.cat = cat.id;

    const head = document.createElement("div");
    head.className = "cat-head";
    head.innerHTML = `<span class="arrow">▾</span><span class="cat-name">${cat.name}</span><span class="cat-count">${items.length}</span>`;
    head.addEventListener("click", () => catEl.classList.toggle("collapsed"));
    catEl.appendChild(head);

    const wrap = document.createElement("div");
    wrap.className = "cat-items";
    const inner = document.createElement("div");
    inner.className = "inner";

    items.forEach(f => {
      const item = document.createElement("div");
      item.className = "file-item";
      item.dataset.path = f.path;
      item.dataset.level = f.level;
      item.innerHTML = `
        <span class="dot ${f.level}"></span>
        <span class="fmeta">
          <span class="fname">${f.path.split("/").pop()}</span>
          <span class="fpath">${f.path}</span>
        </span>`;
      item.addEventListener("click", () => selectFile(f.path));
      inner.appendChild(item);
    });

    wrap.appendChild(inner);
    catEl.appendChild(wrap);
    sidebar.appendChild(catEl);
  });
}

function selectFile(path, anchor) {
  const f = fileById(path);
  if (!f) return;
  activeId = path;
  document.querySelectorAll(".file-item").forEach(el => {
    el.classList.toggle("active", el.dataset.path === path);
  });
  renderDetail(f);
  renderSource(f, anchor);
}

function renderSource(f, anchor) {
  sourcePath.textContent = f.path;
  ghLink.href = "https://github.com/jloft198479-cyber/solo/blob/master/" + encodeURI(f.path);
  const entry = SOURCES[f.path];
  const noText = !entry || entry.missing || entry.dir;
  srcCopy.disabled = noText;
  srcDownload.disabled = noText;
  if (!entry || entry.missing) {
    sourceToc.innerHTML = "";
    sourceBody.innerHTML = `<div class="source-empty">该文件原文不可用（可能已被移动或删除）。右侧仍可点「GitHub ↗」查看仓库最新版本。</div>`;
    return;
  }
  const raw = entry.dir ? entry.tree : entry.text;
  const lines = raw.replace(/\r\n/g, "\n").split("\n");

  // 仅 .md 生成标题目录
  const isMd = f.path.endsWith(".md");
  let tocHtml = "";
  if (isMd) {
    const tocItems = [];
    lines.forEach((ln, i) => {
      const m = /^(#{1,6})\s+(.*)$/.exec(ln);
      if (m) tocItems.push({ l: i + 1, text: m[2].trim() });
    });
    tocHtml = tocItems.map(t => `<button class="toc-item" data-l="${t.l}">${esc(t.text)}</button>`).join("");
  }
  sourceToc.innerHTML = tocHtml;

  sourceBody.innerHTML = lines.map((ln, i) =>
    `<div class="ln" data-l="${i + 1}"><span class="ln-no">${i + 1}</span><span class="ln-tx">${esc(ln) || " "}</span></div>`
  ).join("");

  sourceToc.querySelectorAll(".toc-item").forEach(b => {
    b.addEventListener("click", () => scrollToLine(b.dataset.l));
  });

  // 关联点击带过来的「跳到对应小节」
  if (anchor) {
    const idx = lines.findIndex(ln => /^(#{1,6})\s+/.test(ln) && ln.includes(anchor));
    if (idx >= 0) {
      setTimeout(() => {
        scrollToLine(String(idx + 1));
        const el = sourceBody.querySelector('.ln[data-l="' + (idx + 1) + '"]');
        if (el) { el.classList.add("hit"); setTimeout(() => el.classList.remove("hit"), 1200); }
      }, 40);
    }
  }
}

function scrollToLine(l) {
  const el = sourceBody.querySelector('.ln[data-l="' + l + '"]');
  if (el) el.scrollIntoView({ block: "start" });
}

function openSource() {
  sourceEl.classList.add("open");
  sourceBackdrop.classList.add("show");
}
function closeSource() {
  sourceEl.classList.remove("open");
  sourceBackdrop.classList.remove("show");
}

function renderDetail(f) {
  const lv = LEVEL[f.level];
  const relatedHtml = f.related.map(r => {
    const rp = typeof r === "string" ? r : r.p;
    const anchor = typeof r === "string" ? null : (r.a || null);
    const target = FILES.find(x => x.path === rp);
    if (target) return `<span class="rel-chip" data-go="${esc(rp)}" data-anchor="${esc(anchor || "")}" role="button" tabindex="0">${esc(rp)}</span>`;
    return `<span class="rel-static" title="仓库内存在，但本指南未单独收录">${esc(rp)}</span>`;
  }).join("");
  main.innerHTML = `
    <div class="detail enter">
      <div class="d-head">
        <div>
          <h2 class="d-title">${f.path.split("/").pop()}</h2>
          <div class="d-path">${f.path}</div>
        </div>
        <span class="badge ${lv.cls}">● ${lv.label}</span>
        <button class="copy-path" data-path="${f.path}" title="复制文件路径">⧉ 复制路径</button>
        <button class="view-source" id="viewSourceBtn" title="查看原文">📄 查看原文</button>
      </div>

      <div class="d-section">
        <h3>一句话总结</h3>
        <div class="d-tldr">${f.tldr}</div>
      </div>

      <div class="d-section d-what">
        <h3>它是干啥的（人话版）</h3>
        <p>${f.what}</p>
        <div class="analogy"><b>打个比方：</b>${f.analogy}</div>
      </div>

      <div class="d-section">
        <h3>关键内容</h3>
        <ul class="d-list">${f.contents.map(c => `<li>${c}</li>`).join("")}</ul>
      </div>

      <div class="d-section">
        <h3>相关文件</h3>
        <div class="related">${relatedHtml}</div>
      </div>
    </div>`;

  main.querySelectorAll(".rel-chip").forEach(chip => {
    const go = () => {
      selectFile(chip.dataset.go, chip.dataset.anchor || null);
      if (window.innerWidth <= 1080) openSource();
    };
    chip.addEventListener("click", go);
    chip.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
    });
  });

  main.querySelectorAll(".copy-path").forEach(btn => {
    btn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(btn.dataset.path);
        btn.classList.add("done"); btn.textContent = "✓ 已复制";
        setTimeout(() => { btn.classList.remove("done"); btn.textContent = "⧉ 复制路径"; }, 1400);
      } catch { btn.textContent = "复制失败"; }
    });
  });

  const vs = main.querySelector("#viewSourceBtn");
  if (vs) vs.addEventListener("click", () => {
    openSource();
    if (window.innerWidth > 1080) {
      sourceEl.classList.add("flash");
      setTimeout(() => sourceEl.classList.remove("flash"), 600);
    }
  });

  main.scrollTop = 0;
}

function renderSourcePlaceholder() {
  sourcePath.textContent = "—";
  ghLink.href = "#";
  sourceToc.innerHTML = "";
  sourceBody.innerHTML = `<div class="source-empty">在左侧选择一个文件，这里会显示它的<strong>原文</strong>。<br>点击中栏「相关文件」里的条目，可一键跳过去并定位到对应小节（如 ARCHITECTURE 的「关键约束」）。</div>`;
}

  main.innerHTML = `
    <div class="welcome">
      <h2>欢迎来到 solo 项目导游 👋</h2>
      <p class="lead">这不是一份冰冷的文件清单，而是一张「带讲解的地图」。左边按功能分了类；点开任意文件，<strong>中间</strong>用大白话告诉你它是干啥的、像生活中的什么，<strong>右边</strong>直接展示它的原文，还能一键跳到相关文件。</p>

      <div class="route-card">
        <h3>🧭 推荐阅读路线（别跳，按顺序走）</h3>

        <div class="route-step"><div class="route-num">2</div><div><div class="rs-title">HANDOVER.md → AGENTS.md → ARCHITECTURE.md</div><div class="rs-desc">30 秒定位 → 工作纪律 → 权威架构蓝图。这是搞懂项目的三块基石。</div></div></div>
        <div class="route-step"><div class="route-num">3</div><div><div class="rs-desc">配置中枢（package.json / Cargo.toml / tauri.conf.json）看一眼，知道版本号和依赖在哪。</div></div></div>

        <div class="route-step"><div class="route-num">5</div><div><div class="rs-desc">按需查 docs/：改代码前看 ARCHITECTURE.md §11（原 defect-hotspots 已并入），排错看 debugging，想发版看 RELEASE_PROCESS。</div></div></div>

      <div class="route-card">
        <h3>🔖 颜色图例（帮你分配有限的注意力）</h3>

        <p style="color:var(--muted);font-size:13px;margin:14px 0 0;">顶部还能按「文件名/关键词」搜索，或按颜色筛选。右侧「原文」面板可查看文件真实内容、按标题跳转；「相关文件」条目可点，直接跳过去并定位到对应小节。先从红色开始看，绿色的基本可以跳过。</p>

function applyFilter() {
  document.querySelectorAll(".file-item").forEach(el => {
    const matchLevel = activeFilter === "all" || el.dataset.level === activeFilter;
    const q = document.getElementById("search").value.trim().toLowerCase();
    const f = fileById(el.dataset.path);
    const matchSearch = !q ||
      f.path.toLowerCase().includes(q) ||
      f.tldr.toLowerCase().includes(q) ||
      f.what.toLowerCase().includes(q) ||
      f.contents.join(" ").toLowerCase().includes(q);
    el.style.display = (matchLevel && matchSearch) ? "" : "none";
  });
  document.querySelectorAll(".cat").forEach(cat => {
    const visible = [...cat.querySelectorAll(".file-item")].some(el => el.style.display !== "none");
    cat.style.display = visible ? "" : "none";
  });
}

// wire up
document.getElementById("search").addEventListener("input", applyFilter);
document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.level;
  applyFilter();
});
sourceClose.addEventListener("click", closeSource);
srcCopy.addEventListener("click", async () => {
  const e = SOURCES[activeId];
  if (!e || e.missing || e.dir) return;
  try {
    await navigator.clipboard.writeText(e.text);
    srcCopy.textContent = "✓ 已复制";
    setTimeout(() => { srcCopy.textContent = "⧉ 复制"; }, 1400);
  } catch { srcCopy.textContent = "复制失败"; }
});
srcDownload.addEventListener("click", () => {
  const e = SOURCES[activeId];
  if (!e || e.missing || e.dir) return;
  const blob = new Blob([e.text], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = activeId.split("/").pop();
  a.click();
  URL.revokeObjectURL(a.href);
});
srcLines.addEventListener("click", () => {
  const on = sourceEl.classList.toggle("show-ln");
  srcLines.classList.toggle("active", on);
  srcLines.setAttribute("aria-pressed", String(on));
});
sourceBackdrop.addEventListener("click", closeSource);
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sourceEl.classList.contains("open")) closeSource();
});

buildSidebar();
renderWelcome();
renderSourcePlaceholder();
</script>
