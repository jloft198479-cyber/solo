<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>solo 项目导游 · 小白友好文件地图</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e6e8ec;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #4f6ef7;
    --accent-soft: #eef1fe;
    --green: #18a957;
    --yellow: #d98300;
    --red: #e0413a;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.05);
    --ease: cubic-bezier(.2,.8,.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei UI", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; flex-direction: column; height: 100vh; position: relative; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .2px; }
  .brand .sub { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }
  .search {
    position: relative; display: flex; align-items: center;
  }
  .search input {
    width: 240px; padding: 8px 12px 8px 32px;
    border: 1px solid var(--border); border-radius: 9px;
    background: var(--bg); color: var(--text); font-size: 13px;
    outline: none; transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 10px; color: var(--muted); }
  .filters { display: flex; gap: 6px; }
  .filters button {
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); font-size: 12px; padding: 7px 11px;
    border-radius: 9px; cursor: pointer; transition: all .15s var(--ease);
  }
  .filters button:hover { border-color: var(--accent); color: var(--accent); }
  .filters button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Body: 三栏 */
  .body { display: flex; flex: 1 1 auto; min-height: 0; }

  /* Sidebar (左：导航) */
  .sidebar {
    width: 300px; flex: 0 0 300px;
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 10px 8px 40px;
  }
  .cat { margin: 4px 0; }
  .cat-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    user-select: none; transition: background .15s var(--ease);
  }
  .cat-head:hover { background: var(--bg); }
  .cat-head .arrow { transition: transform .25s var(--ease); color: var(--muted); font-size: 11px; }
  .cat.collapsed .arrow { transform: rotate(-90deg); }
  .cat-head .cat-name { font-weight: 600; font-size: 13.5px; }
  .cat-head .cat-count {
    margin-left: auto; font-size: 11px; color: var(--muted);
    background: var(--bg); padding: 1px 8px; border-radius: 20px;
  }
  .cat-items {
    display: grid; grid-template-rows: 1fr;
    transition: grid-template-rows .28s var(--ease);
  }
  .cat.collapsed .cat-items { grid-template-rows: 0fr; }
  .cat-items > .inner { overflow: hidden; }

  .file-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px 7px 26px; margin: 1px 4px;
    border-radius: 8px; cursor: pointer;
    transition: background .14s var(--ease), transform .14s var(--ease);
  }
  .file-item:hover { background: var(--accent-soft); }
  .file-item.active { background: var(--accent); color: #fff; }
  .file-item.active .dot { box-shadow: 0 0 0 2px rgba(255,255,255,.5); }
  .file-item.active .fname { color: #fff; }
  .file-item.active .fpath { color: rgba(255,255,255,.75); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--red); }
  .fmeta { min-width: 0; }
  .fname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fpath { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Main (中：人话版) */
  .main { flex: 1 1 auto; min-width: 0; overflow-y: auto; padding: 30px 40px 60px; }
  .detail { max-width: 760px; margin: 0 auto; }
  .detail.enter { animation: fadeUp .32s var(--ease); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .d-head { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .d-title { font-size: 22px; font-weight: 700; margin: 0; line-height: 1.3; }
  .d-path {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 12.5px; color: var(--muted); background: var(--bg);
    padding: 3px 9px; border-radius: 7px; margin-top: 6px; display: inline-block;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 20px;
    flex: 0 0 auto; margin-top: 3px;
  }
  .badge.green { background: #e7f7ee; color: var(--green); }
  .badge.yellow { background: #fdf2e0; color: var(--yellow); }
  .badge.red { background: #fdeceb; color: var(--red); }

  .d-section { margin-top: 26px; }
  .d-section h3 {
    font-size: 13px; text-transform: none; color: var(--accent);
    margin: 0 0 10px; font-weight: 700; letter-spacing: .3px;
    display: flex; align-items: center; gap: 8px;
  }
  .d-section h3::before {
    content: ""; width: 4px; height: 15px; background: var(--accent); border-radius: 3px;
  }
  .d-tldr {
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    padding: 12px 16px; border-radius: 0 10px 10px 0; font-size: 14.5px; line-height: 1.6;
  }
  .d-what p { margin: 0 0 12px; line-height: 1.75; }
  .analogy {
    background: #fffaf0; border: 1px solid #f3e4c4; border-radius: 10px;
    padding: 12px 16px; font-size: 13.5px; color: #7a5a16;
  }
  .analogy b { color: #9a6b10; }
  .d-list { margin: 0; padding-left: 0; list-style: none; }
  .d-list li {
    position: relative; padding-left: 20px; margin-bottom: 8px; line-height: 1.7;
  }
  .d-list li::before {
    content: "•"; position: absolute; left: 4px; color: var(--accent); font-weight: 700;
  }
  .related { display: flex; flex-wrap: wrap; gap: 8px; }
  .related span {
    font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 7px;
  }
  .related .rel-chip {
    cursor: pointer; color: var(--accent); border-color: var(--accent-soft); background: var(--accent-soft);
    transition: background .14s var(--ease), color .14s var(--ease);
  }
  .related .rel-chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .related .rel-static { cursor: default; }
  .copy-path, .view-source {
    margin-top: 3px; flex: 0 0 auto; cursor: pointer;
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px;
    transition: all .14s var(--ease);
  }
  .copy-path:hover, .view-source:hover { color: var(--accent); border-color: var(--accent); }
  .copy-path.done { color: var(--green); border-color: var(--green); }

  /* Source (右：原文) */
  .source {
    width: 440px; flex: 0 0 440px;
    background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
  }
  .source.flash { outline: 2px solid var(--accent); outline-offset: -2px; }
  .source-head {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 13px 16px; border-bottom: 1px solid var(--border); flex: 0 0 auto;
  }
  .source-kicker { font-size: 11px; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; }
  .source-path { font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; font-weight: 600; word-break: break-all; }
  .source-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .gh-link {
    font-size: 12px; color: var(--accent); text-decoration: none;
    border: 1px solid var(--accent-soft); background: var(--accent-soft);
    padding: 4px 10px; border-radius: 8px; white-space: nowrap;
  }
  .gh-link:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .source-close {
    display: none; border: none; background: none; font-size: 22px; line-height: 1;
    color: var(--muted); cursor: pointer; padding: 0 2px;
  }
  .src-btn {
    font-size: 12px; color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px;
    cursor: pointer; white-space: nowrap; transition: all .14s var(--ease);
  }
  .src-btn:hover { color: var(--accent); border-color: var(--accent); }
  .src-btn:disabled { opacity: .4; cursor: not-allowed; }
  .src-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .source-toc {
    padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap;
    gap: 6px; flex: 0 0 auto; max-height: 116px; overflow-y: auto;
  }
  .source-toc:empty { display: none; }
  .toc-item {
    font-size: 11.5px; color: var(--muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer;
    transition: all .14s var(--ease);
  }
  .toc-item:hover { color: var(--accent); border-color: var(--accent); }
  .source-body { flex: 1 1 auto; overflow: auto; padding: 10px 0 40px; }
  .ln { display: flex; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 12px; line-height: 1.6; }
  .ln:hover { background: var(--bg); }
  .ln-no { flex: 0 0 auto; width: 46px; text-align: right; padding-right: 12px; color: #b9bfca; user-select: none; }
  .source:not(.show-ln) .ln-no { display: none; }
  .ln-tx { white-space: pre-wrap; word-break: break-all; padding-right: 14px; flex: 1 1 auto; color: var(--text); }
  .ln.hit { background: #fff7e0; }
  .source-empty { padding: 30px 18px; color: var(--muted); font-size: 13px; line-height: 1.7; }

  /* Welcome */
  .welcome { max-width: 760px; margin: 0 auto; }
  .welcome h2 { font-size: 24px; margin: 0 0 6px; }
  .welcome .lead { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .route-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px 26px; box-shadow: var(--shadow); margin-bottom: 18px;
  }
  .route-card h3 { margin: 0 0 14px; font-size: 15px; }
  .route-step { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .route-step:last-child { border-bottom: none; }
  .route-num {
    flex: 0 0 28px; height: 28px; border-radius: 50%; background: var(--accent);
    color: #fff; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .route-step .rs-title { font-weight: 600; }
  .route-step .rs-desc { color: var(--muted); font-size: 13px; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 6px; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); }

  .empty { text-align: center; color: var(--muted); margin-top: 80px; font-size: 14px; }

  .source-backdrop {
    position: fixed; inset: 0; background: rgba(16,24,40,.32);
    opacity: 0; pointer-events: none; transition: opacity .2s var(--ease); z-index: 40;
  }
  .source-backdrop.show { opacity: 1; pointer-events: auto; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
  /* 窄屏：右栏原文变抽屉 */
  @media (max-width: 1080px) {
    .source {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(460px, 92vw);
      transform: translateX(100%); transition: transform .26s var(--ease); z-index: 50;
      box-shadow: -8px 0 28px rgba(16,24,40,.18);
    }
    .source.open { transform: none; }
    .source-close { display: block; }
  }
  @media (max-width: 720px) {
    .sidebar { width: 100%; flex-basis: auto; }
    .body { flex-direction: column; }
    .main { padding: 24px 18px 50px; }
  }
</style>

// ===== SOURCES START (generated by scripts/gen-tour.mjs; do not edit by hand) =====
const SOURCES = {"README.md":{"text":"<p align=\"center\">\n  <img src=\"./public/icon.png\" width=\"160\" alt=\"solo Logo\" />\n</p>\n\n<h1 align=\"center\">solo</h1>\n\n<p align=\"center\">\n  <strong>Local-first, minimalist Markdown editor for immersive writing</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"./README.md\">English</a>\n  ·\n  <a href=\"./README.zh-CN.md\">简体中文</a>\n  ·\n  <a href=\"./README.ja-JP.md\">日本語</a>\n  ·\n  <a href=\"./README.ko-KR.md\">한국어</a>\n</p>\n\n## What is solo?\n\nsolo is a \"scalpel for words\" — launches instantly, stays out of your way, and works directly on local `.md` files. It is not a note-taking app, not a knowledge base, and not a platform.\n\n## Features\n\n- **WYSIWYG editing** — TipTap / ProseMirror under the hood. Type and see it rendered instantly.\n- **Multi-window** — Open multiple files in separate windows. Switch focus without losing content. Compare documents side-by-side.\n- **Extended syntax** — KaTeX math, Mermaid diagrams, GFM tables, footnotes, Frontmatter YAML, Callouts (12 colors), WikiLinks, highlighting, superscript/subscript.\n- **Elegant typography** — 3 hand-crafted themes (Paper White / Ink Black / Inkstone Cyan). Fonts downloaded on demand.\n- **Desktop-native** — Frameless window, system menu, right-click \"New .md\", double-click titlebar to maximize, always-on-top, auto-save.\n- **Memory-conscious** — WebView2 MemoryUsageTargetLevel on blur, lazy editor initialization, lightweight installer (uses system WebView2).\n- **Copy as HTML** — One-click rich HTML to clipboard, theme-following, what you see is what you get.\n- **Format fidelity** — Full Markdown round-trip tests + CommonMark spec stability checks (618 pass / 34 design constraints). Paste Markdown auto-converts. Ctrl+C writes Markdown source alongside HTML.\n\n## Tech Stack\n\nTauri 2 (Rust) → Vue 3 + Pinia + TipTap/ProseMirror + Tailwind CSS 4\n\n## Install\n\nDownload the latest installer from [Releases](https://github.com/jloft198479-cyber/solo/releases). Custom install path supported.\n\nAfter first launch, enable Windows file association in Settings for right-click \"New .md\".\n\n## Development\n\n```bash\nbun install\nbun run dev          # Frontend only\nbun run dev:tauri    # Full-stack with Tauri\nbun run build:tauri  # Build installer\nbun run test         # Run tests\n```\n\nRequires Rust 1.96+ and MSVC Build Tools.\n\n## Contact\n\n- WeChat: fzz198479\n\n## License\n\nsolo is open-sourced under [Apache License 2.0](LICENSE), forked from [MarkLight](https://github.com/xiaodou997/marklight).\n"},"README.zh-CN.md":{"text":"<p align=\"center\">\n  <img src=\"./public/icon.png\" width=\"160\" alt=\"solo Logo\" />\n</p>\n\n<h1 align=\"center\">solo</h1>\n\n<p align=\"center\">\n  <strong>本地优先、极简沉浸的 Markdown 编辑器</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"./README.md\">English</a>\n  ·\n  <a href=\"./README.zh-CN.md\">简体中文</a>\n  ·\n  <a href=\"./README.ja-JP.md\">日本語</a>\n  ·\n  <a href=\"./README.ko-KR.md\">한국어</a>\n</p>\n\n## 产品定位\n\nsolo 是一把「专为文字而生的手术刀」——秒开秒关、书卷气质、本地文件、不作生态。不是笔记软件，不是知识库。\n\n## 核心特性\n\n- **所见即所得** — 基于 TipTap / ProseMirror，输入即渲染，告别分栏预览。\n- **多窗口** — 同时打开多个文件，每窗口独立会话。切窗口内容不丢失，并排对照无压力。\n- **扩展语法** — KaTeX 数学公式、Mermaid 图表、GFM 表格、脚注、Frontmatter YAML、Callout（12 色）、WikiLink、高亮、上下标。\n- **文艺版面** — 3 套书卷气主题（纸白 / 墨黑 / 砚青），字体按需下载，精心调校行距与留白。\n- **桌面原生** — 无边框窗口、系统菜单、右键新建 .md、双击标题栏最大化、置顶、自动保存。\n- **内存克制** — 多窗口下 WebView2 MemoryUsageTargetLevel 自动降级，编辑器懒初始化，轻量安装包（基于系统 WebView2）。\n- **复制为 HTML** — 一键复制富文本 HTML 到剪贴板，完整主题跟随，所见即所得。\n- **格式保真** — 完整 Markdown round-trip 测试 + CommonMark spec 稳定性验证（618 通过 / 34 设计约束），粘贴 Markdown 自动转换，Ctrl+C 同时写入源码到剪贴板。\n\n## 技术架构\n\nTauri 2（Rust）→ Vue 3 + Pinia + TipTap/ProseMirror + Tailwind CSS 4\n\n* 前端业务层统一通过 `services/tauri/` 封装调用 Rust 命令\n* Rust 侧返回结构化 DTO + `AppError`\n* 通用能力优先使用 Tauri 官方插件\n\n## 安装\n\n从 [Releases](https://github.com/jloft198479-cyber/solo/releases) 下载最新安装包。支持自定义安装路径。\n\n首次启动后可在设置中开启 Windows 文件关联（右键新建 .md）。\n\n## 开发\n\n```bash\nbun install\nbun run dev          # 纯前端\nbun run dev:tauri    # 全栈开发\nbun run build:tauri  # 构建安装包\nbun run test         # 运行测试\n```\n\n需要 Rust 1.96+ 和 MSVC Build Tools。项目提供 `launch-dev.bat` 一键启动开发模式。\n\n## 联系方式\n\n- 微信：fzz198479\n\n## License\n\nsolo 基于 [Apache License 2.0](LICENSE) 开源，基于 [MarkLight](https://github.com/xiaodou997/marklight) 重构而来。\n"},"LICENSE":{"text":"\n                                 Apache License\n                           Version 2.0, January 2004\n                        http://www.apache.org/licenses/\n\n   TERMS AND CONDITIONS FOR USE, REPRODUCTION, AND DISTRIBUTION\n\n   1. Definitions.\n\n      \"License\" shall mean the terms and conditions for use, reproduction,\n      and distribution as defined by Sections 1 through 9 of this document.\n\n      \"Licensor\" shall mean the copyright owner or entity authorized by\n      the copyright owner that is granting the License.\n\n      \"Legal Entity\" shall mean the union of the acting entity and all\n      other entities that control, are controlled by, or are under common\n      control with that entity. For the purposes of this definition,\n      \"control\" means (i) the power, direct or indirect, to cause the\n      direction or management of such entity, whether by contract or\n      otherwise, or (ii) ownership of fifty percent (50%) or more of the\n      outstanding shares, or (iii) beneficial ownership of such entity.\n\n      \"You\" (or \"Your\") shall mean an individual or Legal Entity\n      exercising permissions granted by this License.\n\n      \"Source\" form shall mean the preferred form for making modifications,\n      including but not limited to software source code, documentation\n      source, and configuration files.\n\n      \"Object\" form shall mean any form resulting from mechanical\n      transformation or translation of a Source form, including but\n      not limited to compiled object code, generated documentation,\n      and conversions to other media types :"# HANDOVER.md — solo 项目接手指南\n\n> 受众：**下一个接手者**——可能是人类开发者，也可能是 AI agent。\n> 目标：30 分钟内建立准确心智模型，并知道去哪找代码、去哪找坑。\n\n## [警告] 黄金法则：以代码为准\n\n本文档及本项目所有文档（包括 `ARCHITECTURE.md`）都**只是代码的快照**。\n任何矛盾，以**实际代码行为**为准，并顺手更新文档。\n\n**特别警告**：仓库内 `.trae/documents/` 下的旧文档描述了「文件树 / workspace watcher / fs.rs / watch.rs / config.rs」等**已被移除**的结构，**一律忽略**，以 `ARCHITECTURE.md` + 代码为准。\n\n## 30 秒定位\n\nsolo = 本地优先的桌面 Markdown 编辑器（Tauri 2 + Rust 原生核心 + Vue 3 + TipTap/ProseMirror）。\n不是笔记软件、不是知识库、不是平台。面向中文沉浸式写作。\n\n- 当前版本：**以 [package.json](./package.json) 为准**（单一真理源，不硬编码，避免漂移）\n- 许可证：Apache-2.0\n- 仓库：`https://github.com/jloft198479-cyber/solo`\n\n## 阅读顺序（按这个走，别跳）\n\n1. [README.md](./README.md) —— 产品是什么、能干嘛、怎么装\n2. [AGENTS.md](./AGENTS.md) —— 工作纪律 + 快速入门（AI/开发者必读）\n3. [ARCHITECTURE.md](./ARCHITECTURE.md) —— **权威架构地图**（命令清单、目录、关键约束、附录 B「常见任务从哪入手」、附录 C「文档-代码差异」）\n4. 按需：[BUILD_GUIDE.md](./BUILD_GUIDE.md)（编译）、[TROUBLESHOOTING.md](./TROUBLESHOOTING.md)（用户侧问题）、[docs/](./docs/)（专题）\n5. 接手专用（本批新增）：[docs/KNOWN-ISSUES.md](./docs/KNOWN-ISSUES.md)、[docs/debugging.md](./docs/debugging.md)、[docs/INDEX.md](./docs/INDEX.md)\n\n## 环境搭建（本机真实路径）\n\n> 环境陷阱：本机 Rust 在 `M:\\rust`，MSVC 在 `M:\\VS\\BuildTools`，**不要因为 PATH 没加载就重装**。\n\n**工具链版本、安装、环境变量（CARGO_HOME / RUSTUP_HOME / PATH）配置**统一见 [BUILD_GUIDE.md §1–§3](./BUILD_GUIDE.md)（唯一真理源）。本机 Rust / MSVC 不在默认 PATH，编译前必须按它加载环境。\n\n**`cargo check` 必须先把 MSVC 工具链放进环境**（PowerShell，本机唯一验证可用的精确命令；env 变量细节见 [BUILD_GUIDE.md §3](./BUILD_GUIDE.md)）：\n\n```powershell\n$env:CARGO_HOME = 'M:\\rust\\.cargo'\n$env:PATH = \"M:\\VS\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostx64\\x64;$env:PATH\"\n$env:INCLUDE = \"M:\\VS\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\include;M:\\VS\\BuildTools\\Windows Kits\\10\\Include\\10.0.26100.0\\ucrt;M:\\VS\\BuildTools\\Windows Kits\\10\\Include\\10.0.26100.0\\shared;M:\\VS\\BuildTools\\Windows Kits\\10\\Include\\10.0.26100.0\\um\"\n$env:LIB = \"M:\\VS\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\lib\\x64;M:\\VS\\BuildTools\\Windows Kits\\10\\Lib\\10.0.26100.0\\ucrt\\x64;M:\\VS\\BuildTools\\Windows Kits\\10\\Lib\\10.0.26100.0\\um\\x64\"\ncargo check --manifest-path src-tauri/Cargo.toml\n```\n\n## 常用命令（复制即用）\n\n```bash\nbun install                      # 装依赖\nbun run dev                      # 纯前端 dev\nbun run dev:tauri                # 全栈（含 Rust）\nbun run dev:tauri:inspect        # 全栈 + 打开 DevTools（SOLO_OPEN_DEVTOOLS=1）\nbun run test                     # Vitest 全量（当前 27 文件 / 974 测试，以实际输出为准）\nbun run build:tauri              # 打安装包\n```\n\n> [警告] **测试陷阱（本机 bun/Windows 实测）**：`bun run test` 子集过滤会 segfault，且 `bun run build` 在本机 bun 下也 segfault。完整现象与 node 兜底命令见 [CONTRIBUTING.md §1.1](./CONTRIBUTING.md)。\n\n## 真理源文件（改任何东西前先读这些）\n\n| 你想改的 | 唯一真相文件 |\n|---|---|\n| Tauri 命令**名字** | [src/services/tauri/command-names.ts](./src/services/tauri/command-names.ts)（`TAURI_COMMANDS`） |\n| 命令**定义/快捷键/菜单** | [src/commands/registry.ts](./src/commands/registry.ts) |\n| 字体**清单** | [src/constants/fonts.ts](./src/constants/fonts.ts) |\n| 字体**栈** | [src/utils/fontStack.ts](./src/utils/fontStack.ts) |\n| 主题**色彩映射** | [src/themes/types.ts](./src/themes/types.ts)（`CSS_VAR_MAP`） |\n| Rust **命令总数/注册** | [src-tauri/src/lib.rs](./src-tauri/src/lib.rs) 的 `generate_handler!`（当前 **21** 个） |\n| Markdown **保真安全网** | [src/components/Editor/tiptap/markdown/__tests__/roundtrip.spec.ts](./src/components/Editor/tiptap/markdown/__tests__/roundtrip.spec.ts) + [commonmark.spec.ts](./src/components/Editor/tiptap/markdown/__tests__/commonmark.spec.ts) |\n| **脏态**机制 | [src/stores/file.ts](./src/stores/file.ts)（`setContent` vs `markUserEdit`） |\n| 保存**冲突检测** | [src-tauri/src/commands/document.rs](./src-tauri/src/commands/document.rs)（`save_document`，mtime 校验） |\n| 启动开打**竞态** | [src-tauri/src/state.rs](./src-tauri/src/state.rs) + [src-tauri/src/lib.rs](./src-tauri/src/lib.rs) |\n| 图片**资产安全** | [src-tauri/src/commands/document.rs](./src-tauri/src/commands/document.rs)（`validate_image_asset_path`） |\n\n## 给 AI agent 的特别提示\n\n1. **先读 [ARCHITECTURE.md](./ARCHITECTURE.md)**，它比任何对话摘要都准。\n2. **不要信任 `.trae/documents/`**；遇到「文件树/workspace watcher」等描述，那是旧架构。\n3. 找「改 X 去哪个文件」→ 直接查 [ARCHITECTURE.md](./ARCHITECTURE.md) 附录 B 或 §11 敏感区速查表。\n4. 验证改动：**必须跑完整 `bun run test`**，不要信「我试了子集应该没问题」。\n5. 改 parser/serializer 后，roundtrip + commonmark 测试必须通过（见上方真理源）。\n6. 遇到环境/构建问题 → [docs/debugging.md](./docs/debugging.md)。\n\n## See also（交接网络）\n\n- [项目工作手册](./AGENTS.md)\n- [架构权威地图](./ARCHITECTURE.md)\n- [bug 易发区地图（ARCHITECTURE §11）](./ARCHITECTURE.md)\n- [已知问题与技术债](./docs/KNOWN-ISSUES.md)\n- [调试指南](./docs/debugging.md)\n- [文档索引与术语表](./docs/INDEX.md)\n- [协作规范](./CONTRIBUTING.md)\n"},"AGENTS.md":{"text":"# solo 项目工作手册\n\n> 给 AI 和开发者的快速入门 + 纪律约束 + 文档地图。\n\n---\n\n## 项目一句话\n\nsolo 是一个 **Tauri v2 桌面端 Markdown 编辑器**（Vue 3 + TipTap + Rust），纯本地、无后端、单文件编辑。\n\n## 工作纪律（不可违反）\n\n### 改代码前\n- 先读实际代码行为，不以注释为准\n- 确认影响范围：改了这个文件，还有哪些文件受影响？逐个检查\n\n### 改 parser/serializer 后\n1. `bun run test` — 所有 roundtrip 测试必须通过\n2. `vue-tsc --noEmit` — 类型检查通过\n3. `bun run build` — 前端构建通过\n\n### 发版前（🛑 常见踩坑区）\n1. **先升版本号**（3 个文件：[package.json](./package.json) / [Cargo.toml](./src-tauri/Cargo.toml) / [tauri.conf.json](./src-tauri/tauri.conf.json)）\n2. **检查 `replaceAll`**：TS target ES2020，用 `.split().join()` 替代\n3. 确认 tag 名与版本号一致（`v1.x.x`）\n4. 完整流程见 [RELEASE_PROCESS.md](./RELEASE_PROCESS.md)\n\n### 提交前\n- 不要提交 secrets / key\n- 不要提交 `node_modules` / `target`\n- 先看 `git status` 再 commit\n\n### 环境 / 依赖纪律（铁律）\n- **绝不擅自下载、安装软件**：任何软件 / 依赖安装前先查本机是否已有（Rust 在 `M:\\rust`、MSVC 在 `M:\\VS` 等，复用不重装）；需安装须先获明确同意，且尽量装到非系统盘（如 `M:` 盘）。\n- **信息更新要及时**：最新信息通过 wiki / 互链保持同步，陈旧无用信息及时清理；改动及时留记录、及时 `git` 提交。\n\n## 文档管理规范（SSOT + DRY + L2 减文件）\n\n> 目标：每件事只在一处写真版，别处只引用不复制，根除信息冗余、版本不一致与 AI 读取无效上下文。\n\n### 一、单一真实源（SSOT）\n- 每个事实只在一处写（真理源），别处只放「一句指向它的话 + 链接」，不抄内容。\n- 已知真理源地图：技术栈/版本 → `ARCHITECTURE.md`；发版流程 → `RELEASE_PROCESS.md`；bug 易发区 → `ARCHITECTURE.md §11`；问题排查 → `docs/debugging.md` + `docs/KNOWN-ISSUES.md`；文档索引 → `docs/INDEX.md`；版本历史 → `CHANGELOG.md`；代码真相 → 以代码为准（不以注释/文档/记忆）。\n- 代码层面的 SSOT 细则（命令名/定义/字体/主题等真理源）见 `ARCHITECTURE.md` §11.6。\n\n### 二、不要重复自己（DRY）\n- 信息拆成原子可复用内容，全局统一引用而非复制。\n- 纯指针/索引类文件（无独家内容）应并入真理源后删除，不留空壳。\n- 多语言 README（zh-CN/ja-JP/ko-KR）是必要本地化，不算冗余，保留。\n\n### 三、L2 减文件纪律（实操）\n1. 合并/删文件前，先确认独有价值内容已存在于真理源。\n2. 先把所有引用它的链接改指真理源。\n3. 再删文件。\n4. 删后用「含隐藏目录的递归 grep」跑死链扫描，确认零孤儿引用。\n- **两层受众区分**：人类文档（README / CONTRIBUTING / SECURITY / 多语言 README）保持可读、不碎片化；agent 文档（ARCHITECTURE / AGENTS / HANDOVER / docs/*）可激进原子化以省 AI 上下文。\n- **禁止为做「原子 include」引入构建工具/新脚本**（守「不擅自装软件」纪律）；Markdown 的 DRY 用链接引用实现，不引 preprocessor。\n\n### 四、死链即 Bug\n- 任何指向已删/已改名文件的链接都是 Bug，发现即修。\n- 文档若与代码不符，以代码为准并更新文档（见 AGENTS 黄金法则 / CONTRIBUTING）。\n\n---\n\n## 文档地图\n\n| 读者 | 先读这个 | 再看这个 |\n|------|----------|----------|\n| **新接手** | [HANDOVER.md](./HANDOVER.md) | [AGENTS.md](./AGENTS.md) → [ARCHITECTURE.md](./ARCHITECTURE.md) |\n| **找 bug / 定位问题** | [ARCHITECTURE.md §11](./ARCHITECTURE.md)（敏感区速查表） | [docs/KNOWN-ISSUES.md](./docs/KNOWN-ISSUES.md) → [docs/debugging.md](./docs/debugging.md) |\n| **查技术决策** | [.opencode/PROFILE.md](./.opencode/PROFILE.md) | [ARCHITECTURE.md](./ARCHITECTURE.md) |\n| **改 CJK 边界** | [docs/cjk-boundary.md](./docs/cjk-boundary.md) | [src/components/Editor/tiptap/markdown/parser.ts](./src/components/Editor/tiptap/markdown/parser.ts) / [src/components/Editor/tiptap/markdown/serializer.ts](./src/components/Editor/tiptap/markdown/serializer.ts) |\n| **发新版本** | [docs/PLAYBOOK.md](./docs/PLAYBOOK.md) | [RELEASE_PROCESS.md](./RELEASE_PROCESS.md) → [.github/workflows/release.yml](./.github/workflows/release.yml) |\n| **编译不通过** | [BUILD_GUIDE.md](./BUILD_GUIDE.md) §7 故障排查 | [TROUBLESHOOTING.md](./TROUBLESHOOTING.md) |\n| **想贡献代码** | [CONTRIBUTING.md](./CONTRIBUTING.md) | [SECURITY.md](./SECURITY.md) / [.github/](./.github/) 模板 |\n\n### 快速链接\n\n> 完整文档索引与术语表见 [docs/INDEX.md](./docs/INDEX.md)（唯一索引真理源，本文不再复述链接表）。\n\n## 关键约束速查\n\n- **TS target**: ES2020（禁止 `replaceAll`）\n- **构建**: `bun run build`（vue-tsc + vite）→ `bunx tauri build`\n- **测试**: `bun run test`（Vitest + happy-dom），测试数随用例增减，以实际输出为准\n- **Rust**: 1.96.0，edition 2021，`CARGO_HOME=M:\\rust\\.cargo`\n- **MSVC**: Build Tools v14.44，路径 `M:\\VS\\BuildTools`\n- **Bun**: 1.3.14（工具链版本 / 环境变量 / 编译命令以 [BUILD_GUIDE.md](./BUILD_GUIDE.md) 为唯一真理源，本文仅摘要点）\n\n## 积压待办\n\n（暂无积压。阶段 1（图片 IPC 合并）与阶段 2（拖拽 bug 修复）已于 2026-07-19 完成，详见 `.archive/solo-v2-design/solo-v1-upgrade-roadmap.md`。）\n\n## 历史经验沉淀\n\n- **mermaid 全黑问题**（2026-07-19）：`securityLevel: 'strict'` 导致 DOMPurify 删主题 `<style>`，改为 `'loose'`。本地优先单文件编辑器，loose 安全风险可忽略。\n- **拖拽单例互斥覆盖 bug**（2026-07-19）：[src/services/tauri/events.ts](./src/services/tauri/events.ts) 的 `activeDragDropHandler` 是单值变量，后注册覆盖前者。改为 `Set<DragDropHandler>` 广播分发。\n- **图片 IPC 合并**（2026-07-19）：新增 `resolve_image_display` 命令，把“路径判别 + authorize”合并为单命令，[src/components/Editor/MarkdownEditor.vue](./src/components/Editor/MarkdownEditor.vue) 调用点从 5 行 if/else 简化为 1 行。\n- **代码审查修复**（2026-07-20）：4 处问题修复，全部源自对 `7b8687d` 提交的审查。\n  1. `main.rs` 启动清理 EBWebView 目录改回只删 >24h 残留——原实现无条件删全部，双开 solo 时新进程会删掉老进程活动目录导致崩溃。**教训**：清理「按进程隔离」的资源时，必须考虑多进程并存场景，staleness 守卫比「全删」更安全。\n  2. `resolve_image_display` 恢复 `assets/` 守卫——合并时丢了「src 以 assets/ 开头走文档目录」的判断，导致设了 `imageStoragePath` 后 `![x](assets/y.png)` 解析错位。**教训**：合并重构时，原有守卫规则必须列出对照清单，逐条确认新逻辑覆盖；判别规则集中在 Rust 侧（真理源），前端不重复实现。\n  3. `resolve_image_display` 补 containment 校验——相对路径必须落在基目录之内，防 `../../secret.png` 越权。**教训**：本地优先不等于无边界，路径授权接口都该断言 `starts_with(允许基目录)`；绝对路径放行是本地编辑器的合法用例（用户引用 D:/photos 这类外部图片）。\n  4. `events.ts` 广播加 try/catch + Set 迭代复制——单个 handler 抛错会断后续广播。**教训**：广播/分发模式必加 per-handler try/catch，迭代时复制快照防「handler 在回调里动订阅集合」的边缘情况。\n- **Slash 命令中文场景失效**（2026-07-20）：用户报告「`/` 命令发挥不出作用」，核实属实。根因是 TipTap Suggestion 的 `allowedPrefixes` 默认值 `[' ']`，只允许 `/` 出现在空格或行首之后——中文没有词间空格习惯，用户在「你好」或「hello」后敲 `/` 完全无反应。修复：`SlashCommands.configure` 显式传 `allowedPrefixes: null`。**教训**：接入第三方库时，对默认值要做「中文场景适用性」评估——很多库的默认假设（如「词间空格」「ASCII 标点」）对中文不成立。回归测试直接测库导出的 `findSuggestionMatch` 函数，避免起完整 editor 的复杂 mock。\n- **Mermaid / 数学公式块无法删除**（2026-07-20）：用户反馈「创建了 mermaid 块但不知道怎么删除」。根因是两个块都用 `isolating: true` + `contentDOM: undefined`（为支持「点击进入 textarea 编辑」交互），副作用是标准 Backspace 在块外不删块、块内 textarea 又是原生 DOM——整个块没有删除入口。修复：textarea 内加 `Mod+Backspace` 快捷键删除整块，placeholder 同步提示。**教训**：选 `isolating: true` 这种「光标隔离」设计时，必须同步提供「显式删除入口」——快捷键、按钮或菜单任选其一，否则用户会陷入「能创建能创建不能删除」的死胡同。对比 code-block 用非 isolating + contentDOM=`<code>`，光标能进出、空行 Backspace 自然删块，没有这个问题。\n- **体感丝滑优化（基于 workbuddy 方案审核后执行）**（2026-07-20）：\n  1. **统一动效 token**（`main.css`）：把分散的 `0.15s ease` / `0.2s ease` / `0.25s ease` 收敛为 `--motion-fast: 120ms` / `--motion-base: 200ms` + `--ease-out: cubic-bezier(.2,.8,.2,1)`。**教训**：丝滑的核心不是「动效多」而是「一致」——Linear / Raycast 用同一时长、同一曲线贯穿全局，比「这儿弹那儿滑」的不一致感更跟手。统一 token 后再加任何交互都顺其自然用 token，不会出现新的偏差。\n  2. **乐观保存**（`useDocumentSession.ts`）：原实现等 IPC 返回才清脏标，状态栏有可感知滞后。改为进 `saveCurrentDocument` 主分支后立即 `markSaved()`，IPC 飞行期间用户继续编辑则 `hasUserEdit=true`，成功后保留脏标仅更新 mtime；失败/conflict取消都回滚。**教训**：业界共识（Notion / Linear / Google Docs）「体感来自开始而非结束」——本地原子写几乎不败，乐观 UI 比真快更影响体感。但要补全所有失败回滚路径，包括 conflict 弹框取消这个中间态。\n  3. **搜索/跳转命中脉冲**（`useEditorSearch.ts` 的 `pulseJumpTarget`）：跳转后给目标加 300ms 背景淡入淡出动画。**教训**：跳转后明确的视觉反馈比静默滚动更让用户「知道到这儿了」——这是 UX 研究硬结论。同一元素连续跳转要强制重排（`void el.offsetWidth`）让动画能再次触发，否则浏览器会跳过重复 animation。\n  4. **主题/字体切换内容 crossfade**（`themes/manager.ts` 的 `triggerContentCrossfade`）：CSS 变量重绘会让内容「闪一下」，给 `.mk-editor` 加 200ms opacity 0.6→1 淡入抹平闪烁。**教训**：crossfade 不完全 opacity=0→1，从 0.6 起避免用户失去位置感（Notion / Linear 的做法）。helper 放在真理源模块（manager.ts）export，避免跨模块依赖反向。\n  5. **FontFace `display:'swap'`**（`fontLoader.ts`）：JS API `new FontFace(family, url)` 加第三参数 `{display:'swap'}`。**教训**：FontFace JS API 不吃 CSS `@font-face` 的 `font-display` 属性——必须通过构造函数第三参数控制。显式声明意图比依赖默认行为更清晰。\n  6. **`prefers-reduced-motion`**（`main.css`）：全局把动画时长降到 0.01ms。**教训**：动效优化时必须同步加无障碍底线，不能只考虑视觉而忽略用户的「减少动效」系统偏好（WCAG 标准）。\n- **首次启动弹窗 bug 修复不完整（v1.2.26 → Unreleased）**：v1.2.26 曾修过\"启动时目标文件不存在弹错误框\"，在 `handleOpenPayload` 加了 os error 2 静默跳过逻辑，但 `loadDocumentFromPath` 的内层 catch 先 `await message(...)` 弹窗并 `return false`，错误被吃掉传不到外层 try/catch，静默逻辑形同虚设。修复：给 `loadDocumentFromPath` / `openDocumentWithPrompt` / `handleOpenFile` 加 `silent` 参数，启动链路传 `true` 让错误透传给外层处理。**教训**：错误处理要分层——内层函数不知道调用场景（启动 vs 用户主动），不应该擅自决定是否弹窗；应该把错误抛给外层，由知道场景的调用方决定。修复 bug 时要追完整调用链，确认每一层的行为与预期一致，不能只改最外层。**复查阶段发现两个关键问题**：①`handleOpenPayload` 用 `String(err)` 转换错误对象，但 `invokeCommand` 抛的是 `TauriAppError` 对象 `{code, message}`，`String()` 得到 `\"[object Object]\"`，正则无法匹配 os error 2——**教训**：错误对象经过 `normalizeTauriError` 包装后是对象不是字符串，提取 message 必须用 `.message` 属性而非 `String()`；②非 os error 2 的错误 `throw err` 会中断 setup 函数，导致 `setupDragDrop()` 不执行、拖拽功能失效——**教训**：启动流程中的错误处理不能 throw 中断后续步骤，应该弹窗提示用户但不 throw，让 setup 继续执行。\n- **字体下载回归：注释与代码不符 + reqwest 缺 system-proxy**（Unreleased）：v1.2.28 的 `font.rs` 注释说\"无扩展名导致 Content-Type 推断失败\"，但查 v1.2.27 源码发现用 family（无扩展名）命名缓存文件**能正常加载**，反证了注释的错误。真正原因是 v1.2.28 改了缓存 key 命名规则导致旧缓存失效 + reqwest 配 `rustls-tls` 未开 `system-proxy` feature 不读系统代理。**教训**：写注释/CHANGELOG 时要核实历史代码行为，不能凭推测写\"原因\"；`reqwest` 配 `default-features = false` + `rustls-tls` 时，`system-proxy` feature 不在 rustls-tls 里自动开启，需要显式加——否则 rustls-tls 既不读系统证书也不读系统代理，网络受限环境必败。\n- **SSOT 违规：`read_clipboard_html` 未登记命令名**（v1.2.29）：v1.2.27 新增 `read_clipboard_html` 命令时，`clipboard.ts` 用硬编码字符串 `invoke('read_clipboard_html')` 而非通过 `command-names.ts` 真理源。**教训**：新增 Rust 命令时，必须同步更新 `command-names.ts`（命令名真理源）+ `client.ts` 的 `invokeCommand` 调用方式——不能只在 Rust 侧注册命令就完事，前端调用侧也要走统一入口。\n- **字体不生效根因：CSP `font-src` 漏 `asset:` 协议**（v1.2.30）：v1.2.13 把字体加载从 IndexedDB + `blob:` URL 改为 `convertFileSrc` + asset.localhost URL，同时给 `assetProtocol.scope` 加了 font-cache 目录，但**忘了同步更新 CSP 的 `font-src`**——`img-src` 一直有 `asset:`，`font-src` 从第一天起就漏了。结果：首次下载用 `blob:` URL（CSP 允许）能临时生效，但重启读缓存用 `convertFileSrc` 转成 asset.localhost URL 时被 CSP 拦截，字体永不生效。v1.2.29 修了 reqwest system-proxy / 旧缓存兼容 / silent 参数透传等周边问题，但都没碰到核心；v1.2.30 才真正修复根因。**教训**：架构切换（加载方式变更）时必须同步审查 CSP / assetProtocol scope / 命令名 SSOT 等**配置类真理源**——不能只改代码不改配置。CSP 的 `font-src` / `img-src` / `connect-src` 等协议白名单是「资源能加载的最后一道闸门」，代码改了加载方式，CSP 没改等于白改。审查这类问题时要从第一天起查 git log，不能只看近期改动——本 bug 从 v1.2.13 一直潜伏到 v1.2.30，跨越 17 个版本。\n- **SSOT 违规复发：`detect_proxy_for_update` 命令名硬编码**（v1.2.30）：`App.vue` 和 `AboutSettingsPanel.vue` 用 `invoke('detect_proxy_for_update')` 直接 invoke，违反「前端不直接 invoke」铁律。与 v1.2.27 的 `read_clipboard_html` 是**同类 bug 复发**。**教训**：新增 Rust 命令后必须立即 grep 全代码库 `invoke('` 字符串，确认没有遗漏的硬编码调用点；CI 可加一条 lint 规则禁止 `from '@tauri-apps/api/core'` 的 `invoke` 直接调用（白名单 `invokeCommand`）。\n- **打印时 focus-mode 会丢段落**（v1.2.30）：focus mode 开着时打印，未聚焦段落 `opacity: 0.22` 仍生效，打印结果几乎丢段落——这是数据丢失级别 bug。**教训**：`@media print` 必须显式覆盖所有运行时视觉状态类（focus-mode dimmed、selected、editing 等），不能假设打印时这些 class 不存在。打印样式是「最后一公里」，必须独立测试 focus mode 开 / 关两种场景下的打印输出。\n- **排版设计系统性审查**（v1.2.30）：对照 iA Writer / Obsidian / Typora 做全面排版审查，发现 line-height 过松（1.9）、letter-spacing 正值反潮流（0.02em）、标题字距反人类（h1 0.04em 应为负值）、容器偏宽（760px 超过 CJK 黄金行宽）、段落间距偏紧（0.75em）等问题。**教训**：排版参数不能凭感觉定，要对照行业天花板产品的实测数据——iA Writer 的 640px / 18px / line-height 1.5 是基于阅读光学研究的硬结论，不是审美随意值。CJK 场景下 line-height 可略松（1.6-1.7），但不应超过 1.8；letter-spacing 应为 0 或负值（字体设计师已做视觉间距调整，正值等于二次放宽）。设计审查要分维度：节奏（字号差值均匀递减）/ 对比（h5 不应小于正文）/ 惯例（marker 用 muted 色、blockquote italic、图片无 border）三个维度缺一不可。\n\n## 沟通风格\n\n- 说人话，言简意赅\n- 实事求是，不臆想不编造\n- 先想后做，共识前置\n- 完成自检再通报\n- 被批评后经验必须沉淀到文档\n"},"ARCHITECTURE.md":{"text":"# solo 架构文档\r\n\r\n> **目标**：让任何开发者（人或 AI）在 15 分钟内建立完整、准确的心智模型，并能定位到任意功能的改动入口。\r\n> **写作基准**：一切以**实际代码行为**为准，不依据注释或历史文档。版本对应 `package.json` v1.2.24。\r\n\r\n---\r\n\r\n## 0. 一分钟读懂\r\n\r\n**solo** 是一款**本地优先**的桌面 Markdown 编辑器，面向中文沉浸式写作，审美对标 Linear / Raycast / Notion。\r\n\r\n技术栈一句话：**Tauri 2（Rust 原生核心）+ Vue 3 + Pinia + TipTap/ProseMirror + Tailwind CSS 4**。\r\n\r\n### 产品哲学\r\n\r\n**核心定位**：纯粹的文字创作与阅读空间，非代码编写工具。\r\n\r\n**减法原则**：摒弃文件树、结构化目录、侧边栏等冗余设计。\"一个文件就是一个文件\"，像打开 `.txt` 一样纯粹。桌面右键即可创建 `.md` 文档，双击即开。\r\n\r\n**性能底线**：秒开、零卡顿。排斥 Electron 套壳臃肿，追求极小内存占用和安装包体积。Tauri 2 + Rust 原生渲染保障。\r\n\r\n**编辑体验**：所见即所得（WYSIWYG），Markdown 语法自动隐藏并即时呈现排版。拒绝左右分屏预览。编辑时界面元素最小化，焦点全在文字。\r\n\r\n**排版美学**：书卷气、文艺感，非代码编辑器冰冷风格。对字体（衬线体优先）、行距、段间距要求苛刻。\r\n\r\n**粘贴还原**：从网页粘贴时正确还原标题层级、加粗、链接、图片，复杂表格降级接受。\r\n\r\n三层结构：\r\n\r\n```\r\nRust 核心 (src-tauri/)   ──21 个命令 + 2 类事件──▶  文件/图片/窗口/字体/剪贴板/注册表\r\n        ▲ invoke / emit\r\nIPC 服务层 (src/services/tauri/)  ──契约封装，前端不直接碰 invoke\r\n        ▲\r\nVue 前端 (src/)   App.vue 协调层 ──委托──▶ 10 个 composables + 2 个 Pinia store + TipTap 编辑器\r\n```\r\n\r\n> ⚠️ 仓库内同时存在 `README.md` 及 `.trae/documents/` 下的早期文档，它们描述了**文件树、workspace watcher、`fs.rs`/`watch.rs`/`config.rs`** 等结构——**这些在当前代码中已不存在**。请一律以**本文档 + 实际代码**为准（差异清单见附录 C）。新入手的 AI 开发者先读 `AGENTS.md`（工作手册）+ `.opencode/PROFILE.md`（技术档案）。\r\n\r\n---\r\n\r\n## 1. 技术栈实测表\r\n\r\n| 层 | 技术 | 版本 | 备注 |\r\n|---|---|---|---|\r\n| 桌面框架 | Tauri | 2.x | 无边框窗口、自定义标题栏、CLI（多进程）、OS-open |\r\n| 原生核心 | Rust | — | thiserror + serde + reqwest + winreg(Windows) |\r\n| 前端框架 | Vue 3 | 3.5 | Composition API + `<script setup>` |\r\n| 语言 | TypeScript | ~6.0 | strict 模式 |\r\n| 状态管理 | Pinia | 3.x | 2 个 store：file / settings |\r\n| 构建 | Vite | 7.x | |\r\n| 样式 | Tailwind CSS 4 + CSS 变量 | 4.3 | 主题靠 CSS 变量驱动 |\r\n| 编辑器 | TipTap / ProseMirror | 3.26 | 实例复用，不随文件切换重建 |\r\n| Markdown | markdown-it + 自研 parser/serializer | 14.2 | 自研链路，非 prosemirror-markdown |\r\n| 数学/图表 | KaTeX / Mermaid | 0.17 / 11.x | KaTeX 懒加载，不进解析器热路径 |\r\n| 测试 | Vitest + happy-dom | 4.x | spec 文件数与测试数随用例增减，以 `bun run test` 输出为准 |\r\n| 包管理 | bun | 1.3.14 | |\r\n\r\n**命名说明**：\r\n- 项目正式名称 = **solo**\r\n- `tauri.conf.json` 的 `productName` = `solo`（安装包/窗口标题显示名）\r\n- `identifier` = `com.solomarkdown`（注册表/Bundle 唯一标识）\r\n\r\n---\r\n\r\n## 2. 三层架构总览\r\n\r\n```\r\n┌─────────────────────────────────────────────────────────────────┐\r\n│                       Vue 前端 (src/)                            │\r\n│                                                                  │\r\n│   main.ts ──createApp──▶ App.vue (协调层，~370 行，无业务逻辑)    │\r\n│                              │                                  │\r\n│              ┌───────────────┼───────────────┐                  │\r\n│              ▼               ▼               ▼                  │\r\n│         composables      Pinia stores     组件树                │\r\n│         (10 个，按       ┌─ file.ts       App ▸ Editor           │\r\n│          关注点拆分)     └─ settings.ts   ▸ Settings(15)         │\r\n│                                                ▸ Layout 等       │\r\n└──────────────────────┬──────────────────────────────────────────┘\r\n                       │ 只调服务层，绝不直接 invoke/listen/emit\r\n                       ▼\r\n┌─────────────────────────────────────────────────────────────────┐\r\n│                  IPC 服务层 (src/services/tauri/)                │\r\n│                                                                  │\r\n│   client.ts ── invokeCommand<T>() ── 唯一入口                    │\r\n│   command-names.ts ── TAURI_COMMANDS ── 命令名集中表              │\r\n│   document/window/dialog/clipboard/... ── 按领域封装              │\r\n│   normalizeTauriError() ── 把 Rust AppError 解析成 {code,message} │\r\n└──────────────────────┬──────────────────────────────────────────┘\r\n                       │ Tauri IPC 边界\r\n                       ▼\r\n┌─────────────────────────────────────────────────────────────────┐\r\n│                   Rust 核心 (src-tauri/src/)                     │\r\n│                                                                  │\r\n│   lib.rs ── run() ── 插件注册 / 启动开打 / 菜单 / 关闭拦截        │\r\n│   commands/ ── document/font/clipboard/window/desktop ── 21 个 #[command]  │\r\n│   models.rs ── DTO（camelCase 序列化）                            │\r\n│   error.rs ── AppError 枚举（5 变体 + 结构化序列化）              │\r\n│   events.rs ── 2 个事件常量                                      │\r\n│   menu.rs / state.rs ── 菜单构建 / 启动开打竞态处理              │\r\n└─────────────────────────────────────────────────────────────────┘\r\n```\r\n\r\n**三条铁律**（来自 `architecture.md`，代码已贯彻）：\r\n1. 前端业务逻辑**不直接**调 `invoke`/`listen`/`emit`，全部走 `services/tauri/`。\r\n2. Rust 命令返回**结构化 DTO** 和 `AppError`，不返回裸字符串。\r\n3. 通用桌面能力**优先用 Tauri 官方插件**（store / window-state / dialog / opener / cli / clipboard）。\r\n\r\n### 决策阶梯（写代码前必过）\r\n\r\n来自《产品开发总原则》。从第一级开始，**停在第一个成立的层级**：\r\n\r\n1. 这东西需要存在吗？（YAGNI，推测性需求 = 不做）\r\n2. 标准库 / 运行时能做吗？\r\n3. 平台原生功能能覆盖吗？（CSS 能做的别写 JS）\r\n4. 已安装的依赖能解决吗？\r\n5. 能一行搞定吗？\r\n6. 以上都不行 → 写最少能工作的代码\r\n\r\n> 阶梯是反射动作，不是研究课题。两级都成立 → 取更高级。\r\n\r\n### 绝不简化掉的清单（安全 / 鲁棒底线）\r\n\r\n刻意简化时不得省略：信任边界的输入校验（用户输入、外部数据）、防止数据丢失的错误处理、安全措施（路径遍历防护、XSS 防护）、用户明确要求保留的功能。简化用 `simp:` 注释标记：`simp: <已知上限>, <升级触发条件>`。\r\n\r\n### 产品哲学关键词\r\n\r\n**极简 · 极速 · 优雅 · 灵活 · 高效 · 可拓展**（详见 `docs/产品精神` 母本）。\r\n\r\n---\r\n\r\n## 3. 目录结构\r\n\r\n```\r\nmd-editor/\r\n├── src/                          # 前端\r\n│   ├── main.ts                   #   入口：createApp + Pinia + main.css（极简，仅此）\r\n│   ├── App.vue                   #   协调层：接线 composables + 视图模式切换\r\n│   │\r\n│   ├── stores/                   #   Pinia 状态（仅 2 个）\r\n│   │   ├── file.ts               #     文档状态：path/content/脏标记/displayName\r\n│   │   └── settings.ts           #     全局设置：主题/字体/快捷键/迁移/防抖持久化\r\n│   │\r\n│   ├── composables/              #   业务逻辑封装（10 个）\r\n│   │   ├── useDocumentSession.ts #     新建/打开/保存/自动保存（含互斥锁）\r\n│   │   ├── useCommandDispatcher.ts #   命令分发：菜单/快捷键/UI → 动作\r\n│   │   ├── useAppDomEvents.ts    #     全局键盘事件 → 命令\r\n│   │   ├── useAppEditorState.ts  #     编辑器状态桥接（stats/update）\r\n│   │   ├── useAppWindowSession.ts#     窗口会话：标题/关闭确认/全屏\r\n│   │   ├── useMenuEvents.ts      #     原生菜单事件 → dispatcher\r\n│   │   ├── useMenuShortcutsSync.ts#    快捷键变更 → 同步到原生菜单\r\n│   │   ├── useImagePreview.ts    #     图片预览视图模式状态机\r\n│   │   ├── useFloatingListMenu.ts#     SlashMenu/EmojiMenu 共享的浮动菜单\r\n│   │   └── useClickOutside.ts    #     点击外部检测（通用）\r\n│   │\r\n│   ├── commands/\r\n│   │   └── registry.ts           #   命令集中注册表（定义/查找/快捷键/冲突检测）\r\n│   ├── utils/shortcuts.ts        #   registry 的薄封装（re-export）\r\n│   │\r\n│   ├── components/\r\n│   │   ├── Editor/               #   编辑器核心\r\n│   │   │   ├── MarkdownEditor.vue#     TipTap 实例 + 防抖序列化 + 视图\r\n│   │   │   ├── ImagePreviewView.vue / ImageFullscreenOverlay.vue\r\n│   │   │   ├── views/            #     SlashMenu / EmojiMenu / BubbleMenu\r\n│   │   │   └── tiptap/           #     TipTap 扩展层\r\n│   │   │       ├── editor-extensions.ts  # 扩展注册表\r\n│   │   │       ├── editor-commands.ts    # 编辑器命令执行\r\n│   │   │       ├── editor-image-drop.ts  # 图片拖放\r\n│   │   │       ├── editor-metadata.ts    # 大纲/字数/光标提取\r\n│   │   │       ├── useEditorAppearance.ts# 字体/主题/代码高亮注入\r\n│   │   │       ├── useEditorSearch.ts    # 编辑器内搜索替换\r\n│   │   │       ├── editor.css            # 编辑区排版（消费 --mk-* 变量）\r\n│   │   │       ├── extensions/           # 14 个自定义扩展\r\n│   │   │       └── markdown/             # parser / serializer / plugins\r\n│   │   ├── Settings/             #   设置面板（15 个 .vue）\r\n│   │   ├── Layout/               #   CustomTitlebar / WindowResizeHandles / ErrorBoundary\r\n│   │   ├── icons/                #   CloseIcon / CheckIcon\r\n│   │   ├── FontPopover.vue / ThemePopover.vue\r\n│   │   └── StatusbarQuickActions.vue\r\n│   │\r\n│   ├── services/\r\n│   │   ├── tauri/                #   IPC 服务层\r\n│   │   │   ├── client.ts         #     invokeCommand<T> + normalizeTauriError\r\n│   │   │   ├── command-names.ts  #     TAURI_COMMANDS 常量表\r\n│   │   │   ├── event-names.ts    #     事件名常量\r\n│   │   │   ├── document.ts / window.ts / webview.ts / events.ts\r\n│   │   │   ├── dialog.ts / clipboard.ts / opener.ts / os.ts\r\n│   │   │   ├── store.ts          #     tauri-plugin-store 封装\r\n│   │   │   └── window-state.ts\r\n│   │   └── fontLoader.ts         #   内嵌字体按需加载（FontFace）\r\n│   │\r\n│   ├── themes/                   #   主题系统\r\n│   │   ├── types.ts              #   Theme / ThemeColors / ThemeTypography\r\n│   │   ├── manager.ts            #   applyTheme：注入颜色 + 排版变量\r\n│   │   └── presets/              #   7 套预设 JSON\r\n│   │\r\n│   ├── utils/\r\n│   │   ├── export/               #   导出管线（见 §10）\r\n│   │   │   ├── index.ts          #     统一出口\r\n│   │   │   ├── build-export-tree.ts #  ProseMirror → ExportDocument IR\r\n│   │   │   ├── model.ts          #     IR 类型定义\r\n│   │   │   ├── theme.ts          #     主题 → 导出色彩 tokens\r\n│   │   │   ├── renderers/html.ts #     HTML 渲染器\r\n│   │   │   ├── renderers/wechat.ts#    微信渲染器\r\n│   │   │   └── utils.ts\r\n│   │   ├── export-renderer.ts    #   导出管线对外门面（re-export）\r\n│   │   ├── wechat-themes.ts      #   微信 4 套文学风主题\r\n│   │   ├── wechat-renderer.ts    #   微信渲染入口（兼容旧路径）\r\n│   │   ├── fontStack.ts          #   buildFontStack：统一字体栈（编辑器+导出共享）\r\n│   │   └── platform.ts           #   isMac 检测\r\n│   │\r\n│   ├── constants/fonts.ts        #   FONT_OPTIONS：7 种字体清单\r\n│   └── assets/styles/main.css    #   全局样式 + CSS 变量默认值\r\n│\r\n├── src-tauri/\r\n│   ├── src/\r\n│   │   ├── main.rs               #   仅调用 lib::run()\r\n│   │   ├── lib.rs                #   run()：插件/启动/菜单/命令注册（见 §4）\r\n│   │   ├── state.rs              #   StartupOpenRequests / LoadedWindows\r\n│   │   ├── models.rs             #   所有 DTO\r\n│   │   ├── error.rs              #   AppError + 结构化序列化\r\n│   │   ├── events.rs             #   3 个事件常量 + emit 函数\r\n│   │   ├── menu.rs               #   原生菜单构建 + attach_menu_events\r\n│   │   └── commands/\r\n│   │       ├── mod.rs            #     命令汇总导出\r\n│   │       ├── document.rs       #     open/save/图片导入/路径/资产授权\r\n│   │       ├── image.rs          #     fetch_remote_image\r\n│   │       ├── font.rs           #     fetch_font_data / get_cached_font_path / save_font_cache\r\n│   │       ├── clipboard.rs      #     read_clipboard_html（绕开 webview 读系统剪贴板 HTML）\r\n│   │       ├── window.rs         #     print/reveal/背景色/关闭拦截\r\n│   │       └── desktop.rs        #     register/unregister_shell_new（Windows）\r\n│   ├── capabilities/             #   权限配置\r\n│   │   ├── main-window.json      #     主窗口权限白名单\r\n│   │   └── secondary-window.json #     多窗口（main-* label）权限\r\n│   ├── tauri.conf.json           #   Tauri 配置（productName=solo）\r\n│   └── Cargo.toml\r\n│\r\n├── docs/                         # 项目文档（CJK/网络代理/重构报告等）\r\n├── AGENTS.md                      # 工作手册（AI 快速入门 + 纪律约束）\r\n├── ARCHITECTURE.md                # ← 本文档（代码真相，权威）\r\n├── RELEASE_PROCESS.md             # 正式发布流程\r\n├── BUILD_GUIDE.md                 # 编译手册\r\n├── TROUBLESHOOTING.md             # 故障排查\r\n```\r\n\r\n---\r\n\r\n## 4. Rust 核心层\r\n\r\n### 4.1 入口 `lib.rs::run()`\r\n\r\n按顺序做四件事：\r\n\r\n1. **注册插件**：opener、dialog、clipboard-manager、cli、store、window-state（持久化 SIZE/POSITION/MAXIMIZED）。\r\n2. **`setup()`**：管理 state → 回收早期开打请求 → 解析 CLI/raw args → 建菜单 → 挂关闭拦截 →（macOS）设置窗口背景。\r\n3. **`invoke_handler`**：注册 **21 个命令**（以 `lib.rs` 实际 `generate_handler!` 为准）。\r\n4. **`run()` 回调**：macOS/iOS 的 `Opened { urls }` 事件转成开打请求。\r\n\r\n### 4.2 命令清单（实际 21 个）\r\n\r\n> 以 `src-tauri/src/lib.rs` 的 `generate_handler!` 宏为唯一真相源。新增/改名必须同步更新此表。\r\n\r\n| 命令 | 文件 | 职责 |\r\n|---|---|---|\r\n| `open_document` | document.rs | 读文件内容 + 返回 mtime |\r\n| `save_document` | document.rs | **原子写** + mtime 冲突检测（见 §11.2） |\r\n| `rename_file` | document.rs | 重命名文件（去后缀、防冲突、大小写敏感） |\r\n| `import_document_image` | document.rs | 图片复制到 `assets/`，同名自动加后缀 |\r\n| `save_clipboard_image` | document.rs | 解析 data URL → base64 解码 → 写入 assets |\r\n| `read_clipboard_html` | clipboard.rs | 从系统剪贴板读 HTML 富文本（绕开 webview `clipboardData` 空值问题，外部应用/跨源粘贴保格式） |\r\n| `authorize_image_asset` | document.rs | 把图片加入 asset 协议作用域（**带安全校验**） |\r\n| `resolve_image_display` | document.rs | 路径判别（storage/相对/绝对）+ authorize 一步到位（v1.2.23 新增） |\r\n| `fetch_remote_image` | image.rs | 下载远程图片（≤10MB）→ base64 data URL |\r\n| `fetch_font_data` | font.rs | 远程字体下载（返回 base64） |\r\n| `get_cached_font_path` | font.rs | 字体缓存路径查询 |\r\n| `save_font_cache` | font.rs | 字体缓存写入磁盘 |\r\n| `set_window_background_color` | window.rs | macOS 窗口背景（NSColor） |\r\n| `register_shell_new` | desktop.rs | Windows 右键\"新建 Markdown\"注册表 |\r\n| `unregister_shell_new` | desktop.rs | Windows 右键\"新建 Markdown\"注销 |\r\n| `refresh_native_menu_shortcuts` | lib.rs | 自定义快捷键 → 同步原生菜单（仅 set_accelerator，不重建） |\r\n| `startup_ready` | lib.rs | 前端 ready 信号，触发窗口显示 + 启动开打请求回放（原 `consume_startup_open_request`） |\r\n| `new_editor_window` | lib.rs | 创建新编辑器窗口（原子递增 label） |\r\n| `reveal_startup_open_log` | lib.rs | 返回 startup-open.log 路径（调试启动开打竞态） |\r\n| `exit_app` | lib.rs | 退出整个应用（多窗口场景） |\r\n| `detect_proxy_for_update` | proxy.rs | 检测系统代理（给自动更新用） |\r\n\r\n> **共 21 个命令**。\r\n\r\n### 4.3 事件（2 个）\r\n\r\n| 事件名 | 方向 | 载荷 |\r\n|---|---|---|\r\n| `menu-event` | Rust→前端 | 菜单项 id 字符串 |\r\n| `window-close-requested` | Rust→前端 | `()`（关闭被拦截，交前端确认） |\r\n\r\n### 4.4 错误模型 `AppError`\r\n\r\n5 个变体（`Validation`/`Conflict`/`Io`/`Network`/`Native`），每个有稳定 `code`（如 `document_conflict`）。**自定义 Serialize** 输出 `{ code, message }`，前端 `normalizeTauriError()` 据此解析。`From<io::Error>`/`From<reqwest::Error>`/`From<tauri::Error>` 自动转换。\r\n\r\n### 4.5 启动文件开打的竞态处理（`state.rs` + `lib.rs`）\r\n\r\n\"前端还没 ready 就来了开文件请求\"是真实竞态。两层缓冲兜底：\r\n- **`StartupOpenRequests`**（managed state）：setup 阶段解析 CLI args 后存入。\r\n- **`PendingWindowPaths`**（managed state）：`create_editor_window` 创建新窗口时存入，按 window label 索引。\r\n\r\n`startup_ready()` 先查 `PendingWindowPaths`（新窗口专属），无则回退 `StartupOpenRequests`（主窗口启动请求）。请求来源三类：`Cli`/`OsOpen`/`NewWindow`。\r\n所有过程写 `startup-open.log`（`reveal_startup_open_log` 命令可定位此文件）。\r\n\r\n---\r\n\r\n## 5. IPC 服务层（`src/services/tauri/`）\r\n\r\n### 5.1 统一入口\r\n\r\n```ts\r\n// client.ts\r\ninvokeCommand<T>(command: TauriCommandName, args?): Promise<T>\r\n```\r\n- 包裹 `@tauri-apps/api/core` 的 `invoke`，`catch` 后用 `normalizeTauriError()` 转成 `{ code, message }` 抛出。\r\n- `command` 参数被 `TauriCommandName` 类型约束，**只能传 `command-names.ts` 里登记的名字**——拼写错误编译期即暴露。\r\n\r\n### 5.2 命令名集中表\r\n\r\n`command-names.ts` 导出 `TAURI_COMMANDS` 常量对象（键 = 前端方法名，值 = Rust 命令名字符串）。**真理源自一处**：任何新增/改名都要在此登记。\r\n\r\n### 5.3 按领域封装\r\n\r\n`document.ts`（open/save/图片）、`window.ts`、`dialog.ts`、`clipboard.ts`、`opener.ts`、`os.ts`、`store.ts`（tauri-plugin-store）、`webview.ts`、`events.ts`。每个文件只调 `invokeCommand`，对上层隐藏 IPC 细节。\r\n\r\n### 5.4 能力权限（`capabilities/`）\r\n\r\n`main-window.json` / `secondary-window.json` 是**最小权限白名单**：只放行实际用到的 core 权限 + 插件权限（event/window/dialog/store/clipboard 等）。新增需要 IPC 能力的功能，要同步在此登记。\r\n\r\n---\r\n\r\n## 6. 前端架构\r\n\r\n### 6.1 `main.ts`（极简）\r\n\r\n```ts\r\nconst app = createApp(App);\r\napp.use(createPinia());\r\napp.mount('#app');\r\n```\r\n仅此。所有逻辑在 App.vue 与 composables。\r\n\r\n### 6.2 `App.vue` —— 纯协调层（~370 行）\r\n\r\n**自身不含业务逻辑**，只做接线：\r\n- 初始化 `settingsStore`、`windowSession`、`syncMenuShortcuts`。\r\n- 把各 composable 的能力组合进 `useCommandDispatcher` 的 options。\r\n- 模板：`CustomTitlebar` + `<main>`（按 `activeViewMode` 切 editor/image）+ 状态栏 + `SettingsModal` + 图片全屏浮层。\r\n- 拖放：app 级文件 drop → `documentSession.openDocumentWithPrompt`。\r\n\r\n视图模式 `activeViewMode`：`'editor'` | `'image'`，外加独立的 `isFullscreenPreview`。\r\n\r\n### 6.3 Composables 职责表（10 个）\r\n\r\n| composable | 职责 | 关键点 |\r\n|---|---|---|\r\n| `useDocumentSession` | 文档生命周期 | 自动保存递归调度 + `isSaving` 互斥锁 + 标题改名走另存为 |\r\n| `useCommandDispatcher` | 命令分发 | scope=editor 转发编辑器，scope=app 走 switch |\r\n| `useAppDomEvents` | 全局键盘 | `findCommandByShortcut` → dispatcher |\r\n| `useAppEditorState` | 编辑器状态桥接 | 字数/大纲/光标/选区 stats |\r\n| `useAppWindowSession` | 窗口会话 | 关闭确认、标题、全屏 |\r\n| `useMenuEvents` | 菜单事件 | 监听 `menu-event` → dispatcher |\r\n| `useMenuShortcutsSync` | 快捷键同步 | 自定义快捷键变更 → Rust 菜单 diff 更新（仅 set_accelerator，不重建） |\r\n| `useImagePreview` | 图片预览 | 视图模式状态机 |\r\n| `useFloatingListMenu` | 浮动菜单 | SlashMenu/EmojiMenu 共享逻辑 |\r\n| `useClickOutside` | 点击外部 | 通用 composable |\r\n\r\n---\r\n\r\n## 7. 两个 Pinia Store\r\n\r\n### 7.1 `stores/file.ts` —— 文档状态（短生命周期）\r\n\r\n```\r\ncurrentFile: { path, content, isDirty, lastModifiedTime, displayName, originalBaseName }\r\nhasUserEdit: boolean   # 内部标志\r\n```\r\n\r\n**核心机制：脏态分离**（这是整个文档流的安全基石，详见 §11.1）：\r\n- `setContent(content)` —— 编辑器把规范化内容写回时调用；**只在 `hasUserEdit` 为真时才置脏**。\r\n- `markUserEdit()` —— 用户真实编辑时调用；置 `hasUserEdit = true` 且置脏。\r\n\r\n为什么分开？因为编辑器加载后会立即序列化回 store 建立\"规范化基线\"（见 §8），那是一次**程序性**写回，不是用户编辑，不能误判为脏。\r\n\r\n`displayName` / `originalBaseName`：`setDisplayName()` 会置脏；保存时若 `displayName !== originalBaseName`（标题被改过）→ 走另存为（这是最近一次提交 `af292cb` 的逻辑）。\r\n\r\n### 7.2 `stores/settings.ts` —— 全局设置（长生命周期）\r\n\r\n13 个设置项（activeThemeId / customThemes / fontSize / fontFamily / autoSave / autoSaveInterval / spellCheck / titlebarAutoHide / lineHeight / customShortcuts / alwaysOnTop / imageStoragePath / shellIntegration / enableAutoUpdateCheck / configVersion）。\r\n\r\n实际共 **15 个字段**（含上述 13 + `customThemes` 与 `customShortcuts` 细分）。\r\n\r\n- **持久化**：tauri-plugin-store（经 `services/tauri/store.ts`）。焦点模式用 `focus-mode` class（`<html>` 上 toggle）。\r\n- **迁移**：`configVersion`（当前 **12**）。加载时若存储的版本 ≠ 当前版本 → 规范化后**回写**，一次性升级。\r\n- **防抖写入**：设置变更后 300ms 防抖落盘。\r\n- **`normalizeSettings()`**：合并默认值 + 强制 `autoSaveInterval ≥ 5s` + 刷版本号。\r\n- **主题回退**：`ensureThemeId()` 在主题 id 失效时按当前外观回退到 `scholar-dark`/`default-light`。\r\n\r\n---\r\n\r\n## 8. 编辑器核心\r\n\r\n### 8.1 TipTap 实例复用\r\n\r\n`MarkdownEditor.vue` 创建**单个** TipTap 实例（`shallowRef`），切文件时只 `setContent`，**不 destroy 重建**——这是响应快的关键。\r\n\r\n### 8.2 文档加载→编辑→保存 数据流\r\n\r\n```\r\n加载: openDocument(Rust) → fileStore.setFile()\r\n    → parseMarkdown() → ProseMirror Doc\r\n    → editor.commands.setContent(doc)\r\n    → ★立即 serializeMarkdown() 写回 store 建立规范化基线（消除脏态闪烁）\r\n\r\n编辑: keystroke → ProseMirror Schema 变更\r\n    → editor update 事件\r\n    → 50ms 防抖：字数/大纲/光标 stats 更新\r\n    → 100ms 节流：光标行号\r\n    → 500ms 防抖：serializeMarkdown() → fileStore.setContent()（触发 markUserEdit 置脏）\r\n\r\n保存: fileStore.markSaved(result.lastModifiedMs)\r\n    → 自动保存：递归 setTimeout（间隔 ≥5s），保存完才排下一次，避免并发\r\n```\r\n\r\n> 三档防抖分离是刻意的：统计要\"几乎实时\"（50ms），序列化要\"停顿后\"（500ms）。**改任何防抖值前先理解这个分层**。\r\n\r\n### 8.3 扩展（14 个，`editor-extensions.ts`）\r\n\r\n`SemanticHeading` / `CustomCodeBlock` / `CustomTable(+Row/Header/Cell)` / `CustomImage` / `MathBlock` / `MathInline` / `MermaidBlock` / `MarkdownInput`(InputRule) / `MarkdownPaste` / `Superscript` / `Subscript` / `Wikilink` / `SlashCommands` / `EmojiSuggest`。\r\n\r\nStarterKit 内置的 `codeBlock`/`link`/`heading` **被禁用**，改用自定义版以保 Markdown 保真度与 IME 行为。\r\n\r\n复杂渲染用 `addNodeView()` **内联在扩展文件里**，不拆独立 Vue 文件。\r\n\r\n### 8.4 Markdown 解析链（`tiptap/markdown/`）\r\n\r\n- `parser.ts`：MD → ProseMirror Doc。基于 markdown-it（commonmark + table + strikethrough + task-lists + mark + sub + sup + texmath）。**frontmatter / callout / `$$`数学块在 markdown-it 之前先抽取占位，之后还原**。texmath 传**空壳 KaTeX 引擎**（解析器只分词不渲染），让真正的 KaTeX 可懒加载、不进热路径。\r\n- `serializer.ts`：ProseMirror Doc → MD。自研，精确控制输出。**强制末尾恰好一个换行**。\r\n- `plugins/` + `compat-schema.ts`：解析插件与兼容处理。\r\n- `__tests__/roundtrip.spec.ts`：**Markdown 保真度的主要安全网**——动 parser/serializer 前先看它。\r\n- `__tests__/commonmark.spec.ts`：CommonMark spec 652 条全量 roundtrip 验证（618 pass + 34 skip 设计约束）。\r\n\r\n---\r\n\r\n## 9. 命令系统\r\n\r\n### 9.1 集中注册表 `commands/registry.ts`\r\n\r\n所有命令在此**声明式定义**：`{ id, title, scope, group, defaultShortcut, menuSection, palette }`。提供查找/快捷键计算/冲突检测/Tauri accelerator 转换等纯函数。`WINDOW_TITLEBAR_MENUS` 也引用这里的 id。\r\n\r\n`utils/shortcuts.ts` 是 registry 的薄 re-export（保持旧导入路径兼容）。\r\n\r\n### 9.2 分发 `useCommandDispatcher`\r\n\r\n```\r\n来源(menu/shortcut/palette/ui) → executeCommand(id, source)\r\n   ├─ scope === 'editor'  → editorRef.executeCommand(id)  (快捷键需编辑器有焦点)\r\n   └─ scope === 'app'     → switch(id) { ... 调对应 composable handler }\r\n```\r\n\r\n**单一入口**：原生菜单（`useMenuEvents`）、全局快捷键（`useAppDomEvents`）、状态栏按钮都汇流到 `executeCommand`。`edit.find`/`edit.replace` 虽是 app scope 但转发给编辑器。\r\n\r\n---\r\n\r\n## 10. 主题与导出\r\n\r\n### 10.1 主题系统（色彩 + 排版双注入）\r\n\r\n`themes/manager.ts::applyTheme(theme)` 做三件事：\r\n\r\n1. **外观**：`applyDarkClass` 切 `<html>.dark`；同步原生窗口主题/背景色（macOS）。\r\n2. **色彩**：`injectColors` —— 按 `CSS_VAR_MAP`（types.ts）把 `ThemeColors` 的 68 个颜色字段写进 `--bg-color` / `--text-color` 等 CSS 变量。\r\n3. **排版**：`injectTypography` —— 先清空再注入 `--mk-*` 变量（`--mk-line-height` / `--mk-font-size` / `--mk-heading1~6-size` / `--mk-paragraph-spacing` / `--mk-letter-spacing` / `--mk-quote-border-width`）。\r\n\r\n`editor.css` **已全部 `var(--mk-*)` 消费**（13 处）。所以\"不同主题可定制不同排版\"**已支持**——加一个主题只需在 JSON 里填 `typography` 字段。\r\n\r\n预设 7 套（`presets/`）：scholar / scholar-dark / elegant / cinnabar / cinnabar-dark / default / gray-domain。支持自定义主题 CRUD、导入导出、旧格式（light/dark 双色）迁移。\r\n\r\n### 10.2 复制为 HTML（v1.2.18 减法重构后）\r\n\r\n> 原导出系统（HTML/PDF/微信，独立 IR 层 `buildExportTree` + HTML/Wechat 渲染器 + `wechat-themes.ts`）已于 v1.2.18 删除（净删 ~2500 行）。现以状态栏 Copy 按钮（`StatusbarQuickActions.vue`）替代：调用 `utils/markdown-to-html.ts::renderMarkdown` 生成富文本 HTML，写入剪贴板 `ClipboardItem({'text/html': ...})`。字体栈仍走 `buildFontStack` 与编辑器共享。\r\n\r\n### 10.3 字体系统\r\n\r\n- `constants/fonts.ts`：`FONT_OPTIONS`（7 种：思源宋体/微软雅黑 UI/朱雀仿宋/小赖字体/霞鹜文楷/汇文明朝/系统默认）。\r\n- `utils/fontStack.ts`：`buildFontStack(primary)` —— 按字体类型生成带中文 fallback 的完整 font-family 栈，**编辑器与导出端共享**，消除两端不一致。\r\n- `services/fontLoader.ts`：远程字体按需下载 + 文件系统缓存 + FontFace 注册，系统字体跳过，已加载缓存复用，加载中去重。\r\n\r\n---\r\n\r\n## 11. 关键约束（改前必读）\r\n\r\n> **敏感区速查表**（原 `docs/defect-hotspots.md` 已并入此处，避免两处漂移）：改代码前先对照下表定位「易错区 → 关键文件 → 详解」。\r\n\r\n| # | 敏感区 | 关键文件 | 详解 |\r\n|---|--------|----------|------|\r\n| 1 | 脏态机制 | [`src/stores/file.ts`](./src/stores/file.ts) | §11.1 |\r\n| 2 | 保存冲突检测 | [`src-tauri/src/commands/document.rs`](./src-tauri/src/commands/document.rs) + [`useDocumentSession.ts`](./src/composables/useDocumentSession.ts) | §11.2 |\r\n| 3 | 序列化尾换行 | [`serializer.ts`](./src/components/Editor/tiptap/markdown/serializer.ts) | §11.3 |\r\n| 4 | 图片资产安全 | [`src-tauri/src/commands/document.rs`](./src-tauri/src/commands/document.rs) | §11.4 |\r\n| 5 | 启动开打竞态 | [`src-tauri/src/state.rs`](./src-tauri/src/state.rs) + [`lib.rs`](./src-tauri/src/lib.rs) | §11.5 |\r\n| 6 | 三档防抖分层 | [`MarkdownEditor.vue`](./src/components/Editor/MarkdownEditor.vue) | — |\r\n| 7 | 命令名 / 定义真理源 | [`command-names.ts`](./src/services/tauri/command-names.ts) + [`registry.ts`](./src/commands/registry.ts) | 附录 B |\r\n| 8 | 主题色彩/排版注入 | [`themes/manager.ts`](./src/themes/manager.ts) + [`types.ts`](./src/themes/types.ts) | — |\r\n| 9 | 多窗口进程模型 | [`lib.rs`](./src-tauri/src/lib.rs) | — |\r\n| 10 | 构建环境 | 见 [`docs/debugging.md`](./docs/debugging.md) + [`HANDOVER.md`](./HANDOVER.md) | — |\r\n\r\n### 11.1 脏态机制不可随意改动\r\n\r\n`file.ts` 的 `setContent()` vs `markUserEdit()` 分离是**有意的**（见 §7.1）。编辑器加载后立即序列化写回是**建立规范化基线**，消除 parser/serializer 归一化差异导致的假脏态。**动了它就会重新引入脏态闪烁。**\r\n\r\n### 11.2 保存冲突检测在 Rust 侧\r\n\r\n`save_document(path, content, expected_last_modified_ms, force)`：\r\n- 非 force 时对比传入的 expected mtime 与磁盘当前 mtime，不符 → 返回 `AppError::Conflict`（code `document_conflict`）。\r\n- 前端 `useDocumentSession` 收到 conflict → 弹\"强制覆盖\"确认 → 递归调用（先释放 `isSaving` 锁防死锁）。\r\n- `atomic_write`：先写 `.tmp` 再 `rename`，跨平台原子覆盖（Windows 用 `MoveFileExW` + REPLACE，**不做先删后改名**以免引入竞态窗口）。\r\n\r\n### 11.3 序列化总是规范化尾换行\r\n\r\n`serializeMarkdown()` 强制输出**恰好一个**尾换行。roundtrip 测试同样规范化预期值。**\"多了一个换行\"先查 serializer，别改测试。**\r\n\r\n### 11.4 图片资产安全\r\n\r\n`validate_image_asset_path`：先 `canonicalize`（解析符号链接/`..`）再校验扩展名，**防 `evil.png → /etc/passwd` 绕过**。只在 6 种图片扩展名白名单内放行。\r\n\r\n### 11.5 启动开打是竞态敏感的\r\n\r\n`StartupOpenRequests` + `PendingWindowPaths` + `LoadedWindows` 两层缓冲（见 §4.5）。动启动事件顺序前务必理解 `startup_ready` 的分支。\r\n\r\n### 11.6 真理源自一处\r\n\r\n- 命令名只在 `command-names.ts` 登记。\r\n- 命令定义只在 `registry.ts`。\r\n- 字体清单只在 `fonts.ts`，字体栈只在 `fontStack.ts`。\r\n- 主题色彩映射只在 `types.ts::CSS_VAR_MAP`：**任何要跟随主题切换的颜色，必须同时在 `ThemeColors` 接口与 `CSS_VAR_MAP` 登记，禁止只在 `main.css` 写死某个颜色**——否则切预设主题时该色不随主题变化（参考 2026-07-21「状态栏未保存指示不随主题」bug：`--dirty-color` 漏登记导致始终回退书卷气默认值）。\r\n\r\n---\r\n\r\n## 附录 A：命令速查（编辑器内常用）\r\n\r\n| 动作 | 命令 id | 快捷键（默认） |\r\n|---|---|---|\r\n| 新建 | `file.new` | Mod+N |\r\n| 打开 | `file.open` | Mod+O |\r\n| 保存 | `file.save` | Mod+S |\r\n| 另存为 | `file.saveAs` | Mod+Shift+S |\r\n| 查找 | `edit.find` | Mod+F |\r\n| 替换 | `edit.replace` | Mod+H |\r\n| 焦点模式 | `view.focusMode` | Mod+Shift+F |\r\n| 全屏 | `view.fullscreen` | Mod+Ctrl+F / F11 |\r\n| 设置 | `settings.open` | Mod+, |\r\n\r\n（Mod = macOS Cmd / 其它 Ctrl；完整列表见 `registry.ts`）\r\n\r\n---\r\n\r\n## 附录 B：常见任务起点导航\r\n\r\n| 我想改… | 从这里入手 |\r\n|---|---|\r\n| 编辑器行为 bug | `MarkdownEditor.vue` + 对应 `extensions/*.ts` |\r\n| Markdown 保真度 | `parser.ts` / `serializer.ts` → 先看 `roundtrip.spec.ts` |\r\n| 文件打开/保存 bug | `useDocumentSession.ts` + `commands/document.rs` |\r\n| 菜单/快捷键行为 | `registry.ts` + `useCommandDispatcher.ts` + Rust `menu.rs` |\r\n| 搜索/替换 | `useEditorSearch.ts` + `extensions/search-highlight.ts` + 搜索面板模板（`MarkdownEditor.vue`） |\r\n| 主题/外观 | `stores/settings.ts` + `themes/manager.ts` + `editor.css` |\r\n| 导出（HTML） | `utils/markdown-to-html.ts` + `StatusbarQuickActions.vue` |\r\n| 图片拖入/处理 | `editor-image-drop.ts` + Rust `commands/document.rs` + `services/tauri/asset.ts` |\r\n| 字体 | `constants/fonts.ts` + `fontStack.ts` + `fontLoader.ts` + `useEditorAppearance.ts` |\r\n| 启动开打 | Rust `lib.rs`（§4.5）+ `useAppWindowSession.ts` |\r\n| IPC 新增命令 | `command-names.ts` 登记 + `services/tauri/` 封装 + Rust `commands/` 实现 + `lib.rs` 注册 + `capabilities/` 加权限 |\r\n\r\n---\r\n\r\n## 附录 C：文档与代码差异（防止被旧文档误导）\r\n\r\n下列内容在 `.trae/documents/` 中被描述为存在/未解决，但**当前代码实际状态**如下：\r\n\r\n| 旧文档说法 | 实际现状 |\r\n|---|---|\r\n| 存在文件树 / workspace watcher / `useFileTree.ts` / `useFileOperations.ts` | **已移除**。`useDocumentSession.ts` 内有 `// workspace 功能已移除` 注释 |\r\n| `fs.rs` / `watch.rs` / `config.rs` | **不存在**。文件操作在 `commands/document.rs`，无 watcher，设置用 tauri-plugin-store |\r\n| 6 个字体 | **7 个**（系统默认 + 微软雅黑 UI + 5 款远程下载字体） |\r\n| emoji 补全未实现 | **已实现**（`emoji-suggest.ts` + `EmojiMenu.vue`，`:` 触发） |\r\n| 编辑区排版硬编码、不随主题切换 | **已解决**。主题 `typography` → `--mk-*` 变量 → `editor.css` 消费 |\r\n| 字体依赖本地安装 | **已解决**。改为按需远程下载 + 文件系统缓存，安装包不再内嵌字体文件 |\r\n| 字体栈分散 | **已收口**到 `fontStack.ts::buildFontStack`，编辑器+导出共享 |\r\n| 序列化防抖 300ms | **实际 500ms**（序列化）/ 50ms（统计）/ 100ms（光标）三档 |\r\n| Rust 命令 ~20 个 | **实际 21 个**（见 `lib.rs::invoke_handler!`，v1.2.23 含 `resolve_image_display`，后又加 `read_clipboard_html`） |\r\n| 快捷键表 / 发布清单列有「导出 HTML / PDF / 微信」 | **已移除**（v1.2.18）。复制为 HTML 用状态栏「复制为 HTML」按钮，无导出命令 |\r\n\r\n> 若你发现本附录与代码不符，**以代码为准并更新本表**——这是这份文档保持可信的唯一方式。\r\n\r\n---\r\n\r\n## 开发命令速查\r\n\r\n```bash\r\nbun install              # 装依赖\r\nbun run dev              # 纯前端 dev\r\nbun run dev:tauri        # Tauri 全栈 dev（含 Rust）\r\nbun run build            # 前端构建（含 vue-tsc 类型检查）\r\nbun run build:tauri      # 打安装包\r\nbun run test             # Vitest\r\nbun run lint             # ESLint\r\nbun run format           # Prettier\r\ncargo check --manifest-path src-tauri/Cargo.toml   # Rust 编译检查\r\n```\r\n\r\n代码风格：Prettier（单引号/分号/尾逗号/2 空格/100 列/LF），ESLint（`no-explicit-any` 与 `no-unused-vars` 为 warn，`_` 前缀参数豁免，禁 `console.log` 但允许 `warn`/`error`）。\r\n"},"CHANGELOG.md":{"text":"# Changelog\n\nAll notable changes to **solo** are documented here.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/),\nand this project adheres to [Semantic Versioning](https://semver.org/).\n\n> 本文件由真实 `git log` 整理而成（非臆想）。更早的 v1.1.x 历史可在仓库提交记录中查阅。\n> 每个版本的权威测试数量以 `bun run test` 实际输出为准，本文不硬编码数字。\n\n---\n\n## [1.2.30] — 2026-07-22\n\n### Fixed\n- **字体不生效根因：CSP `font-src` 漏 `asset:` 协议**（历史遗留 bug）。v1.2.13 把字体加载从 IndexedDB + blob: URL 改为 `convertFileSrc` + asset.localhost URL，同时给 `assetProtocol.scope` 加了 font-cache 目录，但**忘了同步更新 CSP 的 `font-src`**——`img-src` 一直有 `asset:`，`font-src` 从第一天起就漏了。结果：首次下载用 `blob:` URL（CSP 允许）能临时生效，但重启读缓存用 `convertFileSrc` 转成 asset.localhost URL 时被 CSP 拦截，字体永不生效。v1.2.29 修了 reqwest system-proxy / 旧缓存兼容 / silent 参数透传等周边问题，但都没碰到核心；v1.2.30 才真正修复根因——CSP 的 `font-src` 加 `asset: http://asset.localhost`，与 `img-src` 完全对齐。**教训**：架构切换（加载方式变更）时必须同步审查 CSP/SSOT 等配置类真理源，不能只改代码不改配置。\n- **SSOT 违规：`detect_proxy_for_update` 命令名硬编码**：`App.vue` 和 `AboutSettingsPanel.vue` 用 `invoke('detect_proxy_for_update')` 直接 invoke，违反「前端不直接 invoke」铁律。修复：`command-names.ts` 登记 `detectProxyForUpdate`，两处改用 `invokeCommand + TAURI_COMMANDS.detectProxyForUpdate`。与 v1.2.27 修 `read_clipboard_html` 是同类 SSOT 违规复发。\n- **打印时 focus-mode 会丢段落**（bug 级）：focus mode 开着时打印，未聚焦段落 `opacity: 0.22` 仍生效，打印结果几乎丢段落。修复：`@media print` 强制 `html.focus-mode .paragraph-dimmed { opacity: 1 }`，同时隐藏代码块语言按钮、mermaid/math 删除按钮、frontmatter header 等编辑态 chrome，容器不限制宽度贴满 A4 printable area。\n\n### Changed\n- **排版设计系统性提升（对齐 iA Writer / Obsidian）**：\n  - `line-height` 1.9 → 1.7（CJK 友好但不至于过松，iA Writer 1.5 / Obsidian 1.5）\n  - 正文 `letter-spacing` 0.02em → 0（回归字体默认设计，不再二次放宽）\n  - h1 `letter-spacing` 0.04em → -0.02em（标题应收紧而非放宽，对齐 iA Writer / Obsidian）\n  - 容器宽度 760px → 720px（单行约 44 中文字符，符合 CJK 黄金行宽）\n  - 段落间距 0.75em → 1em（段落不再抱团，层次分明）\n  - h1 margin-top 1.4em → 2.4em，h2 1.2em → 1.8em，h3 1em → 1.2em（章节切换呼吸感）\n  - blockquote 加 `font-style: italic`（西方引文排版传统，iA Writer 独创）\n  - 代码块/mermaid/math/frontmatter 圆角 6px → 4px（去掉软糖感，Obsidian 4px 一致）\n  - 图片移除 1px border（四款天花板全无，让图片沉浸内容流）\n  - hr margin 1.5em → 2em（章节切换呼吸感）\n  - 标题字号统一（h1-h6 在 editor.css + 7 主题预设间不再漂移，全部 1.5/1.3/1.2/1.05/1/0.9em）\n- **图片体验提升**：\n  - 新增 caption：图片下方显示 alt 文字，居中 muted 小字号（iA Writer 做法）\n  - 新增 loading 占位：图片加载中显示 skeleton 动画背景，防视觉断层\n- **可访问性提升**：\n  - 全局 `:focus-visible` 焦点环（WCAG 2.4.7 合规，键盘导航有统一焦点环，鼠标点击不显示）\n  - 列表 marker 颜色用 muted 色（iA Writer / Notion 一致，正文更突出）\n  - `scroll-padding-top: 80px`（预防性修复，防未来 sticky header 遮挡跳转目标）\n\n---\n\n## [1.2.29] — 2026-07-22\n\n### Fixed\n- **首次启动仍弹「打开文件失败」错误框**：v1.2.26 曾修过此问题（`handleOpenPayload` 加了 os error 2 静默跳过逻辑），但修复不完整——`loadDocumentFromPath` 的内层 catch 会先 `await message(...)` 弹窗并 `return false`，错误被吃掉传不到外层 try/catch，静默逻辑形同虚设。修复：给 `loadDocumentFromPath` / `openDocumentWithPrompt` / `handleOpenFile` 加 `silent` 参数，启动链路传 `true`，遇到文件不存在时把错误抛给 `handleOpenPayload` 的静默跳过逻辑处理；用户主动打开（菜单/拖拽）仍走默认 `silent=false`，保留合理的错误提示。复查阶段发现并修复两个关键问题：①`handleOpenPayload` 用 `String(err)` 转换错误对象，但 `invokeCommand` 抛的是 `TauriAppError` 对象 `{code, message}`，`String()` 得到 `\"[object Object]\"`，正则无法匹配 os error 2——改为用 `normalizeTauriError(err).message` 正确提取 message；②非 os error 2 的错误 `throw err` 会中断 setup 函数，导致 `setupDragDrop()` 不执行、拖拽功能失效——改为弹窗提示但不 throw，避免中断后续启动步骤。\n- **字体下载在网络受限环境失败**：`reqwest` 配 `rustls-tls`（不读系统证书库）但未开启 `system-proxy` feature，导致 rustls-tls 也不读系统代理，fallback 下载通道在网络受限环境失败。修复：`Cargo.toml` 加 `system-proxy` feature，reqwest 自动读环境变量 + Windows 注册表系统代理。同时修正 `fetch_font_data` 注释——v1.2.28 的注释说\"无扩展名导致 Content-Type 推断失败\"是错误的（v1.2.27 用 family 命名无扩展名文件能正常加载，反证了这一点）；真正原因是缓存 key 命名变更导致旧缓存失效 + reqwest 不读系统代理。\n- **字体缓存兼容 v1.2.27 旧命名**：v1.2.28 改用 fileName（含扩展名）后，v1.2.27 用 family（无扩展名）留下的旧缓存无法识别。`get_cached_font_path` 增加兼容逻辑：先查新名，找不到再查旧名（family），找到则迁移为新名（`fs::rename`）。迁移后旧文件消失，后续都走新名，一次性升级无残留；迁移失败（权限/跨盘）时返回旧路径，字体仍可加载。\n- **SSOT 违规：`read_clipboard_html` 命令名未登记**：`clipboard.ts` 用硬编码字符串 `invoke('read_clipboard_html')` 而非通过 `command-names.ts` 真理源。修复：`command-names.ts` 加 `readClipboardHtml`，`clipboard.ts` 改用 `invokeCommand + TAURI_COMMANDS.readClipboardHtml`。\n\n### Changed\n- **标题字号整体下调**：h1/h2 在 `editor.css` 默认值和全部 7 个主题预设中下调约 0.1em，让标题与正文的层级对比更克制（h3-h6 保持不变，已接近主流编辑器标准）。\n\n---\n\n## [1.2.28] — 2026-07-21\n\n### Fixed\n- **状态栏「已保存」文字颜色跟随主题主色**：此前「已保存」指示用了 `--success-color`（各预设多为绿色系差异极小，且 `scholar` 的 successColor 与 `main.css` 兜底值碰巧相同，掩盖了不跟随的真问题）。改为跟随 `--primary-color`——主题主色是什么，它就是什么，真正做到「颜色跟上主题」而非「拉开色值」。仅改 `App.vue` 两处（`statusbar-stat--success` / `statusbar-save-btn.is-clean`），`.is-dirty` 仍走 `--dirty-color` 不动。\n- **正文字体下载失败（缓存文件名变更导致旧缓存失效）**：字体缓存落到 `$APPLOCALDATA/font-cache/` 时，v1.2.27 用 family 名（如 `Noto Serif SC`，无扩展名），v1.2.28 改用 URL 末段的 `fileName`（含 `.woff2` 等扩展名）。改名的本意是与前端 `FONT_OPTIONS.fileName` 字段对齐，避免 family 字符串与磁盘文件名的二次映射；但副作用是 v1.2.27 留下的旧缓存（family 命名）无法被新代码识别，被迫重新下载。`fetch_font_data` / `get_cached_font_path` / `save_font_cache` 三命令同步增 `file_name` 参数；前端 `fontLoader.ts` 下载落盘时补 MIME type。（后续 Unreleased 段补正：早期注释说\"无扩展名导致 Content-Type 推断失败\"是错误的——v1.2.27 用 family 命名无扩展名文件能正常加载，反证了这一点；真正原因是缓存 key 命名变更 + reqwest 不读系统代理。）\n- **从 AI 工具（豆包 / 千问等）复制内容粘贴格式全丢**：此前粘贴来源嗅探只认「专有 markdown 语法」（`#` 标题、`**` 加粗等字面字符 `### 标题` / `**加粗**` 显示出来）。AI 工具常把 markdown 源包在 `pre`/`div` 壳里复制，源是纯 markdown 但被当成 HTML 解析，格式蒸发。扩展嗅探条件为「专有语法 **或** 通用 markdown 源（`looksLikeMarkdownSource`）」，覆盖豆包 / 千问 / 其他把 markdown 包壳复制的场景。新增 2 个回归测试（纯 markdown 源无 HTML / 通用 AI 工具壳场景）断言格式真保留。\n\n---\n\n## [1.2.27] — 2026-07-21\n\n### Fixed\n- **复制粘贴格式兼容性（入站）**：从网页 / Word / Notion / 微信等复制的富文本，粘贴事件常不带 `text/html`，导致格式退化成纯文本。原兜底 `navigator.clipboard.read()` 在桌面 webview 不可靠、且官方 `clipboard-manager` 插件并无 `readHtml` API。改为新增 Rust 命令 `read_clipboard_html`（复用项目已有的 `arboard` 依赖直接读系统剪贴板，零新增依赖），缺失 `text/html` 时异步兜底还原格式。回退了两处不存在的 `clipboard-manager:allow-read-html` 权限。\n- **复制粘贴格式兼容性（出站）**：编辑器内 `Ctrl+C` 此前无自定义 `clipboardTextSerializer`，选区复制到外部 Markdown 编辑器（Obsidian / Typora）时，callout / 数学公式 / mermaid / wikilink / frontmatter / 脚注等 solo 扩展语法的 Markdown 标记全丢。新增 `serializeClipboardSlice`，将选区序列化为 Markdown 纯文本写入 `text/plain`；`text/html` 仍由 ProseMirror 默认生成（标准格式走 HTML 还原）。\n- **状态栏保存按钮颜色不跟随主题**：`cinnabar` 与 `scholar` 预设的 `successColor` 同为 `#6b8e5a`（深色 `#8fb87a`），在两者间切换时「已保存」绿色不变，造成不跟随的错觉。已将 `cinnabar` 改为 `#7ba35a`、`cinnabar-dark` 改为 `#93c06f` 区分。\n\n---\n\n## [1.2.26] — 2026-07-21\n\n### Fixed\n- **启动时目标文件不存在不再弹错误框**：更新后重启或通过文件关联（双击 .md）启动 solo 时，若启动参数指向已删除/移动的文件，原行为弹「打开文件失败: 系统找不到指定的文件。(os error 2)」错误框。改为捕获 os error 2 / ENOENT 类错误后 `console.warn` 静默跳过；非文件缺失类错误（如权限问题）仍正常抛出。\n\n---\n\n## [1.2.25] — 2026-07-21\n\n### Fixed\n- **粘贴兼容性（核心特性）修复**：从网页 / Word / Notion / 微信 等富文本来源粘贴时格式全丢的问题。\n  - **根因**：之前的「兼容性优化」只是给粘贴加了分发器，最常见那一路（富文本来源）直接 `return false` 甩回 ProseMirror 默认粘贴；默认粘贴要保住格式的前提是剪贴板带 `text/html`，在运行时常常没送到，于是退化成纯文本、格式蒸发。优化没碰这个真病根，所以「好像没什么用」。\n  - **修复**：HTML 分支不再甩默认，改为用 ProseMirror DOMParser 显式解析 `text/html` 并插入（保格式可控、可测）；当粘贴事件无 `text/html` 时，`navigator.clipboard.read()` 异步从系统剪贴板再读一次 HTML 兜底（桌面端最稳）。\n  - **附带修复**：`hasMarkdownOnlySyntax` 行内 `$...$` 误判——要求 `$` 之间不含空格，避免「$10 到 $20」类货币被误判为 markdown 源而走 markdown 解析丢格式。\n  - **测试补强**：新增端到端用例，断言富文本 `<strong>`/`<h2>` 真还原加粗/标题节点（堵住此前「只测分发决策、不测格式是否真保住」的盲区）。\n\n## [1.2.24] — 2026-07-20\n\n### Added\n- **统一动效语言 token**：`main.css :root` 新增 `--motion-fast: 120ms` / `--motion-base: 200ms`\n  / `--ease-out: cubic-bezier(.2,.8,.2,1)` 三个变量 + `.smooth-enter` 工具类。\n  把现有 `mk-menu` 入场、`theme-transitioning` 过渡、SettingsModal 入场动效的\n  `ease` 曲线统一替换为 `var(--ease-out)`，时长统一为 token 值。Linear / Raycast\n  丝滑的核心不是动效多，而是「一致」——同一时长、同一曲线贯穿全局。\n- **`prefers-reduced-motion` 全局关动画**：尊重用户系统偏好（WCAG 无障碍底线），\n  所有 `*` / `*::before` / `*::after` 的动画与过渡时长降到 0.01ms，scroll-behavior 改 auto。\n- **搜索命中 / 大纲跳转的 300ms 高亮脉冲**：跳转后给目标元素加 `.mk-jump-target`\n  类触发 `mk-jump-pulse` 动画（背景色淡入淡出）。UX 研究结论：跳转后明确的视觉反馈\n  比静默滚动更能让用户「知道到这儿了」。同一元素连续跳转时强制重排让动画可再次触发。\n  Helper `pulseJumpTarget` 从 `useEditorSearch.ts` 导出，`scrollToMatch` 和\n  `MarkdownEditor.scrollToPos` 共用，避免重复实现。\n- **主题 / 字体切换时编辑区内容 crossfade**：CSS 变量重绘会让内容「闪一下」。\n  新增 `triggerContentCrossfade()` helper（在 `themes/manager.ts` 导出），\n  切换瞬间给 `.mk-editor` 加 `mk-content-crossfade` 类，200ms 内 opacity 从 0.6 淡入到 1\n  （不完全消失，保留用户位置感，参考 Notion / Linear）。主题切换 (`applyTheme`) 和\n  字体切换 (`applyFontFamily`) 都调用，连续切换时强制重排让动画可再次触发。\n- **字体加载 `font-display: swap`**：`fontLoader.ts` 的 `new FontFace(family, url)`\n  加第三参数 `{ display: 'swap' }`。字体加载期间用系统同族字体先顶上，到位无感替换，\n  对应 Web Vitals 的「消灭 FOUT（字体切换闪烁）」目标。FontFace JS API 默认行为\n  接近 swap，但显式声明意图更清晰。\n\n### Changed\n- **乐观保存（Ctrl+S 立刻显示「已保存」）**：原实现等 IPC 返回才清脏标，本地写也有\n  几十毫秒延迟，状态栏会有可感知的「未保存→已保存」滞后。改为进入 `saveCurrentDocument`\n  主分支后立即 `fileStore.markSaved()`（不带 mtime 参数，不动 lastModifiedTime），\n  IPC 飞行期间若用户继续编辑 → `hasUserEdit=true` → 成功后保留脏标等下次保存、仅更新 mtime\n  防下次 conflict 误报；失败 / conflict 弹框取消时调 `fileStore.markUserEdit()` 回滚脏标\n  并还原 mtime。业界共识（Notion / Linear / Google Docs）：体感来自「开始」而非「结束」。\n\n### Tests\n- `useDocumentSession.spec.ts` 补全 fileStore mock：新增 `markUserEdit` / `hasUserEdit`\n  / `setContent`，`markSaved` mock 同步重置 `hasUserEdit`（与真实 store 行为一致），\n  `beforeEach` 重置新字段。\n- `manager.spec.ts` 补全 document mock：加 `querySelector: vi.fn(() => null)` 让\n  `triggerContentCrossfade` 在测试环境（无 `.mk-editor`）安全跳过。\n\n---\n\n## 命令面板 + 大纲面板\n\n### Added\n- **命令面板（Command Palette）**：新增 `CommandPalette.vue`，快捷键唤起全局命令面板，集中暴露\n  新建 / 打开 / 保存 / 切换主题 / 跳转设置等常用操作，减少菜单寻路成本；`CustomTitlebar.vue`\n  提供触发入口，`src/commands/registry.ts` 注册可检索命令并按分组展示。\n- **大纲面板（Outline Panel）**：新增 `OutlinePanel.vue` + `composables/useOutline.ts`，基于\n  文档标题结构实时生成大纲，支持 scroll-spy 高亮当前章节，点击跳转对应位置并复用\n  `pulseJumpTarget` 高亮脉冲给出落点反馈；默认收起，沉浸式写作时编辑区保持干净。\n\n---\n\n## 代码审查修复\n\n### Fixed\n- **`main.rs`：EBWebView 目录启动清理恢复 staleness 守卫（>24h）**。\n  原实现无条件删除所有 `EBWebView-*` 目录，用户双开 solo（两个独立进程）时\n  新进程会删掉老进程正在使用的 WebView2 数据目录，导致老进程崩溃。\n  改为只删除 24 小时前的残留；拿不到修改时间的目录保守跳过。\n- **`resolve_image_display`：恢复 `assets/` 相对引用走文档目录的守卫**。\n  原实现只要 `storage_dir` 有值就优先 join，导致设了全局 `imageStoragePath` 后\n  `![x](assets/diagram.png)` 被错误解析到 `storagePath/assets/diagram.png`。\n  守卫规则集中在 Rust 侧（前端不重复实现），新增 5 个单元测试覆盖路径判别不变量。\n- **`resolve_image_display`：补 containment 校验**。\n  相对路径解析后必须落在基目录（文档目录或 storage_dir）之内，\n  防止 `../../secret.png` 越权授权文档目录之外的文件。\n  绝对路径放行（solo 是本地编辑器，用户有权引用 `D:/photos/cat.png` 等外部图片）。\n- **Slash 命令菜单在中文/英文文字后不触发**。\n  TipTap Suggestion 的 `allowedPrefixes` 默认值是 `[' ']`，即只允许 `/` 出现在\n  空格或行首之后。中文没有词间空格习惯——用户在「你好」或「hello」后直接敲 `/`\n  完全无反应，菜单不弹出。`editor-extensions.ts` 里 `SlashCommands.configure`\n  显式传 `allowedPrefixes: null` 关闭前缀检查，让 `/` 在任意前缀后都能触发。\n  新增 9 个回归测试锁死该契约。\n- **Mermaid / 数学公式块无法删除**。\n  两个块都用 `isolating: true` + `contentDOM: undefined`（为了实现「点击进入\n  textarea 编辑」的交互），副作用是标准 Backspace 在块外不删块、块内 textarea\n  又是原生 DOM——整个块没有删除入口。修复：顶部加一条 header 顶栏，左侧块类型\n  标识（mermaid / math），右侧 × 删除按钮——hover 整块时按钮淡入显示，点击直接\n  删整块。textarea 内同时保留 `Mod+Backspace` 作为键盘删除快捷键。\n- **Slash / Emoji 菜单被视口边缘遮挡**。\n  原定位逻辑只算 `rect.bottom + 4, rect.left`，光标在编辑器下方或右边缘时菜单\n  会超出视口。抽出 `computeMenuPosition(rect, viewport)` 纯函数做边界检测：\n  下方放不下且上方放得下 → 翻转到光标上方；上下都放不下 → 钉视口顶部靠菜单\n  自身 scroll；右侧超出 → 向左收缩；左侧超出 → 钉视口左边。SlashMenu /\n  EmojiMenu 共用同一函数。新增 7 个单测覆盖各边界场景。\n\n### Changed\n- **`events.ts`：拖拽广播加 try/catch + Set 迭代复制**。\n  单个 handler 抛错不再阻断后续 handler 收到事件（遵循「一处崩溃不影响全局」原则）；\n  迭代时复制成数组，规避 handler 在回调里 unsubscribe 其他 handler 导致 Set 跳过元素的边缘情况。\n  新增 2 个测试用例覆盖以上不变量。\n\n---\n\n## [1.2.23] — 2026-07-19\n\n### Added\n- 粘贴来源自动嗅探：识别多种来源格式，自动选择最优转换策略。\n- 更新进度可视化：粘贴 / 转换过程给出可见反馈。\n\n### Changed\n- `hasImage` 标记与 HTML 防重复：避免重复嵌入与重复渲染。\n\n---\n\n## [1.2.22] — 2026-07-18\n\n### Fixed — 格式兼容性修复\n- turndown HTML 粘贴转换优化。\n- 代码块保护：粘贴时不破坏 fenced code。\n- CRLF + Frontmatter 兼容。\n- Callout 保留。\n- 图片不再吞掉相邻文字。\n- 粘贴门槛拓宽。\n- 复制按钮增强。\n\n---\n\n## [1.2.21] ~ [1.2.18]\n\n- **v1.2.18 导出系统移除**（用户可见）：删除 HTML/PDF/微信导出（净删约 2500 行代码），改用状态栏「复制为 HTML」按钮把渲染后 HTML 写入剪贴板。详见 [`ARCHITECTURE.md`](./ARCHITECTURE.md) §10.2。\n- 其余为版本号同步与小修复（见对应提交 `bump version to 1.2.x`）。\n\n---\n\n## [1.2.17] — 2026-07\n\n### Fixed\n- `asset://` 图片重开后裂图。\n- 启动黑闪。\n\n---\n\n## [1.2.16] — 2026-07\n\n### Fixed\n- 编译修复：移除不存在的 `proxy()` 方法调用。\n- 版本号同步（`package.json` + `tauri.conf.json`）。\n\n---\n\n## [1.2.15] — 2026-07\n\n### Fixed\n- 自动更新代理检测：4 优先级兜底（env / Git / 注册表 / 端口探测），跨平台注入 updater builder + `HTTPS_PROXY` 环境变量。\n\n---\n\n## [1.2.14] ~ [1.2.11]\n\n- 图片粘贴保存为文件而非 base64 内嵌，统一路径策略。\n- 字体缓存 IPC 重写；文档加载时待转换标题处理。\n- 自动聚焦编辑器，创建即可输入。\n- 修复字体缓存 asset protocol scope，回归 `convertFileSrc`。\n- 各类编译告警清理。\n\n---\n\n## [1.2.10] — 2026-07\n\n### Fixed\n- Callout 斜杠命令：包裹选中文字而非插入空块。\n\n---\n\n## [1.2.9] — 2026-07\n\n### Fixed\n- NSIS 安装器路径修正（自定义 target triple）。\n\n---\n\n## [1.2.8] — 2026-07\n\n### Added\n- 自动更新（auto updater）支持。\n\n---\n\n## [1.2.7] — 2026-07\n\n### Fixed\n- CJK 加粗 / 斜体边界修复：ZWNJ 预处理解决中文标点与 `*_**` 定界冲突。\n\n---\n\n## [1.2.6] — 2026-07\n\n### Fixed — roundtrip 稳定性\n- 列表 / codespan / 标题 / fence / URL / 水平线 多处序列化往返修复。\n\n---\n\n## [1.2.5] — 2026-07\n\n### Changed\n- 移除单实例限制，多进程独立 WebView2 数据目录（每个窗口独立）。\n\n---\n\n## [1.2.3] — 2026-07\n\n### Fixed\n- NSIS 安装时注册表修复（无需启动即可生效）。\n- 显示名修复（`solo文档`）。\n- ShellNew 去重、中文显示名、图标索引、版本号同步。\n\n---\n\n## [1.2.2] — 2026-07\n\n### Added\n- 粘贴 Markdown 自动转换。\n- 剪贴板复制（Copy as Markdown/HTML）。\n- PDF 按钮重命名。\n\n### Fixed\n- P0 菜单事件、P1 Callout/注册表/重命名、性能优化。\n\n---\n\n## [1.2.1] — 2026-07\n\n### Added\n- 多窗口。\n- 内存优化。\n- 脚注（footnotes）。\n\n### Fixed\n- 失焦时不再销毁编辑器，保持内容可见。\n\n---\n\n## [1.2.0] — 2026-07\n\n### Added\n- 窗口置顶（Always on Top）。\n- 字体按需下载（Rust reqwest 绕过 CSP/CORS），下载进度条。\n- `.md` 文件图标与右键「新建 .md」注册。\n- 启动闪烁修复：窗口先隐藏，状态恢复后显示。\n- 多窗口内存优化（WebView2 `MemoryUsageTargetLevel`、失焦降内存、销毁链加固）。\n- 主题切换行间距修复。\n- Callout 多轮设计迭代（最终对齐 GitHub Markdown Alerts：左边框 + icon）。\n- 表格 CSS 对齐 prosemirror-tables 官方设计，列拖拽独立调整。\n- 文件名随 displayName 变更自动重命名。\n\n---\n\n## 更早版本\n\n- **v1.1.x** — 极简 Markdown 编辑器起步阶段（含沉浸模式、置顶图标、Callout 早期设计等）。\n  详细提交可在仓库 `git log` 中查阅。\n\n---\n\n## 版本号规则速记\n\n| 变更类型 | 升哪位 | 示例 |\n|---|---|---|\n| 新增功能 / 非破坏性改进 | 次版本 | 1.2.8 → 1.2.9 |\n| 仅修复 bug | 修订号 | 1.2.9 → 1.2.10 |\n| 破坏性变更 | 主版本 | 1.x → 2.0 |\n\n发版完整流程见 [`RELEASE_PROCESS.md`](./RELEASE_PROCESS.md)。\n"},"package.json":{"text":"{\n  \"name\": \"solo\",\n  \"private\": true,\n  \"version\": \"1.2.30\",\n  \"packageManager\": \"bun@1.3.14\",\n  \"license\": \"Apache-2.0\",\n  \"type\": \"module\",\n  \"scripts\": {\n    \"dev\": \"vite\",\n    \"build\": \"vue-tsc --noEmit && vite build\",\n    \"preview\": \"vite preview\",\n    \"tauri\": \"tauri\",\n    \"dev:tauri\": \"tauri dev\",\n    \"dev:tauri:inspect\": \"SOLO_OPEN_DEVTOOLS=1 tauri dev\",\n    \"build:tauri\": \"tauri build\",\n    \"test\": \"vitest run\",\n    \"lint\": \"eslint src/\",\n    \"lint:fix\": \"eslint src/ --fix\",\n    \"format\": \"prettier --write \\\"src/**/*.{ts,vue,css}\\\"\"\n  },\n  \"dependencies\": {\n    \"@tauri-apps/api\": \"^2.11.0\",\n    \"@tauri-apps/plugin-clipboard-manager\": \"^2.3.2\",\n    \"@tauri-apps/plugin-dialog\": \"^2.7.1\",\n    \"@tauri-apps/plugin-opener\": \"^2.5.4\",\n    \"@tauri-apps/plugin-store\": \"^2.4.3\",\n    \"@tauri-apps/plugin-updater\": \"^2.10.0\",\n    \"@tauri-apps/plugin-window-state\": \"^2.4.1\",\n    \"@tiptap/extension-code-block-lowlight\": \"^3.26.1\",\n    \"@tiptap/extension-highlight\": \"^3.26.1\",\n    \"@tiptap/extension-image\": \"^3.26.1\",\n    \"@tiptap/extension-link\": \"^3.26.1\",\n    \"@tiptap/extension-placeholder\": \"^3.26.1\",\n    \"@tiptap/extension-table\": \"^3.26.1\",\n    \"@tiptap/extension-table-cell\": \"^3.26.1\",\n    \"@tiptap/extension-table-header\": \"^3.26.1\",\n    \"@tiptap/extension-table-row\": \"^3.26.1\",\n    \"@tiptap/extension-task-item\": \"^3.26.1\",\n    \"@tiptap/extension-task-list\": \"^3.26.1\",\n    \"@tiptap/pm\": \"^3.26.1\",\n    \"@tiptap/starter-kit\": \"^3.26.1\",\n    \"@tiptap/suggestion\": \"^3.26.1\",\n    \"@tiptap/vue-3\": \"^3.26.1\",\n    \"highlight.js\": \"^11.11.1\",\n    \"katex\": \"^0.17.0\",\n    \"lodash-es\": \"^4.18.1\",\n    \"lowlight\": \"^3.3.0\",\n    \"markdown-it\": \"^14.2.0\",\n    \"markdown-it-footnote\": \"^4.0.0\",\n    \"markdown-it-mark\": \"^4.0.0\",\n    \"markdown-it-sub\": \"^2.0.0\",\n    \"markdown-it-sup\": \"^2.0.0\",\n    \"markdown-it-task-lists\": \"^2.1.1\",\n    \"markdown-it-texmath\": \"^1.0.0\",\n    \"mermaid\": \"^11.15.0\",\n    \"pinia\": \"^3.0.4\",\n    \"vue\": \"^3.5.38\"\n  },\n  \"devDependencies\": {\n    \"@eslint/js\": \"^10.0.1\",\n    \"@tailwindcss/postcss\": \"^4.3.0\",\n    \"@tauri-apps/cli\": \"^2.11.2\",\n    \"@types/katex\": \"^0.16.8\",\n    \"@types/lodash-es\": \"^4.17.12\",\n    \"@types/markdown-it\": \"^14.1.2\",\n    \"@vitejs/plugin-vue\": \"^6.0.7\",\n    \"@vue/eslint-config-prettier\": \"^10.2.0\",\n    \"@vue/eslint-config-typescript\": \"^14.8.0\",\n    \"commonmark-spec\": \"^0.31.2\",\n    \"eslint\": \"^10.4.1\",\n    \"eslint-plugin-vue\": \"^10.9.2\",\n    \"globals\": \"^17.6.0\",\n    \"happy-dom\": \"^20.10.3\",\n    \"postcss\": \"^8.5.15\",\n    \"prettier\": \"^3.8.4\",\n    \"tailwindcss\": \"^4.3.0\",\n    \"typescript\": \"~6.0.3\",\n    \"typescript-eslint\": \"^8.61.0\",\n    \"vite\": \"^7.0.0\",\n    \"vitest\": \"^4.1.8\",\n    \"vue-tsc\": \"^3.3.4\"\n  }\n}\n"},"tsconfig.json":{"text":"{\n  \"compilerOptions\": {\n    \"target\": \"ES2020\",\n    \"useDefineForClassFields\": true,\n    \"module\": \"ESNext\",\n    \"lib\": [\"ES2020\", \"DOM\", \"DOM.Iterable\"],\n    \"skipLibCheck\": true,\n\n    /* Bundler mode */\n    \"moduleResolution\": \"bundler\",\n    \"allowImportingTsExtensions\": true,\n    \"resolveJsonModule\": true,\n    \"isolatedModules\": true,\n    \"noEmit\": true,\n    \"jsx\": \"preser
